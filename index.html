<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Daily.</title>
    <meta name="description" content="Collaborate, organize, secure, and sync your work in real time." />
    <meta name="theme-color" content="#0e0f11" />
    <link rel="manifest" href="#" id="manifest-link" />
    <link rel="icon" type="image/svg+xml"
        href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23000000"/><path d="M22 14H34C46 14 54 22 54 32C54 42 46 50 34 50H22V14Z" fill="%23ffffff"/></svg>' />
    <script src="https://unpkg.com/react@18/umd/react.development.js">
    </script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js">
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0e0f11;
            --bg2: #141518;
            --bg3: #1c1e22;
            --bg4: #242629;
            --border: #2a2c31;
            --border2: #363940;
            --text: #e8e9eb;
            --text2: #9a9da6;
            --text3: #5a5d66;
            --blue: #4f8ef7;
            --blue-dim: #1a2d52;
            --green: #3ecf8e;
            --green-dim: #0d3326;
            --amber: #f7c35a;
            --amber-dim: #3d2e0a;
            --red: #f76f6f;
            --red-dim: #3d1010;
            --purple: #a78bfa;
            --purple-dim: #251d45;
            --radius: 10px;
            --radius-lg: 14px;
            --shadow: 0 2px 14px rgba(0, 0, 0, .45);
            --hdr: 50px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        html {
            height: 100%;
            overflow: hidden
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100%;
            overflow: hidden;
            overscroll-behavior: contain
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            line-height: 1
        }

        input,
        textarea,
        select {
            font-family: inherit;
            color: inherit;
            background: none
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 4px
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 10px;
            height: var(--hdr);
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
            flex-shrink: 0;
            z-index: 20;
            position: relative;
            padding-top: var(--safe-top)
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -.5px;
            color: var(--text);
            flex-shrink: 0;
            margin-right: 4px;
            cursor: default
        }

        .logo span {
            color: var(--blue)
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid var(--border);
            white-space: nowrap;
            flex-shrink: 0
        }

        .stat-pill.red {
            color: var(--red);
            border-color: var(--red-dim);
            background: var(--red-dim)
        }

        .stat-pill.green {
            color: var(--green);
            border-color: var(--green-dim);
            background: var(--green-dim)
        }

        .ibtn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            color: var(--text2);
            transition: background .12s, color .12s, border-color .12s;
            flex-shrink: 0;
            position: relative;
            padding: 0
        }

        .ibtn:hover {
            background: var(--bg3);
            color: var(--text)
        }

        .ibtn.active {
            background: var(--blue-dim);
            border-color: var(--blue);
            color: var(--blue)
        }

        .ibtn.primary {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff
        }

        .ibtn.primary:hover {
            opacity: .88
        }

        [data-tip] {
            position: relative
        }

        [data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            top: calc(100% + 7px);
            bottom: auto;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg4);
            border: 1px solid var(--border2);
            color: var(--text);
            font-size: 11px;
            font-weight: 500;
            padding: 4px 9px;
            border-radius: 6px;
            white-space: nowrap;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .4)
        }

        [data-tip]:hover::before {
            content: '';
            position: absolute;
            top: calc(100% + 2px);
            bottom: auto;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-bottom-color: var(--border2);
            border-top-color: transparent;
            pointer-events: none;
            z-index: 9999
        }

        .search-wrap {
            position: relative;
            display: flex;
            align-items: center
        }

        .search-inp {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 10px 5px 32px;
            font-size: 13px;
            color: var(--text);
            outline: none;
            width: 150px;
            transition: border-color .15s
        }

        .search-inp:focus {
            border-color: var(--blue)
        }

        .header-actions {
            display: flex;
            gap: 3px;
            align-items: center;
            flex-shrink: 0
        }

        .sync-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text3);
            margin-left: 2px;
            transition: .2s
        }

        .sync-dot.connected {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
        }

        .sync-dot.connecting {
            background: var(--amber);
            animation: pulse 1s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .5
            }
        }

        .sync-modal {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 480px;
            margin: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px
        }

        .sync-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        .sync-input {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            color: var(--text);
            outline: none
        }

        .qr-box {
            background: white;
            padding: 12px;
            border-radius: 12px;
            display: inline-block;
            margin: 0 auto
        }

        .peer-list {
            font-size: 12px;
            color: var(--text2);
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 11px
        }

        .status-badge.on {
            background: var(--green-dim);
            color: var(--green)
        }

        .status-badge.off {
            background: var(--red-dim);
            color: var(--red)
        }

        .board-wrap {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0
        }

        .board {
            display: flex;
            gap: 10px;
            padding: 12px;
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            min-height: 0;
            align-items: stretch
        }

        .board::-webkit-scrollbar {
            height: 6px
        }

        .col {
            display: flex;
            flex-direction: column;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            min-width: 230px;
            max-width: 290px;
            flex: 1;
            overflow: hidden;
            min-height: 0;
            transition: opacity .15s, transform .15s, border-color .15s;
            border-top: 3px solid var(--border)
        }

        .col.col-dragging {
            opacity: .4;
            transform: scale(.97)
        }

        .col.col-drop-target {
            border-color: var(--blue);
            background: rgba(79, 142, 247, .04)
        }

        .col-hdr {
            padding: 9px 10px 7px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border)
        }

        .col-grip {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            cursor: grab;
            color: var(--text3);
            transition: .12s;
            flex-shrink: 0;
            user-select: none
        }

        .col-grip:hover {
            color: var(--text2);
            background: var(--bg4)
        }

        .col-grip.locked {
            cursor: default;
            color: var(--amber)
        }

        .col-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .col-title-wrap {
            flex: 1;
            min-width: 0;
            overflow: hidden
        }

        .col-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .col-title-inp {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: var(--text);
            background: var(--bg3);
            border: 1px solid var(--blue);
            border-radius: 5px;
            padding: 1px 6px;
            outline: none;
            width: 100%
        }

        .col-count {
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            background: var(--bg4);
            flex-shrink: 0
        }

        .col-blocker-badge {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 10px;
            color: var(--red);
            flex-shrink: 0
        }

        .col-hdr-actions {
            display: flex;
            gap: 1px;
            opacity: 0;
            transition: .12s;
            flex-shrink: 0
        }

        .col-hdr:hover .col-hdr-actions {
            opacity: 1
        }

        .chbtn {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text3);
            transition: .1s;
            border: none;
            background: none;
            cursor: pointer
        }

        .chbtn:hover {
            background: var(--bg4);
            color: var(--text2)
        }

        .chbtn.lock-on {
            color: var(--amber)
        }

        .chbtn.del-col:hover {
            color: var(--red);
            background: var(--red-dim)
        }

        .col-body {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 5px
        }

        .col-add-btn {
            width: 32px;
            height: 28px;
            border-radius: 7px;
            color: var(--text3);
            border: 1px dashed var(--border);
            background: transparent;
            transition: .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            cursor: pointer;
            align-self: center
        }

        .col-add-btn:hover {
            border-color: var(--text2);
            color: var(--text2);
            background: var(--bg3)
        }

        .col-empty {
            text-align: center;
            padding: 24px 12px;
            color: var(--text3);
            font-size: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: .7
        }

        .add-col-btn {
            min-width: 50px;
            width: 50px;
            border: 1.5px dashed var(--border2);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text3);
            font-size: 18px;
            cursor: pointer;
            transition: .18s;
            background: transparent;
            flex-shrink: 0;
            padding: 16px 8px
        }

        .add-col-btn:hover {
            border-color: var(--text2);
            color: var(--text2);
            background: var(--bg2)
        }

        /* ── CARDS ── */
        .card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 9px 10px 8px;
            cursor: pointer;
            transition: transform .12s, box-shadow .12s, border-color .12s;
            position: relative;
            user-select: none
        }

        .card:hover {
            border-color: var(--border2);
            box-shadow: var(--shadow);
            transform: translateY(-1px)
        }

        .card:active {
            transform: scale(.98)
        }

        .card.dragging {
            opacity: .35;
            cursor: grabbing;
            transform: scale(.97)
        }

        .card.drag-over-top {
            border-top: 2px solid var(--blue) !important
        }

        .card.drag-over-bottom {
            border-bottom: 2px solid var(--blue) !important
        }

        .card.aged-stale {
            border-left: 2px solid var(--amber)
        }

        .card.aged-old {
            border-left: 2px solid var(--red)
        }

        .card-title {
            font-size: 13px;
            font-weight: 500;
            line-height: 1.4;
            word-break: break-word;
            margin-bottom: 6px
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap
        }

        .priority {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 4px;
            letter-spacing: .3px
        }

        .p0 {
            background: var(--red-dim);
            color: var(--red)
        }

        .p1 {
            background: var(--amber-dim);
            color: var(--amber)
        }

        .p2 {
            background: var(--blue-dim);
            color: var(--blue)
        }

        .card-age {
            font-size: 10px;
            color: var(--text3);
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0
        }

        .card-age.age-fresh {
            color: var(--green)
        }

        .card-age.age-recent {
            color: var(--text3)
        }

        .card-age.age-stale {
            color: var(--amber)
        }

        .card-age.age-old {
            color: var(--red)
        }

        .expiry-badge {
            font-size: 10px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 2px
        }

        .expiry-badge.warn {
            color: var(--amber)
        }

        .card-blocker {
            margin-top: 7px;
            padding: 6px 8px;
            background: var(--red-dim);
            border: 1px solid rgba(247, 111, 111, .2);
            border-radius: 6px;
            font-size: 11px;
            color: var(--red);
            line-height: 1.4
        }

        .blocker-lbl {
            font-weight: 700;
            font-size: 10px;
            letter-spacing: .5px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 3px
        }

        .timer-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 3px;
            font-family: 'DM Mono', monospace;
            font-weight: 600
        }

        .timer-badge.running {
            background: var(--blue-dim);
            color: var(--blue)
        }

        .timer-badge.paused {
            background: var(--amber-dim);
            color: var(--amber)
        }

        .timer-badge.expired {
            background: var(--red-dim);
            color: var(--red);
            animation: pulse 1s ease infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .5
            }
        }

        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: .12s;
            flex-shrink: 0
        }

        .color-dot:hover,
        .color-dot.sel {
            border-color: var(--text);
            transform: scale(1.2)
        }

        .color-dot.none-dot {
            background: var(--bg4);
            border: 1px dashed var(--border2)
        }

        /* ── MODAL — CENTERED ON ALL SCREENS ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .72);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 16px;
            animation: fadein .14s ease;
            overflow-y: auto
        }

        @keyframes fadein {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 740px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            animation: slidein .17s ease;
            margin: auto
        }

        @keyframes slidein {
            from {
                transform: translateY(10px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        .modal-hdr {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0
        }

        .modal-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch
        }

        .modal-foot {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-shrink: 0
        }

        .flabel {
            font-size: 11px;
            font-weight: 600;
            color: var(--text2);
            letter-spacing: .4px;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block
        }

        .finput {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border-color .15s
        }

        .finput:focus {
            border-color: var(--blue)
        }

        .fselect {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text);
            outline: none;
            cursor: pointer;
            appearance: none
        }

        .fselect:focus {
            border-color: var(--blue)
        }

        .frow {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px
        }

        .fgroup {
            margin-bottom: 14px
        }

        .btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text2);
            transition: .14s;
            cursor: pointer
        }

        .btn:hover {
            background: var(--bg4);
            color: var(--text)
        }

        .btn.primary {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff
        }

        .btn.primary:hover {
            opacity: .88
        }

        .btn:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        /* ── MARKDOWN ── */
        .md-render {
            font-size: 13px;
            line-height: 1.7;
            color: var(--text)
        }

        .md-render h1 {
            font-size: 17px;
            font-weight: 600;
            margin: 4px 0 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px
        }

        .md-render h2 {
            font-size: 15px;
            font-weight: 600;
            margin: 14px 0 6px
        }

        .md-render h3 {
            font-size: 13px;
            font-weight: 600;
            margin: 10px 0 4px;
            color: var(--text2)
        }

        .md-render p {
            margin: 4px 0 8px;
            color: var(--text2)
        }

        .md-render ul,
        .md-render ol {
            margin: 4px 0 8px 18px;
            color: var(--text2)
        }

        .md-render li {
            margin: 3px 0;
            line-height: 1.6
        }

        .md-render strong {
            color: var(--text);
            font-weight: 600
        }

        .md-render em {
            font-style: italic
        }

        .md-render del {
            color: var(--text3);
            text-decoration: line-through
        }

        .md-render code {
            background: var(--bg4);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 5px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--blue)
        }

        .md-render pre {
            background: var(--bg4);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0
        }

        .md-render pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 12px;
            color: var(--text2);
            display: block;
            line-height: 1.6
        }

        .md-render blockquote {
            border-left: 3px solid var(--purple);
            padding: 5px 5px 5px 12px;
            margin: 8px 0;
            color: var(--text3);
            font-style: italic;
            background: var(--purple-dim);
            border-radius: 0 6px 6px 0
        }

        .md-render hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0
        }

        .md-render .md-spacer {
            height: 4px
        }

        .md-render .blocker-block {
            background: var(--red-dim);
            border: 1px solid rgba(247, 111, 111, .25);
            border-radius: 8px;
            padding: 10px 14px;
            margin: 10px 0
        }

        .md-render .blocker-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .7px;
            text-transform: uppercase;
            color: var(--red);
            display: block;
            margin-bottom: 4px
        }

        .md-render .blocker-detail {
            color: var(--red);
            font-size: 13px;
            line-height: 1.5;
            opacity: .85
        }

        .md-render ul.task-list {
            list-style: none;
            margin-left: 4px
        }

        .md-render .task-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 2px 0;
            cursor: pointer
        }

        .md-render .task-item.done .task-text {
            color: var(--text3);
            text-decoration: line-through
        }

        .md-render .cb {
            font-size: 14px;
            flex-shrink: 0;
            user-select: none
        }

        .md-render a {
            color: var(--blue)
        }

        /* ── FLOATING PANEL ── */
        .sc-overlay {

            inset: 0;
            background: rgba(0, 0, 0, .7);

            align-items: center;
            justify-content: center;

        .sc-box {
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 320px;
            max-height: 80vh;
            overflow-y: auto
        }

        .sc-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--text2)
        }

        .sc-row:last-child {
            border-bottom: none
        }

        .kbd {
            background: var(--bg4);
            border: 1px solid var(--border2);
            border-radius: 4px;
            padding: 1px 7px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text)
        }

        /* ── OVERFLOW MENU (was missing base styles) ── */
        .overflow-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 10px;
            box-shadow: var(--shadow);
            z-index: 250;
            display: flex;
            flex-direction: column;
            padding: 5px;
            min-width: 180px;
            animation: slidein .12s ease
        }

        .overflow-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 7px;
            font-size: 13px;
            color: var(--text2);
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            width: 100%;
            transition: .12s
        }

        .overflow-item:hover {
            background: var(--bg3);
            color: var(--text)
        }

        .overflow-sep {
            height: 1px;
            background: var(--border);
            margin: 4px 2px
        }

        /* ── EDITOR EXTRAS: tables, highlight, font select ── */
        .md-render mark {
            background: var(--amber-dim);
            color: var(--text);
            padding: 0 2px;
            border-radius: 3px
        }

        .md-render .md-table-wrap {
            overflow-x: auto;
            margin: 8px 0
        }

        .md-render table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px
        }

        .md-render th,
        .md-render td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left
        }

        .md-render th {
            background: var(--bg4);
            font-weight: 600;
            color: var(--text)
        }

        .md-render tr:nth-child(even) td {
            background: rgba(255, 255, 255, .02)
        }

        .fontsel {
            font-size: 11px;
            padding: 3px 5px;
            border-radius: 5px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            outline: none
        }

        /* ── TOASTS ── */
        .toasts {
            position: fixed;
            bottom: 80px;
            right: 14px;
            z-index: 600;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: none
        }

        .toast {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            animation: toastin .2s ease;
            background: var(--bg3);
            border: 1px solid var(--border2);
            color: var(--text);
            pointer-events: auto
        }

        .toast.success {
            background: var(--green-dim);
            border-color: rgba(62, 207, 142, .3);
            color: var(--green)
        }

        .toast.error {
            background: var(--red-dim);
            border-color: rgba(247, 111, 111, .3);
            color: var(--red)
        }

        @keyframes toastin {
            from {
                transform: translateX(14px);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        /* ── CONFETTI ── */
        .cp {
            position: fixed;
            top: -10px;
            pointer-events: none;
            z-index: 700;
            border-radius: 2px;
            animation: fall linear forwards
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0
            }
        }

        /* ── SWATCHES ── */
        .swatch {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: .12s;
            flex-shrink: 0
        }

        .swatch:hover,
        .swatch.sel {
            border-color: var(--text);
            transform: scale(1.15)
        }

        /* ── FAB ── */
        .fab {
            position: fixed;
            bottom: calc(18px + var(--safe-bottom));
            right: 18px;

            height: 48px;
            border-radius: 50%;

            align-items: center;
            justify-content: center;

            cursor: pointer;
            z-index: 50;

        }

        .fab:hover {
            transform: scale(1.08)
        }

        .fab:active {
            transform: scale(.95)
        }

        /* ── FLOATING PANEL ── */
        .fp {
            position: fixed;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: var(--radius-lg);

        .fp-title {
            font-size: 12px;
            font-weight: 600;
            flex: 1;
            color: var(--text2)

        .fp-resize {

        }

        .fp-resize.n {
            top: -4px;
            left: 12px;
            right: 12px;
            height: 8px;
            cursor: n-resize
        }

        .fp-resize.s {
            bottom: -4px;
            left: 12px;
            right: 12px;
            height: 8px;
            cursor: s-resize
        }

        .fp-resize.e {
            right: -4px;
            top: 12px;
            bottom: 12px;
            width: 8px;
            cursor: e-resize
        }

        .fp-resize.w {
            left: -4px;
            top: 12px;
            bottom: 12px;
            width: 8px;
            cursor: w-resize
        }

        .fp-resize.nw {
            top: -4px;
            left: -4px;
            width: 14px;
            height: 14px;
            cursor: nw-resize
        }

        .fp-resize.ne {
            top: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            cursor: ne-resize
        }

        .fp-resize.sw {
            bottom: -4px;
            left: -4px;
            width: 14px;
            height: 14px;
            cursor: sw-resize
        }

        .fp-resize.se {
            bottom: -4px;
            right: -4px;
            width: 14px;
            height: 14px;
            cursor: se-resize;
            background: var(--border2);
            border-radius: 0 0 var(--radius-lg) 0;
            opacity: .6
        }

        /* ── AI PANEL ── */
        .ai-panel {
            position: fixed;
            top: var(--hdr);
            right: 0;
            width: 320px;
            max-width: 100vw;
            bottom: 0;
            background: var(--bg2);
            border-left: 1px solid var(--border2);
            z-index: 150;
            display: flex;
            flex-direction: column;
            animation: slideL .18s ease
        }

        @keyframes slideL {
            from {
                transform: translateX(100%)
            }

            to {
                transform: translateX(0)
            }
        }

        .ai-panel-hdr {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0
        }

        .ai-service-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 13px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: .14s;
            text-decoration: none
        }

        .ai-service-btn:hover {
            border-color: var(--blue);
            transform: translateY(-1px)
        }

        .ai-service-icon {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0
        }

        @keyframes spin {
            from {
                transform: rotate(0)
            }

            to {
                transform: rotate(360deg)
            }
        }

        .spin {
            animation: spin .6s linear
        }

        /* ── LIGHT MODE ── */
        body.light {
            --bg: #f3f3f5;
            --bg2: #fff;
            --bg3: #ededf0;
            --bg4: #e4e4e9;
            --border: #dcdce2;
            --border2: #c8c8d0;
            --text: #18181f;
            --text2: #555566;
            --text3: #9898aa;
            --blue-dim: #e5eeff;
            --green-dim: #e5f8f1;
            --amber-dim: #fef8e6;
            --red-dim: #feeaea;
            --purple-dim: #f1efff
        }

        /* ── RESIZABLE IMAGE ── */
        .resizable-img-container {
            display: inline-block;
            position: relative;
            margin: 6px 0
        }

        .resizable-img-container img {
            display: block;
            border-radius: 6px;
            object-fit: contain
        }

        .resizable-img-container .resize-handle {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 14px;
            height: 14px;
            background: var(--blue);
            border: 2px solid var(--bg2);
            border-radius: 3px;
            cursor: se-resize;
            z-index: 10;
            opacity: 0;
            transition: opacity .15s
        }

        .resizable-img-container:hover .resize-handle {
            opacity: 1
        }

        /* ── ALARM — HIGH Z-INDEX, ALWAYS VISIBLE ── */
        .alarm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadein .2s ease;
            padding: 20px
        }

        .alarm-box {
            background: var(--bg2);
            border: 2px solid var(--red);
            border-radius: 16px;
            padding: 32px 40px;
            text-align: center;
            animation: slidein .2s ease;
            max-width: 340px;
            width: 100%
        }

        .alarm-box h2 {
            color: var(--red);
            font-size: 20px;
            margin-bottom: 8px
        }

        .alarm-box p {
            color: var(--text2);
            font-size: 14px;
            margin-bottom: 16px
        }

        /* ── EXCALIDRAW PANEL ── */
        .draw-panel-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            animation: fadein .15s ease
        }

        .draw-panel-hdr {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            height: var(--hdr);
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10
        }

        .draw-panel-hdr .logo {
            font-size: 15px
        }

        .draw-panel-body {
            flex: 1;
            overflow: hidden;
            position: relative
        }

        .draw-panel-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block
        }

        .draw-panel-badge {
            font-size: 11px;
            color: var(--text3);
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 10px;
            display: flex;
            align-items: center;
            gap: 5px
        }

        /* ── DESKTOP: > 900px ── */
        @media(min-width:901px) {
            .col {
                border-top: 1px solid var(--border)
            }

            .col-hdr-actions {
                opacity: 0
            }

            .col-hdr:hover .col-hdr-actions {
                opacity: 1
            }
        }

        /* ── TABLET: 641–900px ── */
        @media(min-width:641px) and (max-width:900px) {
            .col {
                min-width: 200px;
                max-width: 250px;
                border-top: 3px solid var(--border)
            }

            .col-hdr-actions {
                opacity: 1
            }

            .header {
                padding: 0 8px;
                gap: 4px
            }

            .search-inp {
                width: 120px
            }
        }

        /* ── MOBILE: ≤ 640px ── */
        @media(max-width:640px) {
            :root {
                --hdr: 48px
            }

            html,
            body {
                height: 100%;
                overflow: hidden
            }

            .app {
                height: 100vh;
                height: 100dvh;
                overflow: hidden
            }

            .header {
                padding: 0 8px;

            }

            }

            .stats-desktop {

            }

            .search-inp {
                width: 110px;
                font-size: 12px
            }

            .ibtn {
                width: 30px;
                height: 30px;
                border-radius: 7px
            }

            .board-wrap {
                flex: 1;
                overflow: hidden;
                min-height: 0
            }

            .board {
                padding: 8px;
                gap: 8px;
                flex-direction: row;
                overflow-x: auto;
                overflow-y: hidden;
                align-items: stretch;
                -webkit-overflow-scrolling: touch;
                scroll-snap-type: x mandatory
            }

            .board::-webkit-scrollbar {
                height: 3px
            }

            .col {
                min-width: calc(85vw);
                max-width: calc(90vw);
                flex-shrink: 0;
                scroll-snap-align: start;
                border-top: 3px solid var(--border)
            }

            .col-hdr-actions {
                opacity: 1 !important
            }

            .overlay {
                padding: 12px;
                align-items: center
            }

            .modal {
                max-height: 88vh;
                border-radius: var(--radius-lg);
                max-width: 100%;
                margin: auto
            }

            .frow {
                grid-template-columns: 1fr 1fr
            }

            .add-col-btn {
                min-width: 44px;
                width: 44px;
                flex-direction: column;
                padding: 12px 6px;
                height: auto;
                scroll-snap-align: start;
                flex-shrink: 0
            }

            .fab {
                bottom: calc(16px + var(--safe-bottom));
                right: 16px;
                width: 44px;
                height: 44px;
                font-size: 20px
            }

            .toasts {
                right: 8px;
                bottom: calc(72px + var(--safe-bottom))
            }

            .fp {
                bottom: calc(8px + var(--safe-bottom)) !important;
                right: 8px !important;
                left: 8px !important;
                top: auto !important;
                width: auto !important;
                min-width: 0;
                max-height: 70vh;
                border-radius: var(--radius-lg)
            }

            .ai-panel {
                width: 100vw
            }

            [data-tip]:hover::after,
            [data-tip]:hover::before {
                display: none
            }

            .alarm-overlay {
                z-index: 9999;
                padding: 16px
            }

            .alarm-box {
                padding: 24px 20px
            }

            .alarm-box h2 {
                font-size: 18px
            }

            .draw-panel-hdr {
                padding: 0 10px;
                gap: 7px;
                overflow: hidden
            }

            .draw-panel-badge {
                display: none
            }

            .sc-box {
                width: calc(100vw - 32px);
                max-height: 85vh
            }

            .overflow-menu {
                right: 0;
                min-width: 200px
            }

            .card {
                padding: 10px 11px 9px
            }

            .card-title {
                font-size: 13px
            }
        }

        .pwa-banner {
            position: fixed;
            bottom: calc(18px + var(--safe-bottom));
            left: 18px;
            background: var(--bg2);
            border: 1px solid var(--border2);
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .5);
            z-index: 100;
            animation: slidein .2s ease
        }

        .pwa-banner button.pwa-install {
            padding: 6px 14px;
            border-radius: 8px;
            background: var(--blue);
            color: #fff;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer
        }

        .pwa-banner button.pwa-dismiss {
            background: none;
            border: none;
            color: var(--text3);
            cursor: pointer;
            font-size: 14px;
            padding: 4px
        }

        /* ── BASE64 CONVERTER ── */
        .b64-preview {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 4px
        }

        .b64-preview.pdf-preview {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            color: var(--text3)
        }

        .b64-preview.pdf-preview svg {
            opacity: .4
        }

        .b64-output-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 6px
        }
    </style>
</head>

        /* ── ALARM ── */
        const AlarmCtx = { ctx: null, playing: false };

        function playAlarmSound() {
            try {
                if (AlarmCtx.playing) return;
                AlarmCtx.playing = true;
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                AlarmCtx.ctx = ctx;
                const notes = [523.25, 659.25, 783.99, 1046.50, 783.99, 659.25, 523.25];
                let t = ctx.currentTime;
                notes.forEach((freq, i) => {
                    for (let r = 0; r < 3; r++) {
                        const osc = ctx.createOscillator(),
                            gain = ctx.createGain();
                        osc.type = i % 2 === 0 ? 'sine' : 'triangle';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0, t);
                        gain.gain.linearRampToValueAtTime(0.15, t + 0.03);
                        gain.gain.linearRampToValueAtTime(0, t + 0.18);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(t);
                        osc.stop(t + 0.2);
                        t += 0.2;
                    }
                    t += 0.1;
                });
                setTimeout(() => { AlarmCtx.playing = false; try { ctx.close(); } catch { } }, 5000);
            } catch { AlarmCtx.playing = false; }
        }

        function stopAlarmSound() {
            AlarmCtx.playing = false; try {
                if (AlarmCtx.ctx) {
                    AlarmCtx.ctx.close();
                    AlarmCtx.ctx = null;
                }
            } catch { }
        }

        function fmtAge(iso, now) {
            if (!iso) return 'just now';
            const ms = (now || Date.now()) - new Date(iso).getTime();

                h = Math.floor(ms / 36e5),
                d = Math.floor(ms / 864e5),
                w = Math.floor(d / 7),
                mo = Math.floor(d / 30);
            if (m < 1) return 'just now';

        /* ── IMAGE COMPRESS ── */
        async function compressImage(src) {
            return new Promise(res => {
                const img = new Image();
                const isFile = src instanceof File;
                const url = isFile ? URL.createObjectURL(src) : src;
                img.onload = () => {
                    const MAX = 1200,
                        scale = Math.min(1, MAX / Math.max(img.width, img.height));
                    const w = Math.round(img.width * scale),
                        h = Math.round(img.height * scale);
                    const c = document.createElement('canvas');
                    c.width = w;
                    c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    let out = c.toDataURL('image/webp', 0.82);
                    if (out.length < 50 || out.startsWith('data:image/png')) out = c.toDataURL('image/jpeg', 0.82);
                    if (isFile) URL.revokeObjectURL(url);
                    res(out);
                };
                img.src = url;
            });
        }

        /* ── MARKDOWN ── */
        function escH(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }

        function inlineRender(s) {
            return escH(s)
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/~~(.+?)~~/g, '<del>$1</del>')
                .replace(/==(.+?)==/g, '<mark>$1</mark>')
                .replace(/\{color:(#[0-9a-fA-F]{3,8})\}([\s\S]+?)\{\/color\}/g, '<span style="color:$1">$2</span>')
                .replace(/\{font:(\w+)\}([\s\S]+?)\{\/font\}/g, (m, name, txt) =>
                    `<span style="font-family:${FONT_FAMILIES[name] || 'inherit'}">${txt}</span>`)
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        }

        function getIndent(line) { const m = line.match(/^( *)/); return m[1].length; }

        function isListLine(line) { return /^ *([-*+]|\d+\.)\s/.test(line); }

        function parseList(lines, i, indent) {
            const ordered = /^ *\d+\.\s/.test(lines[i]);
            const tag = ordered ? 'ol' : 'ul';
            let html = `<${tag}>`;
            while (i < lines.length && isListLine(lines[i]) && getIndent(lines[i]) === indent) {
                const m = lines[i].match(/^ *(?:[-*+]|\d+\.)\s(.*)$/);
                let itemContent = inlineRender(m ? m[1] : '');
                i++;
                if (i < lines.length && isListLine(lines[i]) && getIndent(lines[i]) > indent) {
                    const sub = parseList(lines, i, getIndent(lines[i]));
                    itemContent += sub.html;
                    i = sub.next;
                }
                html += `<li>${itemContent}</li>`;
            }
            html += `</${tag}>`;
            return { html, next: i };
        }

        function renderMd(text, onToggle, imageSizes) {
            if (!text) return '';
            const lines = text.split('\n');
            const out = [];
            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                if (line.startsWith('```')) {
                    const cl = [];
                    i++; while (i < lines.length && !lines[i].startsWith('```')) {
                        cl.push(escH(lines[i]));
                        i++;
                    } out.push(`<pre><code>${cl.join('\n')}</code></pre>`);
                    i++; continue;
                }
                const tableSep = /^ *\|? *:?-{3,}:? *(\| *:?-{2,}:? *)*\|? *$/;
                if (line.includes('|') && i + 1 < lines.length && tableSep.test(lines[i + 1])) {
                    const splitRow = l => l.split('|').map(c => c.trim()).filter((c, idx, arr) => !((idx === 0 || idx ===
                        arr.length - 1) && c === ''));
                    const headerCells = splitRow(line);
                    const aligns = splitRow(lines[i + 1]).map(c => c.startsWith(':') && c.endsWith(':') ? 'center' : c
                        .endsWith(':') ? 'right' : c.startsWith(':') ? 'left' : '');
                    i += 2;
                    const rows = [];
                    while (i < lines.length && lines[i].includes('|') && lines[i].trim()) {
                        rows.push(splitRow(lines[
                            i]));
                        i++;
                    }
                    const th =
                        `<tr>${headerCells.map((c, ci) => `<th${aligns[ci] ? ` style="text-align:${aligns[ci]}"` : ''}>${inlineRender(c)}</th>`).join('')}</tr>`;
                    const tb =
                        rows.map(r =>
                            `<tr>${r.map((c, ci) => `<td${aligns[ci] ? ` style="text-align:${aligns[ci]}"` : ''}>${inlineRender(c)}</td>`).join('')}</tr>`
                        ).join('');
                    out.push(
                        `<div class="md-table-wrap"><table><thead>${th}</thead><tbody>${tb}</tbody></table></div>`);
                    continue;
                }
                const hm = line.match(/^(#{1,3})\s+(.+)$/);
                if (hm) {
                    if (hm[2].trim().toUpperCase() === 'BLOCKER') {
                        out.push(
                            `<div class="blocker-block"><span class="blocker-label">🚫 BLOCKER</span>`);
                        i++;
                        const det = [];
                        while (i < lines.length && lines[i].trim() && !lines[i].startsWith('#')) {
                            det.push(
                                inlineRender(lines[i]));
                            i++;
                        } if (det.length) out.push(
                            `<div class="blocker-detail">${det.join('<br/>')}</div>`);
                        out.push('</div>');
                        continue;
                    }
                    out.push(`<h${hm[1].length}>${inlineRender(hm[2])}</h${hm[1].length}>`);
                    i++;
                    continue;
                }
                if (/^(---|\*\*\*|___)$/.test(line.trim())) {
                    out.push('<hr/>');
                    i++; continue;
                }
                if (line.startsWith('> ')) {
                    const bq = [line.slice(2)]; while (i + 1 < lines.length && lines[i + 1]
                        .startsWith('> ')) {
                        i++;
                        bq.push(lines[i].slice(2));
                    } out.push(
                        `<blockquote>${bq.map(inlineRender).join('<br/>')}</blockquote>`);
                    i++; continue;
                }
                const imgM = line.match(/^!\[([^\]]*)\]\(([^)]+)\)(?:\{(\d+)x(\d+)\})?$/);
                if (imgM) {
                    const imgId = 'img_' + i;
                    const sz = imageSizes && imageSizes[imgId];
                    const w = sz ? sz.w : (imgM[3] ? parseInt(imgM[3]) : null);
                    out.push(
                        `<div class="resizable-img-container" data-img-id="${imgId}" data-li="${i}" style="${w ? 'width:' + w + 'px;' : 'max-width:100%;'}"><img src="${escH(imgM[2])}" style="width:100%;height:auto;border-radius:6px;display:block"/><div class="resize-handle" data-img-id="${imgId}"></div></div>`
                    );
                    i++; continue;
                }
                if (/^\[[ x]\]\s/.test(line)) {
                    const items = []; while (i < lines.length && /^\[[ x]\]\s/.test(lines[
                        i])) {
                        const done = lines[i][1] === 'x';
                        const li = i;
                        items.push(
                            `<li class="task-item${done ? ' done' : ''}" data-toggle-line="${li}"><span class="cb">${done ? '☑' : '☐'}</span><span class="task-text">${inlineRender(lines[i].replace(/^\[[ x]\]\s/, ''))}</span></li>`
                        );
                        i++;
                    } out.push(`<ul class="task-list">${items.join('')}</ul>`);
                    continue;
                }
                if (isListLine(line)) {
                    const r = parseList(lines, i, getIndent(line));
                    out.push(r.html);
                    i = r.next; continue;
                }
                if (!line.trim()) {
                    out.push('<div class="md-spacer"></div>');
                    i++; continue;
                }
                const para = [line];
                while (i + 1 < lines.length && lines[i + 1].trim() && !/^(#{1,3}\s|[-*+]\s|\d+\.\s|> |\[[ x]\]|```|---|___|\*\*\*|!\[)/
                    .test(lines[i + 1]) && !(lines[i + 1].includes('|') && i + 2 <= lines.length && tableSep.test(lines[
                        i + 2] || ''))) {
                    i++;
                    para.push(lines[i]);
                }
                out.push(`<p>${para.map(inlineRender).join('<br/>')}</p>`);
                i++;
            }
            return out.join('');
        }

        /* ── 8-DIRECTION RESIZE HOOK ── */
        function useResize(initW, initH, initX, initY) {
            const [sz, setSz] = useState({ w: initW, h: initH, x: initX, y: initY });
            const drag = useRef(null);

            function startResize(dir, e) {
                e.preventDefault();
                e.stopPropagation();
                drag.current = { dir, startX: e.clientX, startY: e.clientY, ...sz };

                function onMove(ev) {
                    if (!drag.current) return;
                    const { dir: d, startX, startY, w, h, x, y } = drag.current;
                    const dx = ev.clientX - startX,
                        dy = ev.clientY - startY;
                    let nw = w,
                        nh = h,
                        nx = x,
                        ny = y;
                    if (d.includes('e')) nw = Math.max(300, w + dx);
                    if (d.includes('s')) nh = Math.max(180, h + dy);
                    if (d.includes('w')) {
                        nw = Math.max(300, w - dx);
                        nx = x + dx;
                    }
                    if (d.includes('n')) {
                        nh = Math.max(180, h - dy);
                        ny = y + dy;
                    }
                    setSz({ w: nw, h: nh, x: nx, y: ny });
                }

                function onUp() {
                    drag.current = null;
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                }
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
            }
            return { sz, setSz, startResize };
        }

        /* ── MD EDITOR ── */
        function MdEditor({ value, onChange }) {
            const ta = useRef();
            const [mode, setMode] = useState('write');
            const [edH, setEdH] = useState(isMobile() ? 160 : 220);
            const resizing = useRef(false);
            const resizeStart = useRef(null);
            const [showFontMenu, setShowFontMenu] = useState(false);
            const [showColorMenu, setShowColorMenu] = useState(false);
            const extraToolsRef = useRef();
            const historyRef = useRef({ stack: [value], idx: 0 });
            const historyTimer = useRef(null);

            useEffect(() => {
                function onDoc(e) {
                    if (extraToolsRef.current && !extraToolsRef.current.contains(e.target)) {
                        setShowFontMenu(
                            false);
                        setShowColorMenu(false);
                    }
                }
                document.addEventListener('mousedown', onDoc);
                return () => document.removeEventListener('mousedown', onDoc);
            }, []);

            function pushHistory(v) {
                const h = historyRef.current;
                if (h.stack[h.idx] === v) return;
                h.stack = h.stack.slice(0, h.idx + 1).concat(v).slice(-100);
                h.idx = h.stack.length - 1;
            }

            function applyFmt(type) {
                const el = ta.current;
                if (!el) return;
                const s = el.selectionStart,
                    e = el.selectionEnd;
                const sel = value.slice(s, e),
                    pre = value.slice(0, s),
                    post = value.slice(e);
                let nv, ns, ne;
                const lineStart = value.lastIndexOf('\n', s - 1) + 1;
                switch (type) {
                    case 'bold':
                        nv = pre + '**' + sel + '**' + post;
                        ns = s + 2;
                        ne = e + 2;
                        break;
                    case 'italic':
                        nv = pre + '*' + sel + '*' + post;
                        ns = s + 1;
                        ne = e + 1;
                        break;
                    case 'strike':
                        nv = pre + '~~' + sel + '~~' + post;
                        ns = s + 2;
                        ne = e + 2;
                        break;
                    case 'code':
                        nv = pre + '`' + sel + '`' + post;
                        ns = s + 1;
                        ne = e + 1;
                        break;
                    case 'highlight':
                        nv = pre + '==' + sel + '==' + post;
                        ns = s + 2;
                        ne = e + 2;
                        break;
                    case 'table': {
                        const tbl = '\n| Header 1 | Header 2 | Header 3 |\n| --- | --- | --- |\n| Cell | Cell | Cell |\n';
                        nv = pre + tbl + post;
                        ns = ne = s + tbl.length; break;
                    }
                    case 'codeblock': {
                        const c = '```\n' + (sel || 'code') + '\n```';
                        nv = pre + c + post;
                        ns = s + 4;
                        ne = s + 4 + (sel || 'code').length; break;
                    }
                    case 'h1':
                        nv = value.slice(0, lineStart) + '# ' + value.slice(lineStart);
                        ns = s + 2;
                        ne = e + 2;
                        break;
                    case 'h2':
                        nv = value.slice(0, lineStart) + '## ' + value.slice(lineStart);
                        ns = s + 3;
                        ne = e + 3;
                        break;
                    case 'h3':
                        nv = value.slice(0, lineStart) + '### ' + value.slice(lineStart);
                        ns = s + 4;
                        ne = e + 4;
                        break;
                    case 'quote':
                        nv = value.slice(0, lineStart) + '> ' + value.slice(lineStart);
                        ns = s + 2;
                        ne = e + 2;
                        break;
                    case 'ul':
                        nv = value.slice(0, lineStart) + '- ' + value.slice(lineStart);
                        ns = s + 2;
                        ne = e + 2;
                        break;
                    case 'ol':
                        nv = value.slice(0, lineStart) + '1. ' + value.slice(lineStart);
                        ns = s + 3;
                        ne = e + 3;
                        break;
                    case 'check':
                        nv = value.slice(0, lineStart) + '[ ] ' + value.slice(lineStart);
                        ns = s + 4;
                        ne = e + 4;
                        break;
                    case 'hr':
                        nv = pre + '\n---\n' + post;
                        ns = ne = s + 5;
                        break;
                    case 'link': {
                        const p = sel || 'link text';
                        nv = pre + '[' + p + '](url)' + post;
                        ns = s + 1;
                        ne = s + 1 + p.length; break;
                    }
                    case 'blocker': {
                        const b = '## BLOCKER\n' + (sel || 'Describe blocker') + '\n';
                        nv = pre + b + post;
                        ns = s + 11;
                        ne = s + 11 + (sel || 'Describe blocker').length; break;
                    }
                    case 'json': {
                        const res = formatJSON(el); if (!res) return alert('No valid JSON found'); if (res.full)
                            onChange('```json\n' + res.result + '\n```');
                        else onChange(value.slice(0, res.start) + res.result + value.slice(res.end)); return;
                    }
                    case 'image': {
                        const inp = document.createElement('input');
                        inp.type = 'file';
                        inp.accept = 'image/*';
                        inp.onchange = async ev => {
                            const f = ev.target.files[0]; if (!f) return; const data =
                                await compressImage(f); const tag = `\n![image](${data})\n`;
                            onChange(value.slice(0, s) + tag + value.slice(e));
                        };
                        inp.click(); return;
                    }
                    default: return;
                }
                pushHistory(nv);
                onChange(nv);
                setTimeout(() => {
                    if (el) {
                        el.selectionStart = ns;
                        el.selectionEnd = ne;
                        el.focus();
                    }
                }, 0);
            }

            function applyColor(hex) {
                const el = ta.current;
                if (!el) return;
                const s = el.selectionStart,
                    e = el.selectionEnd;
                const sel = value.slice(s, e) || 'colored text';
                const wrapped = `{color:${hex}}${sel}{/color}`;
                const nv = value.slice(0, s) + wrapped + value.slice(e);
                pushHistory(nv);
                onChange(nv);
                setTimeout(() => {
                    if (el) {
                        el.selectionStart = s;
                        el.selectionEnd = s + wrapped.length;
                        el.focus();
                    }
                }, 0);
            }

            function applyFont(name) {
                const el = ta.current;
                if (!el) return;
                const s = el.selectionStart,
                    e = el.selectionEnd;
                const sel = value.slice(s, e) || 'styled text';
                const wrapped = `{font:${name}}${sel}{/font}`;
                const nv = value.slice(0, s) + wrapped + value.slice(e);
                pushHistory(nv);
                onChange(nv);
                setTimeout(() => {
                    if (el) {
                        el.selectionStart = s;
                        el.selectionEnd = s + wrapped.length;
                        el.focus();
                    }

            function onKD(e) {
                const el = e.target;
                const s = el.selectionStart;
                const ctrl = e.ctrlKey || e.metaKey;
                if (ctrl && !e.shiftKey && e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    const h = historyRef.current;
                    if (h.stack[h.idx] !== value) pushHistory(value);
                    if (h.idx > 0) {
                        h.idx--;
                        onChange(h.stack[h.idx]);
                    }
                    return;
                }
                if (ctrl && (e.key.toLowerCase() === 'y' || (e.shiftKey && e.key.toLowerCase() === 'z'))) {
                    e.preventDefault();
                    const h = historyRef.current;
                    if (h.idx < h.stack.length - 1) {
                        h.idx++;
                        onChange(h.stack[h.idx]);
                    }
                    return;
                }
                if (ctrl && !e.shiftKey) {
                    const k = e.key.toLowerCase();
                    if (k === 'b') {
                        e.preventDefault();
                        applyFmt('bold'); return;
                    }
                    if (k === 'i') {
                        e.preventDefault();
                        applyFmt('italic'); return;
                    }
                    if (k === 'k') {
                        e.preventDefault();

                if (e.key === 'Tab') {
                    e.preventDefault();
                    const nv = value.slice(0, s) + '  ' + value.slice(el.selectionEnd);
                    pushHistory(nv);
                    onChange(nv);
                    setTimeout(() => { el.selectionStart = el.selectionEnd = s + 2; }, 0); return;
                }
                if (e.key === 'Enter') {
                    const lineStart = value.lastIndexOf('\n', s - 1) + 1;
                    const line = value.slice(lineStart, s);
                    const um = line.match(/^(\s*)([-*+])\s(.+)/),
                        om = line.match(/^(\s*)(\d+)\.\s(.+)/),
                        cm = line.match(/^(\s*)\[[ x]\]\s(.+)/);
                    if (um) {
                        e.preventDefault();
                        const ins = '\n' + um[1] + um[2] + ' ';
                        const nv = value.slice(0, s) + ins + value.slice(s);
                        pushHistory(nv);
                        onChange(nv);
                        setTimeout(() => { el.selectionStart = el.selectionEnd = s + ins.length; }, 0);
                    } else if (om) {
                        e.preventDefault();
                        const ins = '\n' + om[1] + (parseInt(om[2]) + 1) + '. ';
                        const nv = value.slice(0, s) + ins + value.slice(s);
                        pushHistory(nv);
                        onChange(nv);
                        setTimeout(() => { el.selectionStart = el.selectionEnd = s + ins.length; }, 0);
                    } else if (cm) {
                        e.preventDefault();
                        const ins = '\n' + cm[1] + '[ ] ';
                        const nv = value.slice(0, s) + ins + value.slice(s);
                        pushHistory(nv);
                        onChange(nv);
                        setTimeout(() => { el.selectionStart = el.selectionEnd = s + ins.length; }, 0);
                    }
                }
            }

        /* ── INTERACTIVE MD VIEW ── */
        function MdView({ value, onChange, imageSizes, onImageResize }) {
            const ref = useRef();
            useEffect(() => {
                const el = ref.current;
                if (!el) return;

                function onClick(e) {
                    const ti = e.target.closest('[data-toggle-line]'); if (ti) {
                        const li =
                            parseInt(ti.dataset.toggleLine); const lines = value.split('\n'); if (li >= lines
                                .length) return; const ln = lines[li]; if (/^\[ \]\s/.test(ln)) lines[li] = ln
                                    .replace('[ ]', '[x]');
                        else if (/^\[x\]\s/.test(ln)) lines[li] = ln.replace('[x]', '[ ]');
                        onChange(lines.join('\n'));
                    }
                }
                el.addEventListener('click', onClick);
                return () => el.removeEventListener('click', onClick);
            }, [value, onChange]);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                let resizing = null;

                function onDown(e) {
                    const handle = e.target.closest('.resize-handle'); if (!handle) return;
                    e.preventDefault();
                    e.stopPropagation(); const imgId = handle.dataset.imgId; const container = handle
                        .closest('.resizable-img-container'); if (!container) return; const startX = e
                            .clientX; const startW = container.offsetWidth; resizing = {
                                imgId, startX, startW,
                                container
                            };

                    function onMove(ev) {
                        if (!resizing) return; const dx = ev.clientX - resizing.startX;
                        const newW = Math.max(50, resizing.startW + dx);
                        resizing.container.style.width = newW + 'px';
                    }

                    function onUp() {
                        if (resizing) {
                            const finalW = resizing.container.offsetWidth;
                            onImageResize(resizing.imgId, finalW);
                        } resizing = null;
                        window.removeEventListener('mousemove', onMove);
                        window.removeEventListener('mouseup', onUp);
                    }
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                }
                el.addEventListener('mousedown', onDown);
                return () => el.removeEventListener('mousedown', onDown);
            }, [onImageResize]);
            if (!value) return <div style={{
                textAlign: 'center', padding: '32px 0', color: 'var(--text3)',
                fontSize: 13
            }}><div style={{ fontSize: 28, marginBottom: 8 }}>📝</div><div>No notes yet</div></div>;

        /* ── CARD MODAL ── */

            function onHdrMouseDown(e) {
                if (e.button !== 0) return;

                dragRef.current = { ox: e.clientX - r.left, oy: e.clientY - r.top, w: r.width, h: r.height };
                const onMove = ev => {
                    if (!dragRef.current) return;

                            dragRef.current.oy

            function onEResize(e) {
                e.preventDefault();
                e.stopPropagation();
                const el = modalRef.current;
                if (!el) return;
                const r = el.getBoundingClientRect();
                if (!pos) setPos({ x: r.left, y: r.top, w: r.width, h: r.height });
                const startX = e.clientX,
                    startW = r.width,
                    startX0 = r.left;
                const onMove = ev => {
                    const dw = ev.clientX - startX;
                    setPos(p => ({ ...(p || { x: startX0, y: r.top, h: r.height }), w: Math.max(380, startW + dw) }));

                return () => { document.body.style.overflow = ''; };

            const modalStyle = pos ?
                {
                    position: 'fixed', left: pos.x, top: pos.y, width: pos.w, maxHeight: '90vh', margin: 0,
                    maxWidth: 'none'
                } :
                { position: 'relative', width: '100%', maxWidth: 740, margin: 'auto' };

            return (
                <div className="overlay" style={pos ? { alignItems: 'flex-start' } : {}} onMouseDown={e => {

                        .target === e.currentTarget) onClose()
                }}>
