                        e.stopPropagation()}>
                        <div onMouseDown={onEResize} style={{
                            position: 'absolute', top: 12, right: -4, bottom: 12,
                            width: 8, cursor: 'e-resize', zIndex: 10
                        }} />
                        <div className="modal-hdr" style={{ cursor: pos ? 'move' : 'default' }} onMouseDown={
                            onHdrMouseDown}>
                            <div style={{
                                width: 8, height: 8, borderRadius: '50%', background: colData.color,
                                flexShrink: 0
                            }} />
                            {color && <div style={{
                                width: 8, height: 8, borderRadius: '50%', background: color,
                                flexShrink: 0
                            }} />}
                            {editing ? <input className="finput" style={{
                                fontSize: 14, fontWeight: 600, flex: 1,
                                background: 'transparent', border: 'none', padding: 0, minWidth: 0
                            }}
                                value={task} onChange={e => setTask(e.target.value)}
                                placeholder="Task title…" autoFocus /> :
                                <div className="modal-title">{task}</div>}
                            <div style={{
                                display: 'flex', gap: 4, marginLeft: 'auto', alignItems: 'center',
                                flexShrink: 0
                            }}>
                                {!mobile && <span style={{
                                    fontSize: 10, color: 'var(--text3)',
                                    marginRight: 2
                                }}>🕐 {age}</span>}
                                <TimerWidgetInline timer={timer} onSet={setTimer} onClear={() => setTimers(t => {
                                    const n = { ...t };
                                    delete n[card.id];
                                    saveTimers(n); return n;
                                })} onStart={() => setTimers(t => {
                                    const cur =
                                        t[card.id]; if (!cur) return t; const endAt = Date.now() + cur
                                            .remaining * 1000; const n = {
                                                ...t, [card.id]: {
                                                    ...cur,
                                                    running: true, endAt
                                                }
                                            };
                                    saveTimers(n); return n;
                                })} onStop={() => setTimers(t => {
                                    const cur =
                                        t[card.id]; if (!cur) return t; const n = {
                                            ...t, [card.id]: {
                                                ...cur, running: false
                                            }
                                        };
                                    saveTimers(n); return n;
                                })} />
                                {!editing && priority !== 'None' && <span className={`priority p${priority[1]}`}>
                                    {priority}</span>}
                                {!editing && <button className="ibtn" title="Edit" onClick={() => setEditing(true)}
                                    style={{ width: 28, height: 28, border: 'none', fontSize: 13 }}>✏️</button>}
                                <button className="ibtn" title="Delete" onClick={() => {
                                    if (confirm('Delete?'))
                                        onDelete(card.id)
                                }} style={{
                                    width: 28, height: 28, border: 'none',
                                    fontSize: 13, color: 'var(--red)'
                                }}>🗑️</button>
                                {pos && <button className="ibtn" title="Reset position" onClick={() => setPos(null)}
                                    style={{ width: 28, height: 28, border: 'none', fontSize: 12 }}>⊡</button>}
                                <button className="ibtn" title="Close" onClick={onClose} style={{
                                    width: 28,
                                    height: 28, border: 'none', fontSize: 14
                                }}>✕</button>
                            </div>
                        </div>
                        <div className="modal-body" style={{
                            overflowY: 'auto', maxHeight: pos ?
                                'calc(90vh - 100px)' : 'calc(90vh - 110px)'
                        }}>
                            {editing ? (
                                <>
                                    <div className="frow" style={mobile ? { gridTemplateColumns: '1fr 1fr' } :
                                        {}}>
                                        <div><label className="flabel">Priority</label><select className="fselect"
                                            value={priority} onChange={e => setPriority(e.target.value)}>
                                            {PRIORITY_LIST.map(p => <option key={p}>{p}</option>)}</select></div>
                                        <div><label className="flabel">Move to</label><select className="fselect"
                                            value={col} onChange={e => onMove(card.id, col, e.target.value)}>
                                            {cols.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                        </select></div>
                                        {!mobile && <div><label className="flabel">Auto-delete</label><select
                                            className="fselect" value={expiryDays ?? ''} onChange={e =>
                                                setExpiryDays(e.target.value ? Number(e.target
                                                    .value) : null)}><option value=''>Never</option><option
                                                        value='3'>3d</option><option value='7'>7d</option><option
                                                            value='14'>14d</option></select></div>}
                                    </div>
                                    {mobile && <div className="fgroup"><label className="flabel">Auto-delete</label>
                                        <select className="fselect" value={expiryDays ?? ''} onChange={e =>
                                            setExpiryDays(e.target.value ? Number(e.target.value) :
                                                null)}><option value=''>Never</option><option value='3'>3d</option>
                                            <option value='7'>7d</option><option value='14'>14d</option></select>
                                    </div>}
                                    <div className="fgroup"><label className="flabel">Card Color</label><
                                        CardColorPicker color={color} onChange={setColor} /></div>
                                    <div className="fgroup"><label className="flabel">Notes</label><MdEditor
                                        value={content} onChange={setContent} /></div>
                                </>
                            ) : (
                                <MdView value={content} onChange={v => {
                                    setContent(v);
                                    onSave({
                                        ...card, task, priority, content: v, expiryDays, color,
                                        updatedAt: new Date().toISOString()
                                    });
                                }} imageSizes={imageSizes}
                                    onImageResize={handleImageResize} />
                            )}
                        </div>
                        {editing && <div className="modal-foot"><button className="btn" onClick={() => {
                            setEditing(
                                false);
                            setTask(card.task);
                            setContent(card.content);
                            setPriority(card.priority);
                            setColor(card.color || '');
                        }}>Cancel</button><button className="btn primary"
                            onClick={saveCard}>Save</button></div>}
                    </div>
                </div>
            );
        }

        /* ── ADD CARD MODAL ── */
        function AddCardModal({ defaultCol, cols, onClose, onAdd }) {
            const [col, setCol] = useState(defaultCol);
            const [task, setTask] = useState('');
            const [priority, setPriority] = useState('None');
            const [content, setContent] = useState('');
            const [color, setColor] = useState('');

            function add() {
                if (!task.trim()) return;
                onAdd(col, {
                    id: uid(), task: task.trim(), priority, content, color, createdAt: new Date()
                        .toISOString(), expiryDays: null
                });
                onClose();
            }
            const colData = cols.find(c => c.id === col) || cols[0];
            const mobile = isMobile();
            useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => { document.body.style.overflow = ''; };
            }, []);
            return (
                <div className="overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose() }}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <div className="modal-hdr"><div style={{
                            width: 8, height: 8, borderRadius: '50%',
                            background: colData?.color, flexShrink: 0
                        }} /><div className="modal-title">New Card
                            </div><button className="ibtn" onClick={onClose} style={{
                                width: 28, height: 28,
                                marginLeft: 'auto', border: 'none'
                            }}>✕</button></div>
                        <div className="modal-body">
                            <div className="fgroup"><label className="flabel">Task title</label><input
                                className="finput" value={task} onChange={e => setTask(e.target.value)}
                                placeholder="What needs to be done?" autoFocus onKeyDown={e => e.key ===
                                    'Enter' && add()} /></div>
                            <div style={{
                                display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10,
                                marginBottom: 14
                            }}>
                                <div><label className="flabel">Status</label><select className="fselect" value={
                                    col} onChange={e => setCol(e.target.value)}>{cols.map(c => <option
                                        key={c.id} value={c.id}>{c.label}</option>)}</select></div>
                                <div><label className="flabel">Priority</label><select className="fselect" value={
                                    priority} onChange={e => setPriority(e.target.value)}>{PRIORITY_LIST
                                        .map(p => <option key={p}>{p}</option>)}</select></div>
                            </div>
                            <div className="fgroup"><label className="flabel">Card Color</label><CardColorPicker
                                color={color} onChange={setColor} /></div>

        /* ── ADD COL MODAL ── */
        function AddColModal({ onClose, onAdd }) {
            const [label, setLabel] = useState('');
            const [color, setColor] = useState(COL_PALETTE[4]);

            function add() {
                if (!label.trim()) return;
                onAdd({ id: uid(), label: label.trim(), color, locked: false });
                onClose();
            }
            useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => { document.body.style.overflow = ''; };
            }, []);
            return (
                <div className="overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose() }}>

                            className="ibtn" onClick={onClose} style={{
                                width: 28, height: 28,

                        <div className="modal-body">

                </div>

        /* ── CARD COMPONENT ── */
        function Card({ card, onOpen, onDragStart, onDragOver, onDropOnCard, now, timer }) {
            const [dragSide, setDragSide] = useState(null);
            const blocker = parseBlocker(card.content);
            const days = Math.floor(((now || Date.now()) - new Date(card.createdAt).getTime()) / 864e5);
            const ac = ageClass(card.createdAt, now);
            const ageText = fmtAge(card.createdAt, now);
            const ageCardClass = days > 6 ? 'aged-old' : days > 2 ? 'aged-stale' : '';
            const timerExpired = timer && timer.remaining <= 0;
            const timerRunning = timer && timer.running && timer.remaining > 0;
            const timerPaused = timer && !timer.running && timer.remaining > 0;
            return (
                <div className={`card ${ageCardClass}${dragSide === 'top' ? ' drag-over-top' : dragSide === 'bottom' ? ' drag-over-bottom' : ''}`}
                    draggable onDragStart={e => {
                        e.dataTransfer.effectAllowed = 'move';
                        onDragStart(card.id);
                    }}
                    onDragOver={e => {
                        e.preventDefault();
                        e.stopPropagation(); const r = e.currentTarget.getBoundingClientRect(); const side = e
                            .clientY < r.top + r.height / 2 ? 'top' : 'bottom';
                        setDragSide(side);
                        onDragOver(card.id, side === 'top' ? 'before' : 'after');
                    }}
                    onDragLeave={e => { if (!e.currentTarget.contains(e.relatedTarget)) setDragSide(null); }}
                    onDrop={e => {
                        e.preventDefault();
                        e.stopPropagation(); const s = dragSide;
                        setDragSide(null);
                        onDropOnCard(card.id, s === 'top' ? 'before' : 'after');
                    }}
                    onDragEnd={() => setDragSide(null)} onClick={() => onOpen(card)}
                    style={{ borderLeft: card.color ? `3px solid ${card.color}` : undefined }}>
                    <div className="card-title">{card.task}</div>
                    <div className="card-meta">
                        {card.priority && card.priority !== 'None' && <span className={`priority p${card.priority[1]}`}>
                            {card.priority}</span>}
                        {card.expiryDays && card.doneAt && (() => {
                            const rem = card.expiryDays - daysDiff(card
                                .doneAt); return <span className={`expiry-badge${rem <= 1 ? ' warn' : ''}`}>🗑 {rem >
                                    0 ? rem + 'd' : 'today'}</span>;
                        })()}
                        {(timerRunning || timerPaused || timerExpired) && <span
                            className={`timer-badge ${timerExpired ? 'expired' : timerRunning ? 'running' : 'paused'}`}>⏱ {fmtSecs(
                                Math.max(0, timer.remaining))}</span>}
                        {card.content && !blocker && <span style={{ fontSize: 10, color: 'var(--text3)' }}>📝</span>}
                        <span className={`card-age ${ac}`}>🕐 {ageText}</span>
                    </div>
                    {blocker && <div className="card-blocker"><div className="blocker-lbl">🚫 BLOCKER</div><div
                        style={{ lineHeight: 1.35 }}>{blocker.slice(0, 120)}{blocker.length > 120 ? '…' :
                            ''}</div></div>}
                </div>
            );
        }

        /* ── COLUMN ── */
        function Column({ colData, cards, allCols, onCardDrop, onCardReorder, onColDragStart, onColDrop, onColDragOver,
            onOpen, onAddCard, onDeleteCol, onToggleLock, onRenameCol, dragCardId, isColDragging, isColDropTarget, now,
            timers }) {
            const [renaming, setRenaming] = useState(false);
            const [renameVal, setRenameVal] = useState(colData.label);
            const blockerCount = cards.filter(c => parseBlocker(c.content)).length;
            useEffect(() => setRenameVal(colData.label), [colData.label]);

            function onColBodyDragOver(e) { e.preventDefault(); if (dragCardId) { } else onColDragOver(colData.id); }

            function onColBodyDrop(e) {
                e.preventDefault(); if (dragCardId) onCardDrop(colData.id);
                else onColDrop(colData.id);
            }

            return (
                <div className={`col${isColDragging ? ' col-dragging' : ''}${isColDropTarget ? ' col-drop-target' : ''}`}
                    style={{ '--col-color': colData.color, borderTopColor: colData.color }}
                    onDragOver={onColBodyDragOver} onDrop={onColBodyDrop}>
                    <div className="col-hdr">
                        <div className={`col-grip${colData.locked ? ' locked' : ''}`} draggable={!colData.locked}
                            onDragStart={e => {
                                if (colData.locked) { e.preventDefault(); return; }
                                e.dataTransfer.effectAllowed = 'move';
                                onColDragStart(colData.id);
                            }}>
                            {colData.locked ?
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    strokeWidth="2.5"><rect x="3" y="11" width="18" height="11" rx="2" /><path
                                        d="M7 11V7a5 5 0 0 1 10 0v4" /></svg> :
                                <svg width="12" height="14" viewBox="0 0 10 14" fill="currentColor"><rect x="1" y="1"
                                    width="3" height="1.5" rx=".5" /><rect x="6" y="1" width="3" height="1.5"
                                        rx=".5" /><rect x="1" y="4" width="3" height="1.5" rx=".5" /><rect x="6" y="4"
                                            width="3" height="1.5" rx=".5" /><rect x="1" y="7" width="3" height="1.5"
                                                rx=".5" /><rect x="6" y="7" width="3" height="1.5" rx=".5" /><rect x="1" y="10"
                                                    width="3" height="1.5" rx=".5" /><rect x="6" y="10" width="3" height="1.5"
                                                        rx=".5" /></svg>}
                        </div>
                        <div className="col-dot" style={{ background: colData.color }} />
                        <div className="col-title-wrap">
                            {renaming ?
                                <input className="col-title-inp" value={renameVal} autoFocus onChange={e =>
                                    setRenameVal(e.target.value)} onKeyDown={e => {
                                        if (e.key === 'Enter') {
                                            onRenameCol(colData.id, renameVal);
                                            setRenaming(false);
                                        } if (e.key === 'Escape')
                                            setRenaming(false);
                                    }} onBlur={() => {
                                        if (renameVal.trim())
                                            onRenameCol(colData.id, renameVal);
                                        setRenaming(false);
                                    }} /> :
                                <div className="col-title" onDoubleClick={() => setRenaming(true)}>{colData
                                    .label}</div>}
                        </div>
                        <span className="col-count" style={{ color: colData.color }}>{cards.length}</span>
                        {blockerCount > 0 && <span className="col-blocker-badge">🚫{blockerCount}</span>}
                        <div className="col-hdr-actions">
                            <button className={`chbtn${colData.locked ? ' lock-on' : ''}`} title={colData.locked ?
                                'Unlock' : 'Lock'} onClick={() => onToggleLock(colData.id)}>
                                {colData.locked ?
                                    <svg width="10" height="11" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" strokeWidth="2.5"><rect x="3" y="11" width="18"
                                            height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></svg> :
                                    <svg width="10" height="11" viewBox="0 0 24 24" fill="none"
                                        stroke="currentColor" strokeWidth="2.5"><rect x="3" y="11" width="18"
                                            height="11" rx="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" /></svg>}
                            </button>
                            <button className="chbtn" title="Rename" onClick={() => setRenaming(true)}>
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    strokeWidth="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" /><path
                                        d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" /></svg>
                            </button>
                            <button className="chbtn del-col" title="Delete column" onClick={() => onDeleteCol(colData
                                .id)}>
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    strokeWidth="2.5"><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path
                                        d="M10 11v6M14 11v6" /><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></svg>
                            </button>
                        </div>
                    </div>
                    <div className="col-body">
                        {cards.length === 0 && <div className="col-empty"><svg width="22" height="22" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" strokeWidth="1.5" opacity=".4"><rect x="2" y="3"
                                width="20" height="14" rx="2" /><path d="M8 21h8M12 17v4" /></svg><span>Drop cards
                                    here</span></div>}
                        {cards.map(c => <Card key={c.id} card={c} now={now} timer={timers[c.id] || null}
                            onOpen={onOpen}
                            onDragStart={id => { onCardDrop._setDrag(id, colData.id); }}
                            onDragOver={(tid, pos) => { }}
                            onDropOnCard={(tid, pos) => {
                                onCardReorder(colData.id, dragCardId || c.id, tid,
                                    pos);
                            }} />)}
                        <button className="col-add-btn" title="Add card" onClick={() => onAddCard(colData.id)}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12"
                                    x2="19" y2="12" /></svg>
                        </button>
                    </div>
                </div>
            );
        }

        /* ── FLOATING PANEL ── */
        function FloatingPanel({ title, icon, onClose, children, initW = 560, initH = 420, initX = null, initY = null,
            storageKey, extraHeaderContent }) {
            const mobile = isMobile();
            const defX = initX !== null ? initX : Math.max(20, window.innerWidth - initW - 20);
            const defY = initY !== null ? initY : Math.max(60, window.innerHeight - initH - 80);
            const { sz, setSz, startResize } = useResize(initW, initH, defX, defY);
            const drag = useRef(null);
            const ref = useRef();

            useEffect(() => {
                if (!storageKey) return; try {
                    const saved = JSON.parse(localStorage.getItem(
                        storageKey + '_pos') || 'null'); if (saved) setSz(saved);
                } catch { }
            }, []);
            useEffect(() => {
                if (!storageKey) return; try {
                    localStorage.setItem(storageKey + '_pos', JSON.stringify(
                        sz));
                } catch { }
            }, [sz]);

            function onHdrMouseDown(e) {
                if (e.button !== 0) return;
                if (e.target.closest('button') || e.target.closest('input')) return;
                const el = ref.current;
                if (!el) return;
                const r = el.getBoundingClientRect();
                drag.current = { ox: e.clientX - r.left, oy: e.clientY - r.top };
                const onMove = ev => {
                    if (!drag.current) return;
                    setSz(s => ({ ...s, x: ev.clientX - drag.current.ox, y: ev.clientY - drag.current.oy }));
                };
                const onUp = () => {
                    drag.current = null;
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
                e.preventDefault();
            }

            if (mobile) return (
                <div ref={ref} className="fp">
                    <div className="fp-hdr">
                        <span style={{ fontSize: 14 }}>{icon}</span><span className="fp-title">{title}</span>
                        {extraHeaderContent}
                        <button onClick={onClose} style={{
                            fontSize: 14, color: 'var(--text3)', background: 'none',
                            border: 'none', cursor: 'pointer', padding: '2px 6px', marginLeft: extraHeaderContent ?
                                0 : 'auto'
                        }}>✕</button>
                    </div>
                    <div style={{ flex: 1, overflow: 'auto', minHeight: 0, display: 'flex', flexDirection: 'column' }}>
                        {children}</div>
                </div>
            );

            return (
                <div ref={ref} className="fp" style={{
                    left: sz.x, top: sz.y, width: sz.w, height: sz.h,
                    position: 'fixed'
                }}>
                    {['n', 's', 'e', 'w', 'nw', 'ne', 'sw', 'se'].map(d => (<div key={d} className={`fp-resize ${d}`}
                        onMouseDown={e => startResize(d, e)} />))}
                    <div className="fp-hdr" onMouseDown={onHdrMouseDown}>
                        <span style={{ fontSize: 14 }}>{icon}</span><span className="fp-title">{title}</span>
                        {extraHeaderContent}
                        <button onClick={onClose} style={{
                            fontSize: 14, color: 'var(--text3)', background: 'none',
                            border: 'none', cursor: 'pointer', padding: '2px 6px', marginLeft: extraHeaderContent ?
                                0 : 'auto'
                        }}>✕</button>
                    </div>
                    <div style={{ flex: 1, overflow: 'auto', minHeight: 0, display: 'flex', flexDirection: 'column' }}>
                        {children}</div>
                </div>
            );
        }

        /* ── SCRATCH PAD ── */
        function ScratchPad({ content, onChange, onClose }) {
            const ref = useRef();
            useEffect(() => {

        /* ── CONFLICT MODAL ── */
        function ConflictModal({ conflicts, onResolve, onResolveAll }) {
            const [idx, setIdx] = useState(0);
            // Clamp idx if conflicts shrink (e.g. after external resolve)
            const safeIdx = Math.min(idx, conflicts.length - 1);
            const c = conflicts[safeIdx];
            if (!c) return null;

            function resolve(choice) {
                onResolve(safeIdx, choice);
                // Don't increment — the array shrinks, so safeIdx already points to the next item.
                // Call resolveAll only when this was the last remaining conflict.
                if (conflicts.length <= 1) onResolveAll();
            }

            function diffLines(a, b) {
                const al = (a || '').split('\n'),
                    bl = (b || '').split('\n');
                const maxLen = Math.max(al.length, bl.length);
                const rows = [];
                for (let i = 0; i < maxLen; i++) {
                    const la = al[i] ?? '',
                        lb = bl[i] ?? '';
                    const same = la === lb;
                    rows.push({ la, lb, same });
                }
                return rows;
            }
            const diffRows = diffLines(c.local.content, c.remote.content);

                                    color: 'var(--text3)'

                                padding: '10px 16px', fontSize: 12, color: 'var(--text3)',
                                borderBottom: '1px solid var(--border)'
                            }}>
                                Both devices changed this card at the same time. Choose which version to keep, or
                                merge manually.
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 0, flex: 1 }}>
                                <div style={{ borderRight: '1px solid var(--border)', padding: 12 }}>
                                    <div style={{
                                        fontSize: 11, fontWeight: 700, color: 'var(--blue)',
                                        letterSpacing: .5, marginBottom: 8, textTransform: 'uppercase'
                                    }}>
                                        📱 Your version</div>
                                    <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 6 }}>
                                        Priority: <b>{c.local.priority || 'None'}</b></div>
                                    <div style={{
                                        background: 'var(--bg3)', borderRadius: 8, padding: 10,
                                        fontSize: 12, fontFamily: "'DM Mono',monospace",
                                        lineHeight: 1.7, maxHeight: 260, overflowY: 'auto'
                                    }}>
                                        {diffRows.map((r, i) => (
                                            <div key={i} style={{
                                                background: r.same ? 'transparent' :
                                                    'rgba(79,142,247,.12)', borderRadius: 3,
                                                padding: '0 2px', color: r.same ? 'var(--text2)' :
                                                    'var(--blue)', whiteSpace: 'pre-wrap',
                                                wordBreak: 'break-word'
                                            }}>

                                                    '(empty)'}</span>}

                                    </div>
                                </div>
                                <div style={{ padding: 12 }}>

                                        fontSize: 11, fontWeight: 700, color: 'var(--green)',
                                        letterSpacing: .5, marginBottom: 8, textTransform: 'uppercase'

        /* ── BASE64 CONVERTER ── */
        function Base64Converter({ onClose }) {
            const [input, setInput] = useState('');
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [detectedType, setDetectedType] = useState(null);
            const [fileName, setFileName] = useState('');

            function detectType(str) {
                const s = str.trim();
                if (!s) return null;
                // Check for data URL
                if (s.startsWith('data:')) {
                    const m = s.match(/^data:([^;]+);/);
                    if (m) {
                        const type = m[1];
                        if (type.startsWith('image/')) return 'image';
                        if (type === 'application/pdf') return 'pdf';
                        return 'other';
                    }
                    return 'other';
                }
                // Try to detect from base64 string
                try {
                    const decoded = atob(s.replace(/\s/g, ''));
                    // Check magic bytes for common formats
                    if (decoded.length > 4) {
                        const hex = decoded.slice(0, 8).split('').map(c => c.charCodeAt(0).toString(16).padStart(2,
                            '0')).join('');
                        // JPEG: FF D8 FF
                        if (hex.startsWith('ffd8ff')) return 'image';
                        // PNG: 89 50 4E 47
                        if (hex.startsWith('89504e47')) return 'image';
                        // GIF: 47 49 46 38
                        if (hex.startsWith('47494638')) return 'image';
                        // WebP: 52 49 46 46
                        if (hex.startsWith('52494646')) return 'image';
                        // PDF: 25 50 44 46
                        if (hex.startsWith('25504446')) return 'pdf';
                        // BMP: 42 4D
                        if (hex.startsWith('424d')) return 'image';
                        // SVG: 3C 73 76 67
                        if (hex.startsWith('3c737667')) return 'image';
                    }
                } catch { }
                return 'other';
            }

            function convert() {
                const s = input.trim();
                if (!s) {
                    setError('Please paste Base64 or data URL');
                    setResult(null);
                    setDetectedType(null); return;
                }
                try {
                    let dataUrl = s;
                    let type = detectType(s);
                    // If it's a raw base64 string (no data: prefix), wrap it
                    if (!s.startsWith('data:')) {
                        // Try to determine the MIME type
                        const t = detectType(s);
                        if (t === 'image') {
                            dataUrl = 'data:image/png;base64,' + s.replace(/\s/g, '');
                        } else if (t === 'pdf') {
                            dataUrl = 'data:application/pdf;base64,' + s.replace(/\s/g, '');
                        } else {
                            // Try to decode and guess
                            try {
                                const decoded = atob(s.replace(/\s/g, ''));
                                if (decoded.startsWith('%PDF')) {
                                    dataUrl = 'data:application/pdf;base64,' + s.replace(/\s/g, '');
                                    type = 'pdf';
                                } else {
                                    // Assume image
                                    dataUrl = 'data:image/png;base64,' + s.replace(/\s/g, '');
                                    type = 'image';
                                }
                            } catch {
                                dataUrl = 'data:application/octet-stream;base64,' + s.replace(/\s/g, '');
                                type = 'other';
                            }
                        }
                    }
                    // Validate that it loads
                    setDetectedType(type);
                    setResult(dataUrl);
                    setError(null);
                    // Generate a default filename
                    const ext = type === 'image' ? 'png' : type === 'pdf' ? 'pdf' : 'bin';
                    setFileName(`converted.${ext}`);
                } catch (err) {
                    setError('Invalid Base64: ' + err.message);
                    setResult(null);
                    setDetectedType(null);
                }
            }

            function download() {
                if (!result) return;
                const a = document.createElement('a');
                a.href = result;
                a.download = fileName;
                a.click();
            }

            function copyResult() {
                if (!result) return;
                try { navigator.clipboard.writeText(result); } catch { }
            }

            const isImage = detectedType === 'image';
            const isPdf = detectedType === 'pdf';

            return (
                <div className="overlay" onMouseDown={e => { if (e.target === e.currentTarget) onClose() }}>
                    <div className="modal" style={{ maxWidth: 700 }} onClick={e => e.stopPropagation()}>
                        <div className="modal-hdr">
                            <span style={{ fontSize: 16 }}>🔄</span>
                            <div className="modal-title">Base64 Converter</div>
                            <button className="ibtn" onClick={onClose} style={{
                                width: 28, height: 28,
                                marginLeft: 'auto', border: 'none'
                            }}>✕</button>
                        </div>
                        <div className="modal-body">
                            <div className="fgroup">
                                <label className="flabel">Paste Base64 or Data URL</label>
                                <textarea className="finput" style={{
                                    minHeight: 120, fontFamily: "'DM Mono',monospace",
                                    fontSize: 12, resize: 'vertical'
                                }} value={input} onChange={e =>
                                    setInput(e.target.value)} placeholder="Paste Base64 string or data:image/...;base64,..." />
                            </div>
                            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}>
                                <button className="btn primary" onClick={convert}>🔄 Convert</button>
                                {result && <button className="btn" onClick={download} style={{
                                    borderColor: 'var(--green)',
                                    color: 'var(--green)'
                                }}>⬇️ Download</button>}
                                {result && <button className="btn" onClick={copyResult} style={{
                                    borderColor: 'var(--blue)',
                                    color: 'var(--blue)'
                                }}>📋 Copy URL</button>}
                                <button className="btn" style={{ color: 'var(--text3)' }} onClick={() => {
                                    setInput(
                                        '');
                                    setResult(null);
                                    setError(null);
                                    setDetectedType(null);
                                }}>Clear</button>
                            </div>
                            {error && <div style={{
                                color: 'var(--red)', fontSize: 13, padding: 8, background: 'var(--red-dim)',
                                borderRadius: 6, marginBottom: 10
                            }}>❌ {error}</div>}
                            {result && (
                                <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12 }}>
                                    <div style={{ fontSize: 11, color: 'var(--text3)', marginBottom: 6 }}>
                                        Detected: <span style={{ fontWeight: 600, color: 'var(--text)' }}>{isImage ?
                                            '🖼️ Image' : isPdf ? '📄 PDF' : '📄 Other'}</span>
                                        {isPdf && <span style={{ marginLeft: 8 }}>— PDF will open in new tab</span>}
                                    </div>
                                    <div className="b64-preview" style={{
                                        background: isPdf ? 'var(--bg3)' :
                                            'transparent'
                                    }}>
                                        {isImage ? (
                                            <img src={result} alt="Preview" style={{
                                                maxWidth: '100%', maxHeight: 400,
                                                objectFit: 'contain', borderRadius: 6
                                            }} />
                                        ) : isPdf ? (
                                            <div className="b64-preview pdf-preview">
                                                <svg width="64" height="64" viewBox="0 0 24 24" fill="none"
                                                    stroke="currentColor" strokeWidth="1.5"><path d="M4 4h16v16H4z" /><path
                                                        d="M8 8h8M8 12h8M8 16h6" /></svg>
                                                <span>PDF detected — click Download to save</span>
                                                <a href={result} target="_blank" rel="noopener" className="btn"
                                                    style={{ borderColor: 'var(--blue)', color: 'var(--blue)' }}>
                                                    📖 Open in new tab
                                                </a>
                                            </div>
                                        ) : (
                                            <div style={{ textAlign: 'center', padding: 20, color: 'var(--text3)' }}>
                                                <div style={{ fontSize: 32, marginBottom: 8 }}>📄</div>
                                                <div>Binary data — use Download</div>
                                            </div>
                                        )}
                                    </div>
                                    <div style={{ marginTop: 8, fontSize: 10, color: 'var(--text3)', wordBreak: 'break-all' }}>
                                        <span style={{
                                            fontFamily: "'DM Mono',monospace", background: 'var(--bg3)',
                                            padding: '2px 6px', borderRadius: 4
                                        }}>data:{result.split(',')[0]?.slice(
                                            0, 40)}…</span>
                                    </div>
                                </div>
                            )}

        /* ── APP ── */
        function App() {
            const WS_SERVER_URL = 'https://daily-2.onrender.com';

            const [myPeerId, setMyPeerId] = useState('');
            const [conflicts, setConflicts] = useState([]);
            const pendingRemote = useRef(null);
            const isSyncing = useRef(false);
            const broadcastTimer = useRef(null);
            const colsRef = useRef(cols);
            const cardsRef = useRef(cards);
            const scratchRef = useRef(scratch);
            const activeRoomRef = useRef('');          // ← NEW: stable ref for reconnect
            const lastSyncedCards = useRef({});  // cardId → updatedAt at last successful sync
            const [showBase64, setShowBase64] = useState(false);



            useEffect(() => { colsRef.current = cols; }, [cols]);
            useEffect(() => { cardsRef.current = cards; }, [cards]);
            useEffect(() => { scratchRef.current = scratch; }, [scratch]);
            useEffect(() => { activeRoomRef.current = activeRoom; }, [activeRoom]); // ← NEW

            function tryParse(s, fb) { try { return JSON.parse(s); } catch { return fb; } }

            function mergeRemoteState(remoteCols, remoteCards, remoteScratch) {
    const localCols  = colsRef.current;
    const localCards = cardsRef.current;
    const newScratch = remoteScratch !== undefined ? remoteScratch : scratchRef.current;

    // Merge column list
    const newCols = [...localCols];
    const localColIds = new Set(localCols.map(c => c.id));
    (remoteCols || []).forEach(c => { if (!localColIds.has(c.id)) newCols.push(c); });

    // Flat maps: cardId → { card, col }
    const localMap = {};
    Object.entries(localCards).forEach(([colId, list]) =>
        (list || []).forEach(c => { localMap[c.id] = { card: c, col: colId }; })
    );
    const remoteMap = {};
    Object.entries(remoteCards || {}).forEach(([colId, list]) =>
        (list || []).forEach(c => { remoteMap[c.id] = { card: c, col: colId }; })
    );

    // LWW: for every card decide winner + winner's column
    const winners = {};
    new Set([...Object.keys(localMap), ...Object.keys(remoteMap)]).forEach(id => {
        const L = localMap[id], R = remoteMap[id];
        if (!L) { winners[id] = R; return; }   // new card on remote
        if (!R) { winners[id] = L; return; }   // local-only, keep
        const lTs = new Date(L.card.updatedAt || L.card.createdAt || 0).getTime();
        const rTs = new Date(R.card.updatedAt || R.card.createdAt || 0).getTime();
        winners[id] = rTs > lTs ? R : L;
    });

    // Reconstruct columns — use REMOTE ordering so drags are preserved
    const newCards = {};
    newCols.forEach(c => { newCards[c.id] = []; });
    const placed = new Set();

    // First pass: place cards in remote order
    Object.entries(remoteCards || {}).forEach(([, list]) =>
        (list || []).forEach(rc => {
            const w = winners[rc.id];
            if (!w || placed.has(rc.id)) return;
            if (!newCards[w.col]) newCards[w.col] = [];
            newCards[w.col].push({ ...w.card });
            placed.add(rc.id);
        })
    );
    // Second pass: place local-only cards (not yet placed)
    Object.entries(localCards).forEach(([, list]) =>
        (list || []).forEach(lc => {
            const w = winners[lc.id];
            if (!w || placed.has(lc.id)) return;
            if (!newCards[w.col]) newCards[w.col] = [];
            newCards[w.col].push({ ...w.card });
            placed.add(lc.id);
        })
    );

    return { cols: newCols, cards: newCards, scratch: newScratch, conflicts: [] };
}


            //* ── APPLY REMOTE ── */
            function applyRemoteWithConflicts(data) {
    if (!data || (!data.cols && !data.cards && data.scratch === undefined)) return;
    isSyncing.current = true;   // ← tells debounce "don't broadcast this change"

    const result = mergeRemoteState(
        data.cols   || colsRef.current,
        data.cards  || cardsRef.current,
        data.scratch
    );

    setCols(result.cols);
    setCards(result.cards);
    if (result.scratch !== undefined) setScratch(result.scratch);
    setPeerStatus('connected');

    setTimeout(() => { isSyncing.current = false; }, 150);
}

            function handleIncoming(data) {
                if (!data || (!data.cols && !data.cards && data.scratch === undefined)) return;
                if (data._sid === SESSION_ID.current) return;
                applyRemoteWithConflicts(data);
            }

            /* ── RESOLVE CONFLICT ── */
            function resolveConflict(idx, choice) {
                const c = conflicts[idx];
                if (!c) return;
                // Apply the chosen version to the local state
                setCards(prev => {
                    const col = Object.keys(prev).find(k => (prev[k] || []).some(x => x.id === c.cardId));
                    if (!col) return prev;
                    let chosen = c.local;
                    if (choice === 'remote') chosen = c.remote;
                    else if (choice === 'merge') {
                        chosen = {
                            ...c.local,
                            content: (c.local.content || '').trim() + '\n\n---\n**Merged from remote:**\n' + (c
                                .remote.content || '').trim(),
                            updatedAt: new Date().toISOString()
                        };
                    }
                    return {
                        ...prev,
                        [col]: (prev[col] || []).map(x => x.id === c.cardId ? chosen : x)
                    };
                });
                // Remove this conflict from the list
                setConflicts(prev => prev.filter((_, i) => i !== idx));
            }

            function resolveAllConflicts() {
                pendingRemote.current = null;
                setConflicts([]);
                // Trigger a fresh broadcast so the other device gets our resolved state
                setTimeout(() => broadcastWebSocket(activeRoomRef?.current || activeRoom), 100);
            }

            function broadcastWebSocket(room) {
                const r = room || activeRoom;
                if (!wsClient.current || wsClient.current.readyState !== WebSocket.OPEN || !r) return;
                wsClient.current.send(JSON.stringify({
                    _cols: JSON.stringify(colsRef.current),
                    _cards: JSON.stringify(cardsRef.current),
                    _scratch: scratchRef.current || '',
                    _ts: Date.now(),
                    _sid: SESSION_ID.current,
                }));
                // Mark everything we just sent as the sync baseline
                Object.values(cardsRef.current).forEach(list =>
                    (list || []).forEach(card => {
                        lastSyncedCards.current[card.id] = card.updatedAt || card.createdAt;
                    })
                );
            }

            function wsConnect(room) {
                const r = (room || '').trim();
                if (!r) return;
                if (wsClient.current) {
                    wsClient.current.close();
                    wsClient.current = null;
                }
                setPeerStatus('connecting');
                const ws = new WebSocket(`${WS_SERVER_URL}/?room=${encodeURIComponent(r)}`);
                wsClient.current = ws;

ws.onopen = () => {
    wsConnected.current = true;
    setPeerStatus('connected');
    setPeerCount(1);
    setActiveRoom(r);
    setMyPeerId(SESSION_ID.current);
    addToast('WebSocket sync connected ✓', 'success');
    // Tell existing peers to send us their current state
    ws.send(JSON.stringify({ _type: 'request_state', _sid: SESSION_ID.current }));
    // Also push our own state after a short delay
    setTimeout(() => broadcastWebSocket(r), 400);
};

ws.onmessage = (event) => {
    try {
        const msg = JSON.parse(event.data);
        if (msg._sid === SESSION_ID.current) return;

        if (msg._type === 'request_state') {
            // A peer just joined — send them our full state immediately
            setTimeout(() => broadcastWebSocket(r), 100);
            return;
        }
        if (msg._type === 'peers') {
            setPeerCount(Array.isArray(msg.peers) ? msg.peers.length : 0);
            return;
        }

        handleIncoming({
            cols:    msg._cols   ? JSON.parse(msg._cols)   : null,
            cards:   msg._cards  ? JSON.parse(msg._cards)  : null,
            scratch: msg._scratch,
            ts:      msg._ts,
            _sid:    msg._sid,
        });
    } catch (e) { console.warn('WS parse error', e); }
};

                ws.onerror = (err) => {
                    console.warn('WebSocket error', err);
                    setPeerStatus('disconnected');
                    addToast('Sync error', 'error');
                };

                ws.onclose = () => {
                    wsConnected.current = false;
                    setPeerStatus('disconnected');
                    setPeerCount(0);
                    // Use ref (not stale state closure) for reliable reconnect
                    setTimeout(() => {
                        if (activeRoomRef.current && !wsConnected.current) {
                            wsConnect(activeRoomRef.current);
                        }
                    }, 3000);
                };
            }

            function createRoom() {
                const r = 'daily-' + Math.random().toString(36).slice(2, 8);
                setRoomId(r);
                wsConnect(r);
            }

            function joinRoom() {
                if (!roomId.trim()) return;
                wsConnect(roomId);
            }

            function disconnectRoom() {
                if (wsClient.current) {
                    wsClient.current.close();
                    wsClient.current = null;
                }
                wsConnected.current = false;
                setActiveRoom('');
                setMyPeerId('');
                setPeerStatus('disconnected');
                setPeerCount(0);
                addToast('Disconnected from sync');
            }

            // Auto-join from URL
            useEffect(() => {
                const r = new URLSearchParams(location.search).get('room');
                if (r) {
                    setRoomId(r);
                    setTimeout(() => wsConnect(r), 600);
                }
            }, []);

            // Auto-reconnect to saved room
            useEffect(() => {
                const savedRoom = localStorage.getItem('daily_active_room');
                if (savedRoom && !activeRoom) {
                    setRoomId(savedRoom);
                    setTimeout(() => wsConnect(savedRoom), 500);
                }
            }, []);

            useEffect(() => {
                if (activeRoom) {
                    localStorage.setItem('daily_active_room', activeRoom);
                } else {
                    localStorage.removeItem('daily_active_room');
                }
            }, [activeRoom]);

            // Debounced broadcast
useEffect(() => {
    saveData({ cols, cards });
    if (!activeRoom || !wsConnected.current || conflicts.length > 0) return;
    if (isSyncing.current) return;   // ← skip echo — this change came from remote
    clearTimeout(broadcastTimer.current);
    broadcastTimer.current = setTimeout(() => broadcastWebSocket(activeRoom), 300);
}, [cols, cards, scratch, conflicts]);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible' && activeRoom && !wsConnected.current) {
                        wsConnect(activeRoom);
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, [activeRoom]);

            useEffect(() => {
                function onResize() { setWindowW(window.innerWidth); }
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            const mobile = windowW <= 640;
            const tablet = windowW > 640 && windowW <= 900;

            const [timers, setTimers] = useState(() => {
                const saved = loadTimers();
                const now = Date.now();
                const updated = {};
                Object.entries(saved).forEach(([id, t]) => {
                    if (t.running && t.endAt) {
                        const remaining = Math.max(0, Math.round((t.endAt - now) /
                            1000));
                        updated[id] = { ...t, remaining, running: remaining > 0 };
                    } else {
                        updated[id] =
                            t;
                    }
                });
                return updated;
            });
            const [alarms, setAlarms] = useState([]);
            useEffect(() => { saveTimers(timers); }, [timers]);

            useEffect(() => {
                const id = setInterval(() => {
                    setTimers(prev => {
                        const now = Date.now();
                        let changed = false;
                        const next = { ...prev };
                        const newAlarms = [];
                        Object.entries(next).forEach(([cardId, t]) => {
                            if (t.running && t.remaining > 0) {
                                const rem = t.endAt ? Math.max(0, Math.round((t.endAt -
                                    now) / 1000)) : t.remaining - 1;
                                if (rem !== t.remaining) {
                                    changed = true;
                                    next[cardId] = { ...t, remaining: rem }; if (rem <=
                                        0) {
                                        next[cardId].running = false; let taskName =
                                            'Task';
                                        Object.values(cards).forEach(arr => {
                                            const c =
                                                arr.find(x => x.id === cardId); if (c)
                                                taskName = c.task;
                                        });
                                        newAlarms.push({ id: cardId, task: taskName });
                                    }
                                }
                            }
                        });

                            }
                        }
                        return changed ? next : prev;
                    });
                }, 1000);
                return () => clearInterval(id);
            }, [cards]);

            const [dragCardId, setDragCardId] = useState(null);
            const [dragCardFrom, setDragCardFrom] = useState(null);
            const [dragColId, setDragColId] = useState(null);
            const [colDropTarget, setColDropTarget] = useState(null);
            const [openCard, setOpenCard] = useState(null);

            const [showShortcuts, setShowShortcuts] = useState(false);
            const [showEditor, setShowEditor] = useState(false);
            const [showDraw, setShowDraw] = useState(false);
            const [showAi, setShowAi] = useState(false);
            const [showOverflow, setShowOverflow] = useState(false);
            const [confetti, setConfetti] = useState(false);
            const confettiKey = useRef(0);
            const [toasts, setToasts] = useState([]);
            const [light, setLight] = useState(() => {

                }
            });
            const [search, setSearch] = useState('');
            const [searchOpen, setSearchOpen] = useState(false);
            const searchRef = useRef();
            const [pwaPrompt, setPwaPrompt] = useState(null);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', e => {
                    e.preventDefault();
                    setPwaPrompt(e);
                });
            }, []);
            useEffect(() => { saveData({ cols, cards }); }, [cols, cards]);
            useEffect(() => {
                document.body.classList.toggle('light', light); try {
                    localStorage.setItem('daily_theme',
                        light ? 'light' : 'dark');
                } catch { }
            }, [light]);

            useEffect(() => {
                setCards(c => {
                    const nc = { ...c };
                    let ch = false;
                    Object.keys(nc).forEach(k => {
                        const f = (nc[k] || []).filter(card => !card.expiryDays || !card
                            .doneAt || daysDiff(card.doneAt) < card.expiryDays); if (f.length !== nc[k]
                                .length) {

                });

            useEffect(() => {

                    if (e.key === 'e' || e.key === 'E') setShowEditor(o => !o);

                    if (e.key === '?') setShowShortcuts(true);

                        setOpenCard(null);
                        setAddCardCol(null);

            function addToast(msg, type = '') {

                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
            }

            function refreshAge() {

                setTimeout(() => setSpinning(false), 650);
                addToast('Ages refreshed ✓', 'success');

            function dismissAlarms() {
                stopAlarmSound();
                setAlarms([]);
            }

            function onCardDragStart(id, fromCol) {
                setDragCardId(id);
                setDragCardFrom(fromCol);
            }

            function onCardDrop(toCol) {
                if (!dragCardId) return;
                if (dragCardFrom === toCol) {
                    setDragCardId(null);
                    setDragCardFrom(null); return;
                }
                setCards(c => {
                    const card = (c[dragCardFrom] || []).find(x => x.id === dragCardId);
                    if (!card) return c;
                    const updated = { ...card, updatedAt: new Date().toISOString() }; 
                    const isDone = cols.find(cl => cl.id === toCol)?.label?.toLowerCase() === 'done' || toCol ===
                        'DONE';
                    const wasDone = cols.find(cl => cl.id === dragCardFrom)?.label?.toLowerCase() === 'done' ||
                        dragCardFrom === 'DONE';
                    if (isDone && !card.doneAt) {
                        updated.doneAt = new Date().toISOString();
                        confettiKey.current++;
                        setConfetti(true);
                        setTimeout(() => setConfetti(false), 3200);
                        addToast('🎉 Done!', 'success');
                    }
                    if (wasDone && !isDone) updated.doneAt = undefined;
                    return {
                        ...c, [dragCardFrom]: (c[dragCardFrom] || []).filter(x => x.id !== dragCardId),
                        [toCol]: [...(c[toCol] || []), updated]
                    };
                });
                setDragCardId(null);
                setDragCardFrom(null);
                setTimeout(() => {
                    if (activeRoom && wsConnected.current && conflicts.length === 0)
                        broadcastWebSocket(activeRoom);
                }, 50);
            }
            onCardDrop._setDrag = onCardDragStart;

            function onCardReorder(colId, srcId, targetId, pos) {
                if (!srcId || srcId === targetId) return;
                const srcCol = dragCardFrom || Object.keys(cards).find(k => (cards[k] || []).some(x => x.id === srcId));
                if (!srcCol) return;
                setCards(c => {
                    let srcCard = (c[srcCol] || []).find(x => x.id === srcId);
                    if (!srcCard) return c;
                    const updated = { ...srcCard, updatedAt: new Date().toISOString() };
                    const isDone = cols.find(cl => cl.id === colId)?.label?.toLowerCase() === 'done' || colId ===
                        'DONE';
                    const wasDone = cols.find(cl => cl.id === srcCol)?.label?.toLowerCase() === 'done' ||
                        srcCol === 'DONE';
                    if (isDone && !srcCard.doneAt) {
                        updated.doneAt = new Date().toISOString();
                        confettiKey.current++;
                        setConfetti(true);
                        setTimeout(() => setConfetti(false), 3200);
                        addToast('🎉 Done!', 'success');
                    }
                    if (wasDone && !isDone) updated.doneAt = undefined;
                    let newSrc = (c[srcCol] || []).filter(x => x.id !== srcId);
                    let newDest = srcCol === colId ? newSrc : [...(c[colId] || [])];
                    if (srcCol === colId) newDest = newSrc;
                    const ti = newDest.findIndex(x => x.id === targetId);
                    if (ti === -1) newDest = [...newDest, updated];
                    else {
                        newDest = [...newDest];
                        newDest.splice(pos === 'after' ? ti + 1 : ti, 0, updated);
                    }
                    if (srcCol === colId) return { ...c, [colId]: newDest };
                    return { ...c, [srcCol]: newSrc, [colId]: newDest };
                });
                setDragCardId(null);
                setDragCardFrom(null);
                setTimeout(() => {
                    if (activeRoom && wsConnected.current && conflicts.length === 0)
                        broadcastWebSocket(activeRoom);
                }, 50);
            }

            function onColDragStart(id) {
                if (dragCardId) return;
                setDragColId(id);
            }

            function onColDragOver(id) {
                if (!dragColId || id === dragColId) return;
                setColDropTarget(id);
            }

            function onColDrop(toId) {
                setColDropTarget(null); if (!dragColId || dragColId === toId) return;
                setCols(c => {
                    const fi = c.findIndex(x => x.id === dragColId),
                        ti = c.findIndex(x => x.id === toId); if (fi < 0 || ti < 0) return c; const n = [...c]; const [
                            m
                        ] = n.splice(fi, 1);
                    n.splice(ti, 0, m); return n;
                });
                setDragColId(null);
                addToast('Column reordered');
            }

            function onToggleLock(id) {
                const was = cols.find(x => x.id === id)?.locked;
                setCols(c => c.map(x => x.id === id ? { ...x, locked: !x.locked } : x));
                addToast(was ? 'Unlocked 🔓' : 'Locked 🔒');
            }

            function onRenameCol(id, label) {
                if (label.trim()) setCols(c => c.map(x => x.id === id ? {
                    ...x,
                    label: label.trim()
                } : x));
            }

            function onDeleteCol(id) {
                const name = cols.find(c => c.id === id)?.label; if (!confirm(
                    `Delete "${name}"? All cards will be lost.`)) return;
                setCols(c => c.filter(x => x.id !== id));
                setCards(c => {
                    const n = { ...c };
                    delete n[id]; return n;
                });
                addToast('Column deleted');
            }

            function onAddCol(colDef) {
                setCols(c => [...c, colDef]);
                setCards(c => ({ ...c, [colDef.id]: [] }));
                addToast(`"${colDef.label}" created`, 'success');
            }

            function onSaveCard(updated) {
                setCards(c => {
                    const col = Object.keys(c).find(k => (c[k] || []).some(x =>
                        x.id === updated.id)); if (!col) return c; return {
                            ...c, [col]: (c[col] || []).map(x => x
                                .id === updated.id ? updated : x)
                        };
                });
                setOpenCard(updated);
                addToast('Saved ✓', 'success');
            }

            function onDeleteCard(id) {
                setCards(c => {
                    const col = Object.keys(c).find(k => (c[k] || []).some(x => x
                        .id === id)); if (!col) return c; return {
                            ...c, [col]: (c[col] || []).filter(x => x.id !==
                                id)
                        };
                });
                setOpenCard(null);
                setTimers(t => {
                    const n = { ...t };
                    delete n[id]; return n;
                });
                addToast('Deleted');
            }

            function onMoveCard(id, fromCol, toCol) {
                if (fromCol === toCol) return;
                setCards(c => {
                    const card = (c[fromCol] || []).find(x => x.id === id); if (!card) return c; 
                        const updated = { ...card, updatedAt: new Date().toISOString() }; const isDone = cols.find(cl => cl.id === toCol)?.label?.toLowerCase() ===
                            'done' || toCol === 'DONE'; const wasDone = cols.find(cl => cl.id === fromCol)?.label
                                ?.toLowerCase() === 'done' || fromCol === 'DONE'; if (isDone && !card.doneAt) updated
                                    .doneAt = new Date().toISOString(); if (wasDone && !isDone) updated.doneAt = undefined;
                    return {
                        ...c, [fromCol]: (c[fromCol] || []).filter(x => x.id !== id), [toCol]: [...(c[
                            toCol] || []), updated]
                    };
                });
                setOpenCardCol(toCol);
                addToast('Moved to ' + cols.find(x => x.id === toCol)?.label, 'success');
            }

            function onAddCard(col, card) {
                setCards(c => ({ ...c, [col]: [...(c[col] || []), card] }));
                addToast('Card added', 'success');
            }

            function exportJSON() {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify({ cols, cards }, null, 2)], { type: 'application/json' }));
                a.download = 'daily-export.json';
                a.click();
                addToast('Exported!', 'success');
            }

            function importJSON() {
                const inp = document.createElement('input');
                inp.type = 'file';
                inp.accept = '.json';
                inp.onchange = e => {
                    const f = e.target.files[0]; if (!f) return; const r = new FileReader();
                    r.onload = ev => {
                        try {
                            const d = JSON.parse(ev.target.result); if (d.cols && d.cards) {
                                setCols(
                                    d.cols);
                                setCards(d.cards);
                                addToast('Board imported!', 'success');
                            } else addToast('Invalid format',
                                'error');
                        } catch { addToast('Failed to parse', 'error'); }
                    };
                    r.readAsText(f);
                };
                inp.click();
            }

            async function installPwa() {
                if (pwaPrompt) {
                    try {
                        pwaPrompt.prompt(); const { outcome } = await pwaPrompt
                            .userChoice; if (outcome === 'accepted') {

                                addToast('App installed! 🎉', 'success');
                            }
                    } catch {
                        addToast(
                            'Install failed — try browser menu', 'error');
                    }
                } else {
                    const ua = navigator.userAgent
                        .toLowerCase(); if (ua.includes('chrome')) addToast('Chrome: ⋮ Menu → Install App',
                            'success');
                    else if (ua.includes('edge')) addToast('Edge: ⋯ Menu → Apps → Install', 'success');
                    else if (ua.includes('firefox')) addToast('Firefox: Use Chrome/Edge for PWA install', '');
                    else addToast('Use browser menu → Add to Home Screen', 'success');
                }
            }

            const q = search.trim().toLowerCase();
            const filteredCards = useMemo(() => {
                if (!q) return cards; const out = {}; Object.keys(cards).forEach(
                    k => {
                        out[k] = (cards[k] || []).filter(c => c.task.toLowerCase().includes(q) || (c.content || '')

            }, [cards, q]);

                { icon: '⌨️', label: 'Shortcuts', action: () => setShowShortcuts(true) },
                null,
                { icon: '⬇️', label: 'Import JSON', action: () => importJSON() },
                { icon: '⬆️', label: 'Export JSON', action: () => exportJSON() },

                                            if (

                            <button className={`ibtn${searchOpen ? ' active' : ''}`} data-tip="Search" onClick={() => {

                        <button className={`ibtn${showAi ? ' active' : ''}`} data-tip="AI Assistants" onClick={() =>

                        {/* Tools dropdown */}
                        <button className="ibtn" data-tip="Base64 Converter" onClick={() => setShowBase64(true)} style={{ color: 'var(--text)', borderColor: 'var(--border2)' }}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="16 8 12 4 8 8" />
                                <polyline points="8 16 12 20 16 16" />
                            </svg>
                        </button>
                        <button className={`ibtn${(peerStatus === 'connected' || peerStatus === 'hosting') ? ' active' : ''}`}
                            data-tip="Sync" onClick={() => setShowSyncModal(true)} style={{ position: 'relative' }}><svg
                                width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                strokeWidth="2.5"><circle cx="5" cy="6" r="2.5" /><circle cx="19" cy="6" r="2.5" /><circle
                                    cx="12" cy="18" r="2.5" /><path d="M7 7.5L10.5 16M17 7.5L13.5 16M7.5 6h9" /></svg>{(peerStatus ===
                                        'connected' || peerStatus === 'hosting') && <div className={`sync-dot ${peerStatus === 'connected' ? 'connected' : 'connecting'}`}
                                            style={{ position: 'absolute', bottom: -2, right: -2, width: 8, height: 8 }} />}</button>
                        <button className="ibtn" data-tip="Refresh ages" onClick={refreshAge}><svg className={
                            spinning ? 'spin' : ''} width="14" height="14" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" strokeWidth="2.5"><polyline points="23 4 23 10 17 10" /><path
                                d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></svg></button>
                        <button className="ibtn" data-tip={light ? 'Dark mode' : 'Light mode'} onClick={() => setLight(
                            l => !l)}>{light ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" strokeWidth="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg> :
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"

                                        x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line
                                        x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line
                                        x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line
                                        x1="18.36" y1="5.64" x2="19.78" y2="5.64" /></svg>}</button>
                        <button className="ibtn" data-tip="Shortcuts" onClick={() => setShowShortcuts(true)}><svg
                            width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            strokeWidth="2.5"><rect x="2" y="6" width="20" height="12" rx="2" /><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8" /></svg></button>
                        <button className="ibtn" data-tip="Import JSON" onClick={importJSON}><svg width="14" height="14"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline

                        <button className="ibtn" data-tip="Export JSON" onClick={exportJSON}><svg width="14" height="14"

                                points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></svg></button>
                        <button className="ibtn" data-tip="Install App" onClick={installPwa} style={{
                            color: 'var(--blue)',

                        }}><svg width="14"
                            height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path
                                    d="M12 2v12M7 9l5 5 5-5" /><path d="M20 17v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2" /></svg></button>
                    </div>

            const renderMobileTabletHeader = () => (
                <>
                    <div style={{ display: 'flex', gap: 4, flexShrink: 0 }}>
                        <div className="stat-pill" style={{ fontSize: 10, padding: '2px 6px' }}>{totalAll}</div>
                        {totalBlockers > 0 && <div className="stat-pill red" style={{ fontSize: 10, padding: '2px 6px' }}>

                        {activeTimers > 0 && <div className="stat-pill" style={{

                    <div style={{ marginLeft: 'auto', display: 'flex', gap: 3, alignItems: 'center' }}>

                                        r="2.5" /><path d="M7 7.5L10.5 16M17 7.5L13.5 16M7.5 6h9" /></svg>{(peerStatus ===

                                    onOpen={card => {

                                    onAddCard={setAddCardCol} onDeleteCol={onDeleteCol} onToggleLock={onToggleLock}

                            <button className="add-col-btn" title="Add column" onClick={() => setShowAddCol(true)}>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12"
                                        x2="19" y2="12" /></svg>

                            strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19"
                                y2="12" /></svg>
                    </button>

                    {openCard && openCardCol && (<CardModal card={openCard} col={openCardCol} cols={cols} now={now}
                        timers={timers} setTimers={setTimers} addToast={addToast} onClose={() => setOpenCard(
                            null)} onSave={onSaveCard} onDelete={onDeleteCard} onMove={onMoveCard} />)}
                    {addCardCol && <AddCardModal defaultCol={addCardCol} cols={cols} onClose={() => setAddCardCol(

                        disconnectRoom={disconnectRoom} myPeerId={myPeerId} activeRoom={activeRoom}
                        broadcastWebSocket={broadcastWebSocket} />}
                    {conflicts.length > 0 && <ConflictModal conflicts={conflicts} onResolve={resolveConflict}
                        onResolveAll={resolveAllConflicts} />}
                    {confetti && <Confetti key={confettiKey.current} />}
                    <Toast toasts={toasts} />
                    <AlarmOverlay alarms={alarms} onDismiss={dismissAlarms} />
                    {pwaPrompt && !mobile && (
                        <div className="pwa-banner">
                            <div><div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>📱 Install Daily.</div>
                                <div style={{ fontSize: 11, color: 'var(--text3)' }}>Use as a standalone app</div></div>
                            <button className="pwa-install" onClick={installPwa}>Install</button>
                            <button className="pwa-dismiss" onClick={() => setPwaPrompt(null)}>✕</button>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
