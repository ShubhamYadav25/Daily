<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daily.</title>
<meta name="description" content="Daily. — Your personal kanban board"/>
<meta name="theme-color" content="#0e0f11"/>
<link rel="manifest" href="#" id="manifest-link"/>
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23000000"/><path d="M22 14H34C46 14 54 22 54 32C54 42 46 50 34 50H22V14Z" fill="%23ffffff"/></svg>'/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f11;--bg2:#141518;--bg3:#1c1e22;--bg4:#242629;
  --border:#2a2c31;--border2:#363940;
  --text:#e8e9eb;--text2:#9a9da6;--text3:#5a5d66;
  --blue:#4f8ef7;--blue-dim:#1a2d52;
  --green:#3ecf8e;--green-dim:#0d3326;
  --amber:#f7c35a;--amber-dim:#3d2e0a;
  --red:#f76f6f;--red-dim:#3d1010;
  --purple:#a78bfa;--purple-dim:#251d45;
  --radius:10px;--radius-lg:14px;
  --shadow:0 2px 14px rgba(0,0,0,.45);
  --hdr:50px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;overscroll-behavior:contain}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;line-height:1}
input,textarea,select{font-family:inherit;color:inherit;background:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;min-height:100vh}
.header{display:flex;align-items:center;gap:5px;padding:0 10px;height:var(--hdr);border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:20;position:relative}
.logo{font-size:18px;font-weight:600;letter-spacing:-.5px;color:var(--text);flex-shrink:0;margin-right:4px;cursor:default}
.logo span{color:var(--blue)}
.stat-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.stat-pill.red{color:var(--red);border-color:var(--red-dim);background:var(--red-dim)}
.stat-pill.green{color:var(--green);border-color:var(--green-dim);background:var(--green-dim)}
.ibtn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--text2);transition:background .12s,color .12s,border-color .12s;flex-shrink:0;position:relative;padding:0}
.ibtn:hover{background:var(--bg3);color:var(--text)}
.ibtn.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.ibtn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.ibtn.primary:hover{opacity:.88}

/* Drawing text overlays — prevent blurry text */
.fp div[style*="position: absolute"] {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

[data-tip]{position:relative}

[data-tip]:hover::after{content:attr(data-tip);position:absolute;top:calc(100% + 7px);bottom:auto;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);font-size:11px;font-weight:500;padding:4px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.4)}
[data-tip]:hover::before{content:'';position:absolute;top:calc(100% + 2px);bottom:auto;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:var(--border2);border-top-color:transparent;pointer-events:none;z-index:9999}

/* Eraser cursor */
.eraser-cursor{position:absolute;border:2px solid var(--text);border-radius:50%;pointer-events:none;z-index:15;opacity:.6;mix-blend-mode:difference}
.search-wrap{position:relative;display:flex;align-items:center}
.search-inp{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px 5px 32px;font-size:13px;color:var(--text);outline:none;width:150px}
.search-inp:focus{border-color:var(--blue)}
.board-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.board{display:flex;gap:10px;padding:12px;flex:1;overflow-x:auto;overflow-y:hidden;min-height:0;align-items:stretch}
.board::-webkit-scrollbar{height:6px}
.col{display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);min-width:230px;max-width:290px;flex:1;overflow:hidden;min-height:0;transition:opacity .15s,transform .15s,border-color .15s;border-top:3px solid var(--border)}
@media(min-width:641px){
  .col{border-top:1px solid var(--border)}
}
.col.col-dragging{opacity:.4;transform:scale(.97)}
.col.col-drop-target{border-color:var(--blue);background:rgba(79,142,247,.04)}
.col-hdr{padding:9px 10px 7px;display:flex;align-items:center;gap:5px;flex-shrink:0;border-bottom:1px solid var(--border)}
.col-grip{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;cursor:grab;color:var(--text3);transition:.12s;flex-shrink:0;user-select:none}
.col-grip:hover{color:var(--text2);background:var(--bg4)}
.col-grip.locked{cursor:default;color:var(--amber)}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-title-wrap{flex:1;min-width:0;overflow:hidden}
.col-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-title-inp{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text);background:var(--bg3);border:1px solid var(--blue);border-radius:5px;padding:1px 6px;outline:none;width:100%}
.col-count{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--bg4);flex-shrink:0}
.col-blocker-badge{display:flex;align-items:center;gap:2px;font-size:10px;color:var(--red);flex-shrink:0}
.col-hdr-actions{display:flex;gap:1px;opacity:0;transition:.12s;flex-shrink:0}
.col-hdr:hover .col-hdr-actions{opacity:1}
.chbtn{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);transition:.1s;border:none;background:none;cursor:pointer}
.chbtn:hover{background:var(--bg4);color:var(--text2)}
.chbtn.lock-on{color:var(--amber)}
.chbtn.del-col:hover{color:var(--red);background:var(--red-dim)}
.col-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px}
.col-add-btn{width:32px;height:28px;border-radius:7px;color:var(--text3);border:1px dashed var(--border);background:transparent;transition:.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;cursor:pointer;align-self:center}
.col-add-btn:hover{border-color:var(--text2);color:var(--text2);background:var(--bg3)}
.col-empty{text-align:center;padding:24px 12px;color:var(--text3);font-size:12px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:.7}
.add-col-btn{min-width:50px;width:50px;border:1.5px dashed var(--border2);border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text3);font-size:18px;cursor:pointer;transition:.18s;background:transparent;flex-shrink:0;padding:16px 8px}
.add-col-btn:hover{border-color:var(--text2);color:var(--text2);background:var(--bg2)}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 10px 8px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;user-select:none}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.card.dragging{opacity:.35;cursor:grabbing;transform:scale(.97)}
.card.drag-over-top{border-top:2px solid var(--blue) !important}
.card.drag-over-bottom{border-bottom:2px solid var(--blue) !important}
.card.aged-stale{border-left:2px solid var(--amber)}
.card.aged-old{border-left:2px solid var(--red)}
.card-title{font-size:13px;font-weight:500;line-height:1.4;word-break:break-word;margin-bottom:6px}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.priority{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.3px}
.p0{background:var(--red-dim);color:var(--red)}
.p1{background:var(--amber-dim);color:var(--amber)}
.p2{background:var(--blue-dim);color:var(--blue)}
.card-age{font-size:10px;color:var(--text3);margin-left:auto;display:flex;align-items:center;gap:3px;flex-shrink:0}
.card-age.age-fresh{color:var(--green)}
.card-age.age-recent{color:var(--text3)}
.card-age.age-stale{color:var(--amber)}
.card-age.age-old{color:var(--red)}
.expiry-badge{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:2px}
.expiry-badge.warn{color:var(--amber)}
.card-blocker{margin-top:7px;padding:6px 8px;background:var(--red-dim);border:1px solid rgba(247,111,111,.2);border-radius:6px;font-size:11px;color:var(--red);line-height:1.4}
.blocker-lbl{font-weight:700;font-size:10px;letter-spacing:.5px;margin-bottom:2px;display:flex;align-items:center;gap:3px}
.timer-badge{font-size:10px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px;font-family:'DM Mono',monospace;font-weight:600}
.timer-badge.running{background:var(--blue-dim);color:var(--blue)}
.timer-badge.paused{background:var(--amber-dim);color:var(--amber)}
.timer-badge.expired{background:var(--red-dim);color:var(--red);animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.color-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s;flex-shrink:0}
.color-dot:hover,.color-dot.sel{border-color:var(--text);transform:scale(1.2)}
.color-dot.none-dot{background:var(--bg4);border:1px dashed var(--border2)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;animation:fadein .14s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:740px;max-height:92vh;display:flex;flex-direction:column;animation:slidein .17s ease}
@keyframes slidein{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-body{flex:1;overflow-y:auto;padding:16px}
.modal-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.flabel{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px;display:block}
.finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--blue)}
.fselect{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);outline:none;cursor:pointer;appearance:none}
.fselect:focus{border-color:var(--blue)}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.fgroup{margin-bottom:14px}
.btn{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:.14s;cursor:pointer}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.md-render{font-size:13px;line-height:1.7;color:var(--text)}
.md-render h1{font-size:17px;font-weight:600;margin:4px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.md-render h2{font-size:15px;font-weight:600;margin:14px 0 6px}
.md-render h3{font-size:13px;font-weight:600;margin:10px 0 4px;color:var(--text2)}
.md-render p{margin:4px 0 8px;color:var(--text2)}
.md-render ul,.md-render ol{margin:4px 0 8px 18px;color:var(--text2)}
.md-render li{margin:3px 0;line-height:1.6}
.md-render strong{color:var(--text);font-weight:600}
.md-render em{font-style:italic}
.md-render del{color:var(--text3);text-decoration:line-through}
.md-render code{background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:11px;color:var(--blue)}
.md-render pre{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0}
.md-render pre code{background:none;border:none;padding:0;font-size:12px;color:var(--text2);display:block;line-height:1.6}
.md-render blockquote{border-left:3px solid var(--purple);padding:5px 5px 5px 12px;margin:8px 0;color:var(--text3);font-style:italic;background:var(--purple-dim);border-radius:0 6px 6px 0}
.md-render hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.md-render .md-spacer{height:4px}
.md-render .blocker-block{background:var(--red-dim);border:1px solid rgba(247,111,111,.25);border-radius:8px;padding:10px 14px;margin:10px 0}
.md-render .blocker-label{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--red);display:block;margin-bottom:4px}
.md-render .blocker-detail{color:var(--red);font-size:13px;line-height:1.5;opacity:.85}
.md-render ul.task-list{list-style:none;margin-left:4px}
.md-render .task-item{display:flex;align-items:flex-start;gap:6px;padding:2px 0;cursor:pointer}
.md-render .task-item.done .task-text{color:var(--text3);text-decoration:line-through}
.md-render .cb{font-size:14px;flex-shrink:0;user-select:none}
.md-render a{color:var(--blue)}
.md-img-wrap{display:inline-block;position:relative;margin:6px 0;max-width:100%}
.md-img-wrap img{display:block;border-radius:6px;max-width:100%;object-fit:contain}
.sc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:400}
.sc-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:320px;max-height:80vh;overflow-y:auto}
.sc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.sc-row:last-child{border-bottom:none}
.kbd{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:1px 7px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text)}
.toasts{position:fixed;bottom:70px;right:14px;z-index:600;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;animation:toastin .2s ease;background:var(--bg3);border:1px solid var(--border2);color:var(--text);pointer-events:auto}
.toast.success{background:var(--green-dim);border-color:rgba(62,207,142,.3);color:var(--green)}
.toast.error{background:var(--red-dim);border-color:rgba(247,111,111,.3);color:var(--red)}
@keyframes toastin{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
.cp{position:fixed;top:-10px;pointer-events:none;z-index:700;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.swatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.12s;flex-shrink:0}
.swatch:hover,.swatch.sel{border-color:var(--text);transform:scale(1.15)}
.fab{position:fixed;bottom:18px;right:18px;width:44px;height:44px;border-radius:50%;background:var(--blue);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(79,142,247,.45);border:none;cursor:pointer;z-index:50;transition:transform .15s,box-shadow .15s}
.fab:hover{transform:scale(1.08)}
.fp{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:300;display:flex;flex-direction:column;min-width:320px;min-height:200px}
.fp-hdr{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:move;user-select:none}
.fp-title{font-size:12px;font-weight:600;flex:1;color:var(--text2)}
.fp-resize{position:absolute;z-index:10}
.fp-resize.n{top:-4px;left:12px;right:12px;height:8px;cursor:n-resize}
.fp-resize.s{bottom:-4px;left:12px;right:12px;height:8px;cursor:s-resize}
.fp-resize.e{right:-4px;top:12px;bottom:12px;width:8px;cursor:e-resize}
.fp-resize.w{left:-4px;top:12px;bottom:12px;width:8px;cursor:w-resize}
.fp-resize.nw{top:-4px;left:-4px;width:14px;height:14px;cursor:nw-resize}
.fp-resize.ne{top:-4px;right:-4px;width:14px;height:14px;cursor:ne-resize}
.fp-resize.sw{bottom:-4px;left:-4px;width:14px;height:14px;cursor:sw-resize}
.fp-resize.se{bottom:-4px;right:-4px;width:14px;height:14px;cursor:se-resize;background:var(--border2);border-radius:0 0 var(--radius-lg) 0;opacity:.6}
.ai-panel{position:fixed;top:var(--hdr);right:0;width:320px;max-width:100vw;bottom:0;background:var(--bg2);border-left:1px solid var(--border2);z-index:150;display:flex;flex-direction:column;animation:slideL .18s ease}
@keyframes slideL{from{transform:translateX(100%)}to{transform:translateX(0)}}
.ai-panel-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.ai-service-btn{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:.14s;text-decoration:none}
.ai-service-btn:hover{border-color:var(--blue);transform:translateY(-1px)}
.ai-service-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.draw-toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px;background:var(--bg4);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.dtool{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;font-size:13px;transition:.1s;color:var(--text2)}
.dtool:hover{background:var(--bg3);color:var(--text)}
.dtool.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.draw-sub-toolbar{display:flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg3);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .6s linear}
body.light{--bg:#f3f3f5;--bg2:#fff;--bg3:#ededf0;--bg4:#e4e4e9;--border:#dcdce2;--border2:#c8c8d0;--text:#18181f;--text2:#555566;--text3:#9898aa;--blue-dim:#e5eeff;--green-dim:#e5f8f1;--amber-dim:#fef8e6;--red-dim:#feeaea;--purple-dim:#f1efff}
/* Resizable image handles in preview */
.resizable-img-container{display:inline-block;position:relative;margin:6px 0}
.resizable-img-container img{display:block;border-radius:6px;object-fit:contain}
.resizable-img-container .resize-handle{position:absolute;bottom:-5px;right:-5px;width:14px;height:14px;background:var(--blue);border:2px solid var(--bg2);border-radius:3px;cursor:se-resize;z-index:10;opacity:0;transition:opacity .15s}
.resizable-img-container:hover .resize-handle{opacity:1}
/* Timer alarm overlay */
.alarm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;animation:fadein .2s ease}
.alarm-box{background:var(--bg2);border:2px solid var(--red);border-radius:16px;padding:32px 40px;text-align:center;animation:slidein .2s ease}

/* ── Alarm Sound (Web Audio API) ── */
const AlarmCtx={ctx:null,playing:false};
function playAlarmSound(){
  try{
    if(AlarmCtx.playing)return;
    AlarmCtx.playing=true;
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    AlarmCtx.ctx=ctx;
    const notes=[523.25,659.25,783.99,1046.50,783.99,659.25,523.25];
    let t=ctx.currentTime;
    notes.forEach((freq,i)=>{
      for(let r=0;r<3;r++){
        const osc=ctx.createOscillator();
        const gain=ctx.createGain();
        osc.type=i%2===0?'sine':'triangle';
        osc.frequency.value=freq;
        gain.gain.setValueAtTime(0,t);
        gain.gain.linearRampToValueAtTime(0.15,t+0.03);
        gain.gain.linearRampToValueAtTime(0,t+0.18);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start(t);osc.stop(t+0.2);
        t+=0.2;
      }
      t+=0.1;
    });
    setTimeout(()=>{AlarmCtx.playing=false;try{ctx.close();}catch{}},5000);
  }catch(e){AlarmCtx.playing=false;}
}
function stopAlarmSound(){
  AlarmCtx.playing=false;
  try{if(AlarmCtx.ctx){AlarmCtx.ctx.close();AlarmCtx.ctx=null;}}catch{}
}

/* ── UTILS ── */
function uid(){return Math.random().toString(36).slice(2,10)}
function daysDiff(iso){if(!iso)return 0;return Math.floor((Date.now()-new Date(iso).getTime())/(864e5));}
function fmtAge(iso,now){
  if(!iso)return'just now';
  const ms=(now||Date.now())-new Date(iso).getTime();
  const m=Math.floor(ms/6e4),h=Math.floor(ms/36e5),d=Math.floor(ms/864e5),w=Math.floor(d/7),mo=Math.floor(d/30);
  if(m<1)return'just now';if(m<60)return m+'m ago';if(h<24)return h+'h ago';
  if(d===1)return'1d ago';if(d<7)return d+'d ago';if(w<5)return w+'w ago';return mo+'mo ago';
}
function ageClass(iso,now){
  const h=Math.floor(((now||Date.now())-new Date(iso||0).getTime())/36e5);
  if(h<6)return'age-fresh';if(h<48)return'age-recent';if(h<168)return'age-stale';return'age-old';
}

/* ── IMAGE COMPRESS ── */
async function compressImage(src){
  return new Promise(res=>{
    const img=new Image();
    const isFile=src instanceof File;
    const url=isFile?URL.createObjectURL(src):src;
    img.onload=()=>{
      const MAX=1200;
      const scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let out=c.toDataURL('image/webp',0.82);
      if(out.length<50||out.startsWith('data:image/png'))out=c.toDataURL('image/jpeg',0.82);
      if(isFile)URL.revokeObjectURL(url);
      res(out);
    };
    img.src=url;
  });
}

/* ── FORMAT JSON ── */
function formatJSON(el){
  const s=el.selectionStart,e=el.selectionEnd;
  const sel=el.value.slice(s,e)||el.value;
  try{const p=JSON.parse(sel.trim());return{result:JSON.stringify(p,null,2),start:s,end:e,full:!el.value.slice(s,e)};}
  catch{return null;}
}

/* ── MARKDOWN ── */
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function inlineRender(s){
  return escH(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMd(text,onToggle,imageSizes){
  if(!text)return'';
  const lines=text.split('\n');
  const out=[];let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(line.startsWith('```')){
      const cl=[];i++;
      while(i<lines.length&&!lines[i].startsWith('```')){cl.push(escH(lines[i]));i++;}
      out.push(`<pre><code>${cl.join('\n')}</code></pre>`);i++;continue;
    }
    const hm=line.match(/^(#{1,3})\s+(.+)$/);
    if(hm){
      if(hm[2].trim().toUpperCase()==='BLOCKER'){
        out.push(`<div class="blocker-block"><span class="blocker-label">🚫 BLOCKER</span>`);i++;
        const det=[];
        while(i<lines.length&&lines[i].trim()&&!lines[i].startsWith('#')){det.push(inlineRender(lines[i]));i++;}
        if(det.length)out.push(`<div class="blocker-detail">${det.join('<br/>')}</div>`);
        out.push('</div>');continue;
      }
      out.push(`<h${hm[1].length}>${inlineRender(hm[2])}</h${hm[1].length}>`);i++;continue;
    }
    if(/^(---|\*\*\*|___)$/.test(line.trim())){out.push('<hr/>');i++;continue;}
    if(line.startsWith('> ')){
      const bq=[line.slice(2)];
      while(i+1<lines.length&&lines[i+1].startsWith('> ')){i++;bq.push(lines[i].slice(2));}
      out.push(`<blockquote>${bq.map(inlineRender).join('<br/>')}</blockquote>`);i++;continue;
    }
    const imgM=line.match(/^!\[([^\]]*)\]\(([^)]+)\)(?:\{(\d+)x(\d+)\})?$/);
    if(imgM){
      const imgId='img_'+i;
      const sz=imageSizes&&imageSizes[imgId];
      const w=sz?sz.w:(imgM[3]?parseInt(imgM[3]):null);
      const h=sz?sz.h:(imgM[4]?parseInt(imgM[4]):null);
      out.push(`<div class="resizable-img-container" data-img-id="${imgId}" data-li="${i}" style="${w?'width:'+w+'px;':'max-width:100%;'}"><img src="${escH(imgM[2])}" style="width:100%;height:auto;border-radius:6px;display:block"/><div class="resize-handle" data-img-id="${imgId}"></div></div>`);
      i++;continue;
    }
    if(/^\[[ x]\]\s/.test(line)){
      const items=[];
      while(i<lines.length&&/^\[[ x]\]\s/.test(lines[i])){
        const done=lines[i][1]==='x';const li=i;
        items.push(`<li class="task-item${done?' done':''}" data-toggle-line="${li}"><span class="cb">${done?'☑':'☐'}</span><span class="task-text">${inlineRender(lines[i].replace(/^\[[ x]\]\s/,''))}</span></li>`);
        i++;
      }
      out.push(`<ul class="task-list">${items.join('')}</ul>`);continue;
    }
    if(/^[-*+]\s/.test(line)){
      const items=[];
      while(i<lines.length&&/^[-*+]\s/.test(lines[i])){items.push(`<li>${inlineRender(lines[i].replace(/^[-*+]\s/,''))}</li>`);i++;}
      out.push(`<ul>${items.join('')}</ul>`);continue;
    }
    if(/^\d+\.\s/.test(line)){
      const items=[];
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(`<li>${inlineRender(lines[i].replace(/^\d+\.\s/,''))}</li>`);i++;}
      out.push(`<ol>${items.join('')}</ol>`);continue;
    }
    if(!line.trim()){out.push('<div class="md-spacer"></div>');i++;continue;}
    const para=[line];
    while(i+1<lines.length&&lines[i+1].trim()&&!/^(#{1,3}\s|[-*+]\s|\d+\.\s|> |\[[ x]\]|```|---|___|\*\*\*|!\[)/.test(lines[i+1])){i++;para.push(lines[i]);}
    out.push(`<p>${para.map(inlineRender).join('<br/>')}</p>`);i++;
  }
  return out.join('');
}

/* ── 8-DIRECTION RESIZE HOOK ── */
function useResize(initW,initH,initX,initY){
  const [sz,setSz]=useState({w:initW,h:initH,x:initX,y:initY});
  const drag=useRef(null);
  function startResize(dir,e){
    e.preventDefault();e.stopPropagation();
    drag.current={dir,startX:e.clientX,startY:e.clientY,...sz};
    function onMove(ev){
      if(!drag.current)return;
      const{dir:d,startX,startY,w,h,x,y}=drag.current;
      const dx=ev.clientX-startX,dy=ev.clientY-startY;
      let nw=w,nh=h,nx=x,ny=y;
      if(d.includes('e'))nw=Math.max(300,w+dx);
      if(d.includes('s'))nh=Math.max(180,h+dy);
      if(d.includes('w')){nw=Math.max(300,w-dx);nx=x+dx;}
      if(d.includes('n')){nh=Math.max(180,h-dy);ny=y+dy;}
      setSz({w:nw,h:nh,x:nx,y:ny});
    }
    function onUp(){drag.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  }
  return{sz,setSz,startResize};
}

/* ── MD EDITOR ── */
function MdEditor({value,onChange}){
  const ta=useRef();
  const [mode,setMode]=useState('write');
  const [edH,setEdH]=useState(220);
  const resizing=useRef(false);const resizeStart=useRef(null);

  function applyFmt(type){
    const el=ta.current;if(!el)return;
    const s=el.selectionStart,e=el.selectionEnd;
    const sel=value.slice(s,e),pre=value.slice(0,s),post=value.slice(e);
    let nv,ns,ne;
    const lineStart=value.lastIndexOf('\n',s-1)+1;
    switch(type){
      case 'bold':nv=pre+'**'+sel+'**'+post;ns=s+2;ne=e+2;break;
      case 'italic':nv=pre+'*'+sel+'*'+post;ns=s+1;ne=e+1;break;
      case 'strike':nv=pre+'~~'+sel+'~~'+post;ns=s+2;ne=e+2;break;
      case 'code':nv=pre+'`'+sel+'`'+post;ns=s+1;ne=e+1;break;
      case 'codeblock':{const c='```\n'+(sel||'code')+'\n```';nv=pre+c+post;ns=s+4;ne=s+4+(sel||'code').length;break;}
      case 'h1':nv=value.slice(0,lineStart)+'# '+value.slice(lineStart);ns=s+2;ne=e+2;break;
      case 'h2':nv=value.slice(0,lineStart)+'## '+value.slice(lineStart);ns=s+3;ne=e+3;break;
      case 'h3':nv=value.slice(0,lineStart)+'### '+value.slice(lineStart);ns=s+4;ne=e+4;break;
      case 'quote':nv=value.slice(0,lineStart)+'> '+value.slice(lineStart);ns=s+2;ne=e+2;break;
      case 'ul':nv=value.slice(0,lineStart)+'- '+value.slice(lineStart);ns=s+2;ne=e+2;break;
      case 'ol':nv=value.slice(0,lineStart)+'1. '+value.slice(lineStart);ns=s+3;ne=e+3;break;
      case 'check':nv=value.slice(0,lineStart)+'[ ] '+value.slice(lineStart);ns=s+4;ne=e+4;break;
      case 'hr':nv=pre+'\n---\n'+post;ns=ne=s+5;break;
      case 'link':{const p=sel||'link text';nv=pre+'['+p+'](url)'+post;ns=s+1;ne=s+1+p.length;break;}
      case 'blocker':{const b='## BLOCKER\n'+(sel||'Describe blocker')+'\n';nv=pre+b+post;ns=s+11;ne=s+11+(sel||'Describe blocker').length;break;}
      case 'json':{
        const res=formatJSON(el);
        if(!res)return alert('No valid JSON found');
        if(res.full)onChange('```json\n'+res.result+'\n```');
        else onChange(value.slice(0,res.start)+res.result+value.slice(res.end));
        return;
      }
      case 'image':{
        const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
        inp.onchange=async ev=>{
          const f=ev.target.files[0];if(!f)return;
          const data=await compressImage(f);
          const tag=`\n![image](${data})\n`;
          onChange(value.slice(0,s)+tag+value.slice(e));
        };inp.click();return;
      }
      default:return;
    }
    onChange(nv);
    setTimeout(()=>{if(el){el.selectionStart=ns;el.selectionEnd=ne;el.focus();}},0);
  }

  function onKD(e){
    const el=e.target;const s=el.selectionStart;
    if(e.key==='Tab'){e.preventDefault();const nv=value.slice(0,s)+'  '+value.slice(el.selectionEnd);onChange(nv);setTimeout(()=>{el.selectionStart=el.selectionEnd=s+2;},0);return;}
    if(e.key==='Enter'){
      const lineStart=value.lastIndexOf('\n',s-1)+1;
      const line=value.slice(lineStart,s);
      const um=line.match(/^([-*+])\s(.+)/),om=line.match(/^(\d+)\.\s(.+)/),cm=line.match(/^\[[ x]\]\s(.+)/);
      if(um){e.preventDefault();const ins='\n'+um[1]+' ';onChange(value.slice(0,s)+ins+value.slice(s));setTimeout(()=>{el.selectionStart=el.selectionEnd=s+ins.length;},0);}
      else if(om){e.preventDefault();const ins='\n'+(parseInt(om[1])+1)+'. ';onChange(value.slice(0,s)+ins+value.slice(s));setTimeout(()=>{el.selectionStart=el.selectionEnd=s+ins.length;},0);}
      else if(cm){e.preventDefault();const ins='\n[ ] ';onChange(value.slice(0,s)+ins+value.slice(s));setTimeout(()=>{el.selectionStart=el.selectionEnd=s+ins.length;},0);}
    }
  }

  function onPaste(e){
    const items=e.clipboardData?.items;if(!items)return;
    for(const item of items){
      if(item.type.startsWith('image/')){
        e.preventDefault();
        const f=item.getAsFile();if(!f)return;
        compressImage(f).then(data=>{
          const el=ta.current;if(!el)return;
          const s=el.selectionStart,e2=el.selectionEnd;
          onChange(value.slice(0,s)+`\n![image](${data})\n`+value.slice(e2));
        });break;
      }
    }
  }

  function startVResize(e){
    resizing.current=true;resizeStart.current={y:e.clientY,h:edH};
    const onMove=ev=>{if(!resizing.current)return;setEdH(Math.max(100,Math.min(800,resizeStart.current.h+(ev.clientY-resizeStart.current.y))));};
    const onUp=()=>{resizing.current=false;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);e.preventDefault();
  }

/* ── INTERACTIVE MD VIEW with resizable images ── */
function MdView({value,onChange,imageSizes,onImageResize}){
  const ref=useRef();
  
  // click handler for checkboxes
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    function onClick(e){
      const ti=e.target.closest('[data-toggle-line]');
      if(ti){
        const li=parseInt(ti.dataset.toggleLine);
        const lines=value.split('\n');if(li>=lines.length)return;
        const ln=lines[li];
        if(/^\[ \]\s/.test(ln))lines[li]=ln.replace('[ ]','[x]');
        else if(/^\[x\]\s/.test(ln))lines[li]=ln.replace('[x]','[ ]');
        onChange(lines.join('\n'));
      }
    }
    el.addEventListener('click',onClick);
    return()=>el.removeEventListener('click',onClick);
  },[value,onChange]);

  // image resize handler
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    let resizing=null;
    function onDown(e){
      const handle=e.target.closest('.resize-handle');
      if(!handle)return;
      e.preventDefault();e.stopPropagation();
      const imgId=handle.dataset.imgId;
      const container=handle.closest('.resizable-img-container');
      if(!container)return;
      const startX=e.clientX;
      const startW=container.offsetWidth;
      resizing={imgId,startX,startW,container};
      function onMove(ev){
        if(!resizing)return;
        const dx=ev.clientX-resizing.startX;
        const newW=Math.max(50,resizing.startW+dx);
        resizing.container.style.width=newW+'px';
      }
      function onUp(){
        if(resizing){
          const finalW=resizing.container.offsetWidth;
          onImageResize(resizing.imgId,finalW);
        }
        resizing=null;
        window.removeEventListener('mousemove',onMove);
        window.removeEventListener('mouseup',onUp);
      }
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    }
    el.addEventListener('mousedown',onDown);
    return()=>el.removeEventListener('mousedown',onDown);
  },[onImageResize]);

  if(!value)return<div style={{textAlign:'center',padding:'32px 0',color:'var(--text3)',fontSize:13}}><div style={{fontSize:28,marginBottom:8}}>📝</div><div>No notes yet</div></div>;
  return<div ref={ref} className="md-render" dangerouslySetInnerHTML={{__html:renderMd(value,true,imageSizes)}}/>;
}

      <span className={`timer-badge ${expired?'expired':timer.running?'running':'paused'}`}>

    </div>
  );

/* ── CARD COMPONENT ── */
function Card({card,onOpen,onDragStart,onDragOver,onDropOnCard,now,timer}){
  const [dragSide,setDragSide]=useState(null);
  const blocker=parseBlocker(card.content);
  const days=Math.floor(((now||Date.now())-new Date(card.createdAt).getTime())/864e5);
  const ac=ageClass(card.createdAt,now);
  const ageText=fmtAge(card.createdAt,now);
  const ageCardClass=days>6?'aged-old':days>2?'aged-stale':'';
  const timerExpired=timer&&timer.remaining<=0;
  const timerRunning=timer&&timer.running&&timer.remaining>0;
  const timerPaused=timer&&!timer.running&&timer.remaining>0;

  return(
    <div className={`card ${ageCardClass}${dragSide==='top'?' drag-over-top':dragSide==='bottom'?' drag-over-bottom':''}`}
      draggable
      onDragStart={e=>{e.dataTransfer.effectAllowed='move';onDragStart(card.id);}}
      onDragOver={e=>{
        e.preventDefault();e.stopPropagation();
        const r=e.currentTarget.getBoundingClientRect();
        const side=e.clientY<r.top+r.height/2?'top':'bottom';
        setDragSide(side);onDragOver(card.id,side==='top'?'before':'after');
      }}
      onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragSide(null);}}
      onDrop={e=>{e.preventDefault();e.stopPropagation();const s=dragSide;setDragSide(null);onDropOnCard(card.id,s==='top'?'before':'after');}}
      onDragEnd={()=>setDragSide(null)}
      onClick={()=>onOpen(card)}
      style={{borderLeft:card.color?`3px solid ${card.color}`:undefined}}>
      <div className="card-title">{card.task}</div>
      <div className="card-meta">
        {card.priority&&card.priority!=='None'&&<span className={`priority p${card.priority[1]}`}>{card.priority}</span>}
        {card.expiryDays&&card.doneAt&&(()=>{const rem=card.expiryDays-daysDiff(card.doneAt);return<span className={`expiry-badge${rem<=1?' warn':''}`}>🗑 {rem>0?rem+'d':'today'}</span>;})()}
        {(timerRunning||timerPaused||timerExpired)&&<span className={`timer-badge ${timerExpired?'expired':timerRunning?'running':'paused'}`}>⏱ {fmtSecs(Math.max(0,timer.remaining))}</span>}
        {card.content&&!blocker&&<span style={{fontSize:10,color:'var(--text3)'}}>📝</span>}
        <span className={`card-age ${ac}`}>🕐 {ageText}</span>
      </div>
      {blocker&&<div className="card-blocker"><div className="blocker-lbl">🚫 BLOCKER</div><div style={{lineHeight:1.35}}>{blocker.slice(0,120)}{blocker.length>120?'…':''}</div></div>}
    </div>
  );
}

        {cards.map(c=><Card key={c.id} card={c} now={now} timer={timers[c.id]||null}

}

/* ── FLOATING PANEL ── */
function FloatingPanel({title,icon,onClose,children,initW=560,initH=420,initX=null,initY=null,storageKey,extraHeaderContent}){
  const isMobile=window.innerWidth<=640;
  const defX=initX!==null?initX:Math.max(20,window.innerWidth-initW-20);
  const defY=initY!==null?initY:Math.max(60,window.innerHeight-initH-80);
  const {sz,setSz,startResize}=useResize(initW,initH,defX,defY);
  const drag=useRef(null);
  const ref=useRef();

  useEffect(()=>{
    if(!storageKey)return;
    try{const saved=JSON.parse(localStorage.getItem(storageKey+'_pos')||'null');if(saved)setSz(saved);}catch{}
  },[]);
  useEffect(()=>{
    if(!storageKey)return;
    try{localStorage.setItem(storageKey+'_pos',JSON.stringify(sz));}catch{}
  },[sz]);

  function onHdrMouseDown(e){
    if(e.button!==0)return;
    // Don't drag if clicking buttons
    if(e.target.closest('button')||e.target.closest('input'))return;
    const el=ref.current;if(!el)return;
    const r=el.getBoundingClientRect();
    drag.current={ox:e.clientX-r.left,oy:e.clientY-r.top};
    const onMove=ev=>{if(!drag.current)return;setSz(s=>({...s,x:ev.clientX-drag.current.ox,y:ev.clientY-drag.current.oy}));};
    const onUp=()=>{drag.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);e.preventDefault();
  }

  if(isMobile)return(
    <div className="fp" style={{bottom:60,left:8,right:8,top:'auto',height:'auto',minHeight:300,maxHeight:'80vh',position:'fixed'}}>
      <div className="fp-hdr">
        <span style={{fontSize:14}}>{icon}</span>
        <span className="fp-title">{title}</span>
        {extraHeaderContent}
        <button onClick={onClose} style={{fontSize:14,color:'var(--text3)',background:'none',border:'none',cursor:'pointer',padding:'2px 6px',marginLeft:extraHeaderContent?0:'auto'}}>✕</button>
      </div>
      <div style={{flex:1,overflow:'auto',minHeight:0,display:'flex',flexDirection:'column'}}>{children}</div>
    </div>
  );

  return(
    <div ref={ref} className="fp" style={{left:sz.x,top:sz.y,width:sz.w,height:sz.h,position:'fixed'}}>
      {['n','s','e','w','nw','ne','sw','se'].map(d=>(
        <div key={d} className={`fp-resize ${d}`} onMouseDown={e=>startResize(d,e)}/>
      ))}
      <div className="fp-hdr" onMouseDown={onHdrMouseDown}>
        <span style={{fontSize:14}}>{icon}</span>
        <span className="fp-title">{title}</span>
        {extraHeaderContent}
        <button onClick={onClose} style={{fontSize:14,color:'var(--text3)',background:'none',border:'none',cursor:'pointer',padding:'2px 6px',marginLeft:extraHeaderContent?0:'auto'}}>✕</button>
      </div>
      <div style={{flex:1,overflow:'auto',minHeight:0,display:'flex',flexDirection:'column'}}>{children}</div>
    </div>
  );
}

/* ── SCRATCH PAD ── */
function ScratchPad({onClose}){
  const [content,setContent]=useState(()=>loadLS('daily_scratch',''));
  useEffect(()=>saveLS('daily_scratch',content),[content]);
  const ref=useRef();

  // Close on outside click
  useEffect(()=>{
    function onDown(e){
      const el=ref.current;
      if(el&&!el.contains(e.target))onClose();
    }
    const t=setTimeout(()=>window.addEventListener('mousedown',onDown),150);
    return()=>{clearTimeout(t);window.removeEventListener('mousedown',onDown);};
  },[onClose]);

  return(
    <div id="scratch-fp" ref={ref}>
      <FloatingPanel title="Scratch Pad" icon="📝" onClose={onClose} initW={560} initH={440} storageKey="scratch"
        extraHeaderContent={
          <div style={{display:'flex',alignItems:'center',gap:6,marginRight:4}}>
            <span style={{fontSize:10,color:'var(--green)',display:'flex',alignItems:'center',gap:3}}>
              <span style={{width:5,height:5,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/>saved
            </span>
            <button onClick={()=>{if(content.trim()&&confirm('Clear scratch pad?'))setContent('');}} 
              style={{fontSize:10,padding:'2px 8px',borderRadius:5,border:'1px solid var(--red-dim)',background:'var(--red-dim)',color:'var(--red)',cursor:'pointer',lineHeight:1.4}}>clear</button>
          </div>
        }>
        <div style={{flex:1,padding:10,overflow:'auto'}}>
          <MdEditor value={content} onChange={setContent}/>
        </div>
      </FloatingPanel>
    </div>
  );
}
/* ── FULL DRAWING CANVAS (Excalidraw-like) ── */
function DrawCanvas({onClose}){
  const canvasRef=useRef();
  const wrapRef=useRef();
  const panelRef=useRef();

  const [tool,setTool]=useState('pen');
  const [color,setColor]=useState('#4f8ef7');
  const [fillColor,setFillColor]=useState('transparent');
  const [size,setSize]=useState(3);
  const [fontSize,setFontSize]=useState(24);
  const [opacity,setOpacity]=useState(1);
  const [lineDash,setLineDash]=useState('solid');
  const [bgColor,setBgColor]=useState(()=>loadLS('daily_draw_bg','')||'#ffffff');
  const [showFill,setShowFill]=useState(false);
  const [showBgPicker,setShowBgPicker]=useState(false);
  const [eraserPos,setEraserPos]=useState(null);
  const [eraserSize,setEraserSize]=useState(24);
  const [selectedAll,setSelectedAll]=useState(false);
  const selAllRef=useRef(false);
  const [zoom,setZoom]=useState(1);
  const [pan,setPan]=useState({x:0,y:0});

  // Drawing refs
  const drawingRef=useRef(false);
  const lastPosRef=useRef(null);
  const startPosRef=useRef(null);
  const snapshotRef=useRef(null);
  const histStack=useRef([]);
  const histI=useRef(-1);
  const initedRef=useRef(false);

  // Pan refs
  const isPanningRef=useRef(false);
  const panStartRef=useRef(null);
  const panOffRef=useRef(null);

  // Text objects
  const [texts,setTexts]=useState(()=>{try{return JSON.parse(loadLS('daily_draw_texts','[]'));}catch{return[];}});
  const [editTid,setEditTid]=useState(null);
  const [activeTid,setActiveTid]=useState(null);
  const dragTidRef=useRef(null);
  const dragTStartRef=useRef(null);
  const [resizeTid,setResizeTid]=useState(null);
  const resizeTStartRef=useRef(null);

  // ★ POINTER SELECTION — for moving shapes/drawn content
  const [sel,setSel]=useState(null); // {phase,x,y,w,h,sx,sy,imgData,ox,oy}
  const selDragRef=useRef(null);

  function setSelAllSync(v){selAllRef.current=v;setSelectedAll(v);}
  useEffect(()=>{try{saveLS('daily_draw_texts',JSON.stringify(texts));}catch{}},[texts]);

  // Outside click close
  useEffect(()=>{
    const h=e=>{let n=e.target;while(n){if(n===panelRef.current)return;n=n.parentElement;}onClose();};
    const t=setTimeout(()=>document.addEventListener('mousedown',h,true),250);
    return()=>{clearTimeout(t);document.removeEventListener('mousedown',h,true);};
  },[onClose]);

  // ★ Canvas init — FULL AREA drawable
  useEffect(()=>{
    if(initedRef.current)return;
    initedRef.current=true;
    const init=()=>{
      const c=canvasRef.current;const w=wrapRef.current;
      if(!c||!w)return;
      const wr=w.getBoundingClientRect();
      if(wr.width<10||wr.height<10){requestAnimationFrame(init);return;}
      const dpr=window.devicePixelRatio||1;
      c.width=Math.round(wr.width*dpr);
      c.height=Math.round(wr.height*dpr);
      c.style.width=wr.width+'px';
      c.style.height=wr.height+'px';
      const ctx=c.getContext('2d');
      ctx.scale(dpr,dpr);
      ctx.fillStyle=bgColor;
      ctx.fillRect(0,0,wr.width,wr.height);
      const saved=loadLS('daily_drawing','');
      if(saved){
        const img=new Image();
        img.onload=()=>{ctx.setTransform(1,0,0,1,0,0);ctx.drawImage(img,0,0);ctx.scale(dpr,dpr);pushH();};
        img.onerror=()=>pushH();
        img.src=saved;
      }else pushH();
    };
    requestAnimationFrame(init);
  },[]);

  useEffect(()=>{saveLS('daily_draw_bg',bgColor);},[bgColor]);

  function pushH(){
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext('2d');
    ctx.setTransform(1,0,0,1,0,0);
    const d=c.toDataURL();
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    histStack.current=histStack.current.slice(0,histI.current+1);
    histStack.current.push(d);histI.current=histStack.current.length-1;
    if(histStack.current.length>50)histStack.current=histStack.current.slice(-50);
    histI.current=histStack.current.length-1;
    saveLS('daily_drawing',d);
  }
  function restoreH(idx){
    const c=canvasRef.current;if(!c)return;
    const d=histStack.current[idx];if(!d)return;
    const img=new Image();
    img.onload=()=>{
      const ctx=c.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,c.width,c.height);
      ctx.drawImage(img,0,0);
      const dpr=window.devicePixelRatio||1;
      ctx.setTransform(dpr,0,0,dpr,0,0);
      saveLS('daily_drawing',d);
    };img.src=d;
  }
  function undo(){if(histI.current<=0)return;histI.current--;restoreH(histI.current);}
  function redo(){if(histI.current>=histStack.current.length-1)return;histI.current++;restoreH(histI.current);}
  function clearAll(){
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext('2d');
    ctx.fillStyle=bgColor;
    const w=c.width/(window.devicePixelRatio||1);
    const h=c.height/(window.devicePixelRatio||1);
    ctx.fillRect(0,0,w,h);
    pushH();setTexts([]);
  }

  function changeBg(nc){
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext('2d');
    ctx.setTransform(1,0,0,1,0,0);
    const id=ctx.getImageData(0,0,c.width,c.height);
    const px=id.data;
    const oR=parseInt(bgColor.slice(1,3),16),oG=parseInt(bgColor.slice(3,5),16),oB=parseInt(bgColor.slice(5,7),16);
    const nR=parseInt(nc.slice(1,3),16),nG=parseInt(nc.slice(3,5),16),nB=parseInt(nc.slice(5,7),16);
    for(let i=0;i<px.length;i+=4){
      if(Math.abs(px[i]-oR)<25&&Math.abs(px[i+1]-oG)<25&&Math.abs(px[i+2]-oB)<25){
        px[i]=nR;px[i+1]=nG;px[i+2]=nB;
      }
    }
    ctx.putImageData(id,0,0);
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    setBgColor(nc);saveLS('daily_draw_bg',nc);setShowBgPicker(false);pushH();
  }

  function getCanvasPos(e){
    const c=canvasRef.current;if(!c)return{x:0,y:0};
    const r=c.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    // Account for zoom and pan
    return{
      x:(src.clientX-r.left)/zoom,
      y:(src.clientY-r.top)/zoom
    };
  }
  function getWrapPos(e){
    const w=wrapRef.current;if(!w)return{rx:0,ry:0};
    const r=w.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{rx:src.clientX-r.left,ry:src.clientY-r.top};
  }
  function applyStroke(ctx){
    ctx.globalAlpha=opacity;
    ctx.setLineDash(lineDash==='dashed'?[8,4]:lineDash==='dotted'?[2,4]:[]);
  }
  function resetCtx(ctx){ctx.globalAlpha=1;ctx.setLineDash([]);ctx.globalCompositeOperation='source-over';}

  // ---- PAN ----
  function startPan(e){
    isPanningRef.current=true;
    const src=e.touches?e.touches[0]:e;
    panStartRef.current={x:src.clientX,y:src.clientY};
    panOffRef.current={...pan};e.preventDefault();
  }
  function doPan(e){
    if(!isPanningRef.current||!panStartRef.current)return;
    const src=e.touches?e.touches[0]:e;
    setPan({x:panOffRef.current.x+(src.clientX-panStartRef.current.x),y:panOffRef.current.y+(src.clientY-panStartRef.current.y)});
  }

  // ---- ★ POINTER TOOL: select region, move it smoothly ----
  function startPointer(e){
    // If we have a selected region and click inside it → start moving
    if(sel&&sel.phase==='ready'){
      const pos=getCanvasPos(e);
      if(pos.x>=sel.ox&&pos.x<=sel.ox+sel.w&&pos.y>=sel.oy&&pos.y<=sel.oy+sel.h){
        selDragRef.current={startX:pos.x,startY:pos.y,origOx:sel.ox,origOy:sel.oy};
        setSel(s=>({...s,phase:'moving'}));
        e.preventDefault();
        return;
      }
      // Clicked outside selection → commit it
      finishSel();
    }
    // Start new selection
    const pos=getCanvasPos(e);
    setSel({phase:'drawing',sx:pos.x,sy:pos.y,x:pos.x,y:pos.y,w:0,h:0});
    e.preventDefault();
  }
  function doPointer(e){
    if(!sel)return;
    const pos=getCanvasPos(e);

    if(sel.phase==='drawing'){
      setSel(s=>({...s,
        x:Math.min(s.sx,pos.x),y:Math.min(s.sy,pos.y),
        w:Math.abs(pos.x-s.sx),h:Math.abs(pos.y-s.sy)
      }));
    }
    if(sel.phase==='moving'&&selDragRef.current){
      const dx=pos.x-selDragRef.current.startX;
      const dy=pos.y-selDragRef.current.startY;
      const newOx=selDragRef.current.origOx+dx;
      const newOy=selDragRef.current.origOy+dy;

      // Live preview: restore base, draw imgData at new position
      const c=canvasRef.current;if(!c)return;
      const ctx=c.getContext('2d');
      const dpr=window.devicePixelRatio||1;
      if(sel.baseData){
        ctx.setTransform(1,0,0,1,0,0);
        ctx.putImageData(sel.baseData,0,0);
        ctx.putImageData(sel.imgData,Math.round(newOx*dpr),Math.round(newOy*dpr));
        ctx.setTransform(dpr,0,0,dpr,0,0);
      }
      setSel(s=>({...s,ox:newOx,oy:newOy}));
    }
  }
  function endPointer(){
    if(!sel)return;
    if(sel.phase==='drawing'){
      if(sel.w<5||sel.h<5){setSel(null);return;}
      // Capture selected region
      const c=canvasRef.current;if(!c)return;
      const ctx=c.getContext('2d');
      const dpr=window.devicePixelRatio||1;
      ctx.setTransform(1,0,0,1,0,0);
      const px=Math.round(sel.x*dpr),py=Math.round(sel.y*dpr);
      const pw=Math.round(sel.w*dpr),ph=Math.round(sel.h*dpr);
      const imgData=ctx.getImageData(px,py,pw,ph);
      // Erase original area with bg
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.fillStyle=bgColor;
      ctx.fillRect(sel.x,sel.y,sel.w,sel.h);
      // Save base state (with selection erased)
      ctx.setTransform(1,0,0,1,0,0);
      const baseData=ctx.getImageData(0,0,c.width,c.height);
      // Put selection back for visual
      ctx.putImageData(imgData,px,py);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      pushH();
      setSel({phase:'ready',x:sel.x,y:sel.y,w:sel.w,h:sel.h,imgData,baseData,ox:sel.x,oy:sel.y});
    }
    if(sel.phase==='moving'){
      selDragRef.current=null;
      setSel(s=>({...s,phase:'ready'}));
      pushH();
    }
  }
  function finishSel(){
    if(!sel||!sel.imgData)return;
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(1,0,0,1,0,0);
    // Put base + final position
    if(sel.baseData)ctx.putImageData(sel.baseData,0,0);
    ctx.putImageData(sel.imgData,Math.round(sel.ox*dpr),Math.round(sel.oy*dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    pushH();setSel(null);
  }
  function cancelSel(){
    if(!sel||!sel.imgData)return;
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(1,0,0,1,0,0);
    if(sel.baseData)ctx.putImageData(sel.baseData,0,0);
    ctx.putImageData(sel.imgData,Math.round(sel.x*dpr),Math.round(sel.y*dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    pushH();setSel(null);
  }
  function deleteSel(){
    if(!sel||!sel.baseData)return;
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext('2d');
    ctx.setTransform(1,0,0,1,0,0);
    ctx.putImageData(sel.baseData,0,0);
    const dpr=window.devicePixelRatio||1;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    pushH();setSel(null);
  }

  // ---- MAIN DRAWING HANDLERS ----
  function onDown(e){
    if(selAllRef.current)setSelAllSync(false);
    if(editTid)return;
    if(tool==='hand'){startPan(e);return;}
    if(tool==='pointer'){startPointer(e);return;}
    if(tool==='text'){
      const pos=getCanvasPos(e);
      const{rx,ry}=getWrapPos(e);
      const id=uid();
      setTexts(t=>[...t,{id,text:'',x:pos.x,y:pos.y,relX:rx,relY:ry,color,fontSize,opacity}]);
      setTimeout(()=>{setEditTid(id);setActiveTid(id);},80);
      e.preventDefault();return;
    }
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext('2d');
    const pos=getCanvasPos(e);
    drawingRef.current=true;lastPosRef.current=pos;startPosRef.current=pos;
    if(['line','arrow','rect','circle','diamond'].includes(tool)){
      ctx.setTransform(1,0,0,1,0,0);
      snapshotRef.current=ctx.getImageData(0,0,c.width,c.height);
      const dpr=window.devicePixelRatio||1;
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    if(tool==='pen'){ctx.beginPath();ctx.moveTo(pos.x,pos.y);}
    e.preventDefault();
  }

  function onMove(e){
    const c=canvasRef.current;if(!c)return;
    const pos=getCanvasPos(e);
    const{rx,ry}=getWrapPos(e);

    if(tool==='hand'){doPan(e);return;}
    if(tool==='pointer'){doPointer(e);return;}
    if(tool==='eraser')setEraserPos({x:rx,y:ry});
    if(!drawingRef.current)return;
    const ctx=c.getContext('2d');

    if(tool==='pen'){
      ctx.lineWidth=size;ctx.strokeStyle=color;ctx.lineCap='round';ctx.lineJoin='round';
      applyStroke(ctx);ctx.lineTo(pos.x,pos.y);ctx.stroke();
    }else if(tool==='eraser'){
      ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.fillStyle=bgColor;
      ctx.beginPath();ctx.arc(pos.x,pos.y,eraserSize/2,0,Math.PI*2);ctx.fill();
    }else if(['line','arrow','rect','circle','diamond'].includes(tool)){
      const dpr=window.devicePixelRatio||1;
      if(snapshotRef.current){ctx.setTransform(1,0,0,1,0,0);ctx.putImageData(snapshotRef.current,0,0);ctx.setTransform(dpr,0,0,dpr,0,0);}
      ctx.lineWidth=size;ctx.strokeStyle=color;ctx.lineCap='round';ctx.lineJoin='round';applyStroke(ctx);
      const sp=startPosRef.current;
      if(tool==='line'){ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(pos.x,pos.y);ctx.stroke();}
      else if(tool==='arrow'){
        ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(pos.x,pos.y);ctx.stroke();
        const a=Math.atan2(pos.y-sp.y,pos.x-sp.x),hl=10+size*2;
        ctx.beginPath();ctx.moveTo(pos.x,pos.y);
        ctx.lineTo(pos.x-hl*Math.cos(a-Math.PI/6),pos.y-hl*Math.sin(a-Math.PI/6));
        ctx.moveTo(pos.x,pos.y);
        ctx.lineTo(pos.x-hl*Math.cos(a+Math.PI/6),pos.y-hl*Math.sin(a+Math.PI/6));ctx.stroke();
      }else if(tool==='rect'){
        if(fillColor!=='transparent'){ctx.fillStyle=fillColor;ctx.fillRect(sp.x,sp.y,pos.x-sp.x,pos.y-sp.y);}
        ctx.strokeRect(sp.x,sp.y,pos.x-sp.x,pos.y-sp.y);
      }else if(tool==='circle'){
        const rx2=Math.abs(pos.x-sp.x)/2,ry2=Math.abs(pos.y-sp.y)/2;
        ctx.beginPath();ctx.ellipse(sp.x+(pos.x-sp.x)/2,sp.y+(pos.y-sp.y)/2,Math.max(1,rx2),Math.max(1,ry2),0,0,Math.PI*2);
        if(fillColor!=='transparent'){ctx.fillStyle=fillColor;ctx.fill();}ctx.stroke();
      }else if(tool==='diamond'){
        const cx=sp.x+(pos.x-sp.x)/2,cy=sp.y+(pos.y-sp.y)/2,rx2=Math.abs(pos.x-sp.x)/2,ry2=Math.abs(pos.y-sp.y)/2;
        ctx.beginPath();ctx.moveTo(cx,cy-ry2);ctx.lineTo(cx+rx2,cy);ctx.lineTo(cx,cy+ry2);ctx.lineTo(cx-rx2,cy);ctx.closePath();
        if(fillColor!=='transparent'){ctx.fillStyle=fillColor;ctx.fill();}ctx.stroke();
      }
    }
    lastPosRef.current=pos;e.preventDefault();
  }

  function onUp(e){
    if(tool==='hand'){isPanningRef.current=false;return;}
    if(tool==='pointer'){endPointer();return;}
    if(drawingRef.current){drawingRef.current=false;snapshotRef.current=null;const c=canvasRef.current;if(c)resetCtx(c.getContext('2d'));pushH();}
  }

  function flattenTexts(){
    const c=canvasRef.current;if(!c)return;const ctx=c.getContext('2d');
    texts.forEach(t=>{if(!t.text.trim())return;ctx.globalAlpha=t.opacity||1;ctx.font=`${t.fontSize||20}px 'DM Sans',sans-serif`;ctx.fillStyle=t.color||'#000';ctx.textBaseline='top';t.text.split('\n').forEach((ln,i)=>ctx.fillText(ln,t.x,t.y+i*(t.fontSize||20)*1.2));});
    resetCtx(ctx);pushH();setTexts([]);setEditTid(null);setActiveTid(null);
  }
  function saveImg(){
    const c=canvasRef.current;if(!c)return;const ctx=c.getContext('2d');
    texts.forEach(t=>{if(!t.text.trim())return;ctx.globalAlpha=t.opacity||1;ctx.font=`${t.fontSize||20}px 'DM Sans',sans-serif`;ctx.fillStyle=t.color||'#000';ctx.textBaseline='top';t.text.split('\n').forEach((ln,i)=>ctx.fillText(ln,t.x,t.y+i*(t.fontSize||20)*1.2));});
    resetCtx(ctx);
    ctx.setTransform(1,0,0,1,0,0);
    const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='daily-drawing.png';a.click();
    const dpr=window.devicePixelRatio||1;ctx.setTransform(dpr,0,0,dpr,0,0);
    if(texts.length)restoreH(histI.current);
  }

  // KEYBOARD
  useEffect(()=>{
    const onK=e=>{
      const p=panelRef.current;if(!p)return;
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'){if(e.key==='Escape')setEditTid(null);return;}
      if(!p.contains(document.activeElement)&&!p.contains(e.target)&&document.activeElement!==document.body)return;
      if((e.ctrlKey||e.metaKey)&&(e.key==='a'||e.key==='A')){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();setSelAllSync(true);return;}
      if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();e.stopPropagation();e.shiftKey?redo():undo();return;}
      if(selAllRef.current&&(e.key==='Backspace'||e.key==='Delete')){e.preventDefault();e.stopPropagation();clearAll();setSelAllSync(false);return;}
      if(sel?.phase==='ready'&&(e.key==='Backspace'||e.key==='Delete')){e.preventDefault();deleteSel();return;}
      if(e.key==='Escape'){setSelAllSync(false);if(sel)cancelSel();}
      if((e.ctrlKey||e.metaKey)&&e.key==='='){e.preventDefault();setZoom(z=>Math.min(3,+(z+0.15).toFixed(2)));}
      if((e.ctrlKey||e.metaKey)&&e.key==='-'){e.preventDefault();setZoom(z=>Math.max(0.25,+(z-0.15).toFixed(2)));}
      if((e.ctrlKey||e.metaKey)&&e.key==='0'){e.preventDefault();setZoom(1);setPan({x:0,y:0});}
    };
    document.addEventListener('keydown',onK,true);
    return()=>document.removeEventListener('keydown',onK,true);
  },[sel]);

  function onWheel(e){if(e.ctrlKey||e.metaKey){e.preventDefault();setZoom(z=>Math.min(3,Math.max(0.25,+(z+(e.deltaY<0?0.1:-0.1)).toFixed(2))));}}

  // Text drag
  function startDragT(id,e){
    e.stopPropagation();e.preventDefault();dragTidRef.current=id;setActiveTid(id);
    const t=texts.find(x=>x.id===id);if(!t)return;
    const{rx,ry}=getWrapPos(e);
    dragTStartRef.current={sx:rx,sy:ry,oRX:t.relX,oRY:t.relY,oCX:t.x,oCY:t.y};
  }
  useEffect(()=>{
    const mv=e=>{
      if(!dragTidRef.current||!dragTStartRef.current)return;
      const{rx,ry}=getWrapPos(e);
      const dx=rx-dragTStartRef.current.sx,dy=ry-dragTStartRef.current.sy;
      setTexts(ts=>ts.map(t=>t.id===dragTidRef.current?{
        ...t,relX:dragTStartRef.current.oRX+dx,relY:dragTStartRef.current.oRY+dy,
        x:dragTStartRef.current.oCX+dx/zoom,y:dragTStartRef.current.oCY+dy/zoom
      }:t));
    };
    const up=()=>{dragTidRef.current=null;dragTStartRef.current=null;};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
  });

  // Text resize (drag handle)
  function startResizeT(id,e){e.stopPropagation();e.preventDefault();setResizeTid(id);const t=texts.find(x=>x.id===id);if(t)resizeTStartRef.current={sy:e.clientY,orig:t.fontSize};}
  useEffect(()=>{
    if(!resizeTid)return;
    const mv=e=>{if(!resizeTStartRef.current)return;const dy=resizeTStartRef.current.sy-e.clientY;setTexts(ts=>ts.map(t=>t.id===resizeTid?{...t,fontSize:Math.max(10,Math.min(120,resizeTStartRef.current.orig+Math.round(dy/2)))}:t));};
    const up=()=>{setResizeTid(null);resizeTStartRef.current=null;};
    window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
    return()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
  },[resizeTid]);

  const TOOLS=['pointer','hand','pen','eraser','line','arrow','rect','circle','diamond','text'];
  const COLS=['#4f8ef7','#3ecf8e','#f7c35a','#f76f6f','#a78bfa','#fb923c','#e879f9','#fff','#9a9da6','#000'];
  const FCOLS=['transparent','#4f8ef733','#3ecf8e33','#f7c35a33','#f76f6f33','#4f8ef7','#3ecf8e','#f7c35a','#f76f6f'];
  const SZS=[1,2,4,8,14];const ESZ=[12,24,40,64];
  const BGS=['#ffffff','#fffef2','#f0f0f0','#f5f5dc','#e8e8e8','#1c1e22','#0e0f11','#1a1a2e','#2d2d2d','#000'];
  const tI={pointer:'🖱',hand:'🖐',pen:'✏️',eraser:'🧹',line:'╱',arrow:'→',rect:'▭',circle:'○',diamond:'◇',text:'T'};

  return(
    <div ref={panelRef} style={{display:'contents'}}>
      <FloatingPanel title="Drawing Board" icon="🎨" onClose={onClose} initW={800} initH={560} storageKey="draw">

        <div className="draw-toolbar">
          {TOOLS.map(t=>(
            <button key={t} className={`dtool${tool===t?' active':''}`}
              onClick={()=>{setTool(t);setSelAllSync(false);setEraserPos(null);if(t!=='pointer'&&sel)finishSel();}}
              title={t} style={{fontSize:t==='text'?14:13,fontWeight:['text','pointer','hand'].includes(t)?700:400}}>
              {tI[t]}
            </button>
          ))}
          <div style={{width:1,height:18,background:'var(--border2)',margin:'0 3px'}}/>
          {COLS.map(c=>(<div key={c} onClick={()=>setColor(c)} style={{width:14,height:14,borderRadius:'50%',background:c,border:color===c?'2.5px solid var(--blue)':'2px solid transparent',cursor:'pointer',flexShrink:0,boxShadow:c==='#fff'?'inset 0 0 0 1px var(--border2)':'none'}}/>))}
          <input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{width:16,height:16,border:'1px solid var(--border)',borderRadius:3,cursor:'pointer',padding:0,flexShrink:0}}/>
          <div style={{width:1,height:18,background:'var(--border2)',margin:'0 3px'}}/>
          {tool==='eraser'?ESZ.map(s=>(<div key={s} onClick={()=>setEraserSize(s)} style={{width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',borderRadius:'50%',border:eraserSize===s?'2px solid var(--blue)':'1px solid var(--border)',background:eraserSize===s?'var(--blue-dim)':'transparent'}}><div style={{width:Math.max(3,s/4),height:Math.max(3,s/4),borderRadius:'50%',background:eraserSize===s?'var(--blue)':'var(--text3)'}}/></div>)):SZS.map(s=>(<div key={s} onClick={()=>setSize(s)} style={{width:16,height:16,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><div style={{width:Math.min(s+2,14),height:Math.min(s+2,14),borderRadius:'50%',background:size===s?'var(--blue)':'var(--text3)'}}/></div>))}
          <div style={{width:1,height:18,background:'var(--border2)',margin:'0 3px'}}/>
          <button className="dtool" onClick={undo}>↩</button>
          <button className="dtool" onClick={redo}>↪</button>
          <button className="dtool" onClick={()=>{if(confirm('Clear?'))clearAll();}}>🗑</button>
          {texts.length>0&&<button className="dtool" onClick={flattenTexts} style={{color:'var(--amber)'}}>⏏</button>}
          <button className="dtool" onClick={saveImg}>💾</button>
        </div>

            <div className="draw-sub-toolbar">
            {['solid','dashed','dotted'].map(d=>(<button key={d} onClick={()=>setLineDash(d)} style={{padding:'1px 5px',borderRadius:3,fontSize:10,cursor:'pointer',fontFamily:'monospace',background:lineDash===d?'var(--blue-dim)':'transparent',color:lineDash===d?'var(--blue)':'var(--text3)',border:lineDash===d?'1px solid var(--blue)':'1px solid transparent'}}>{d==='solid'?'───':d==='dashed'?'- - -':'···'}</button>))}
            <div style={{width:1,height:14,background:'var(--border2)',margin:'0 4px'}}/>
            <span style={{fontSize:10,color:'var(--text3)'}}>α</span>
            <input type="range" min="0.1" max="1" step="0.1" value={opacity} onChange={e=>setOpacity(parseFloat(e.target.value))} style={{width:40,accentColor:'var(--blue)',cursor:'pointer'}}/>
            <div style={{width:1,height:14,background:'var(--border2)',margin:'0 4px'}}/>
            <span style={{fontSize:10,color:'var(--text3)'}}>BG:</span>
            <div style={{position:'relative'}}>
                <div onClick={()=>setShowBgPicker(v=>!v)} style={{width:20,height:20,borderRadius:5,background:bgColor,cursor:'pointer',border:`2px solid ${showBgPicker?'var(--blue)':'var(--border2)'}`,boxShadow:bgColor==='#ffffff'?'inset 0 0 0 1px #bbb':'none'}}/>
                {showBgPicker&&(<div style={{position:'absolute',top:'calc(100% + 6px)',left:-40,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:10,padding:12,width:210,zIndex:200,boxShadow:'0 8px 28px rgba(0,0,0,.7)'}}>
                <div style={{fontSize:11,color:'var(--text2)',fontWeight:600,marginBottom:8}}>Canvas Background</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>{BGS.map(bc=>(<div key={bc} onClick={()=>changeBg(bc)} style={{width:28,height:28,borderRadius:6,background:bc,cursor:'pointer',border:bgColor===bc?'2.5px solid var(--blue)':'1.5px solid var(--border)',boxShadow:bc==='#ffffff'?'inset 0 0 0 1px #ddd':'none'}}/>))}</div>
                <input type="color" value={bgColor} onChange={e=>changeBg(e.target.value)} style={{width:28,height:28,border:'1px solid var(--border)',borderRadius:4,cursor:'pointer',padding:1}}/>
                </div>)}
            </div>
            {['rect','circle','diamond'].includes(tool)&&(<><div style={{width:1,height:14,background:'var(--border2)',margin:'0 4px'}}/><span style={{fontSize:10,color:'var(--text3)'}}>Fill:</span><div style={{position:'relative'}}><div onClick={()=>setShowFill(v=>!v)} style={{width:20,height:20,borderRadius:4,border:'2px solid var(--border2)',cursor:'pointer',background:fillColor==='transparent'?'var(--bg4)':fillColor}}/>{showFill&&(<div style={{position:'absolute',top:'calc(100% + 6px)',left:0,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:8,padding:8,display:'flex',gap:4,flexWrap:'wrap',width:140,zIndex:200,boxShadow:'0 4px 14px rgba(0,0,0,.5)'}}>{FCOLS.map(fc=>(<div key={fc} onClick={()=>{setFillColor(fc);setShowFill(false);}} style={{width:22,height:22,borderRadius:4,cursor:'pointer',background:fc==='transparent'?'var(--bg4)':fc,border:fillColor===fc?'2px solid var(--blue)':'1px solid var(--border)'}}/>))}</div>)}</div></>)}
            {tool==='text'&&(<><div style={{width:1,height:14,background:'var(--border2)',margin:'0 4px'}}/><span style={{fontSize:10,color:'var(--text3)'}}>Font:</span><input type="range" min="12" max="72" value={fontSize} onChange={e=>setFontSize(parseInt(e.target.value))} style={{width:50,accentColor:'var(--blue)',cursor:'pointer'}}/><span style={{fontSize:10,color:'var(--text3)'}}>{fontSize}px</span></>)}
            
            <div style={{marginLeft:'auto',display:'flex',gap:4,alignItems:'center'}}>
                <button onClick={()=>setZoom(z=>Math.max(0.25,+(z-0.15).toFixed(2)))} style={{width:18,height:18,borderRadius:3,border:'1px solid var(--border)',background:'var(--bg3)',color:'var(--text2)',cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                <span style={{fontSize:10,color:'var(--text3)',minWidth:30,textAlign:'center',cursor:'pointer'}} onClick={()=>{setZoom(1);setPan({x:0,y:0});}}>{Math.round(zoom*100)}%</span>
                <button onClick={()=>setZoom(z=>Math.min(3,+(z+0.15).toFixed(2)))} style={{width:18,height:18,borderRadius:3,border:'1px solid var(--border)',background:'var(--bg3)',color:'var(--text2)',cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            </div>
            </div>

        {/* ★ CANVAS — fills ALL remaining space */}
        <div ref={wrapRef} style={{flex:1,position:'relative',overflow:'hidden',minHeight:0}} onWheel={onWheel} onMouseLeave={()=>setEraserPos(null)}>
          <div style={{position:'absolute',inset:0,transform:`scale(${zoom})`,transformOrigin:'0 0',left:pan.x,top:pan.y}}>
            <canvas ref={canvasRef} tabIndex={0}
              style={{display:'block',touchAction:'none',outline:'none',
                cursor:tool==='eraser'?'none':tool==='text'?'text':tool==='pointer'?(sel?.phase==='ready'?'move':'crosshair'):tool==='hand'?(isPanningRef.current?'grabbing':'grab'):'crosshair'}}
              onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp}
              onMouseLeave={e=>{onUp(e);setEraserPos(null);}}
              onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}/>

            {tool==='eraser'&&eraserPos&&(<div style={{position:'fixed',left:eraserPos.rx-eraserSize/2,top:eraserPos.ry-eraserSize/2,width:eraserSize,height:eraserSize,border:'2px solid rgba(150,150,150,.8)',borderRadius:'50%',pointerEvents:'none',zIndex:999,backgroundColor:'rgba(255,255,255,.12)'}}/>)}

            {/* ★ TEXT OVERLAYS */}
            {texts.map(t=>{
              const isEd=editTid===t.id,isAct=activeTid===t.id;
              return(<div key={t.id} style={{position:'absolute',left:t.x,top:t.y,zIndex:isAct?22:21,cursor:isEd?'text':'move',minWidth:20}}
                onMouseDown={e=>{if(!isEd)startDragT(t.id,e);else e.stopPropagation();}}
                onDoubleClick={e=>{e.stopPropagation();setEditTid(t.id);setActiveTid(t.id);}}
                onClick={e=>{e.stopPropagation();setActiveTid(t.id);}}>
                {isAct&&!isEd&&<div style={{position:'absolute',inset:-3,border:'1.5px dashed var(--blue)',borderRadius:4,pointerEvents:'none'}}/>}
                {isAct&&!isEd&&(<div style={{position:'absolute',top:-20,left:0,display:'flex',gap:2,zIndex:25}}>
                  <div onMouseDown={e=>startDragT(t.id,e)} style={{background:'var(--blue)',color:'#fff',fontSize:8,padding:'1px 4px',borderRadius:3,cursor:'grab',userSelect:'none',fontWeight:700}}>⠿</div>
                  <div onClick={e=>{e.stopPropagation();setEditTid(t.id);}} style={{background:'var(--bg4)',color:'var(--text2)',fontSize:8,padding:'1px 4px',borderRadius:3,cursor:'pointer'}}>✏</div>
                  <div onClick={e=>{e.stopPropagation();setTexts(ts=>ts.filter(x=>x.id!==t.id));}} style={{background:'var(--red-dim)',color:'var(--red)',fontSize:8,padding:'1px 4px',borderRadius:3,cursor:'pointer'}}>✕</div>
                </div>)}
                {isAct&&!isEd&&<div onMouseDown={e=>startResizeT(t.id,e)} style={{position:'absolute',bottom:-6,right:-6,width:12,height:12,background:'var(--blue)',border:'2px solid #fff',borderRadius:2,cursor:'ns-resize',zIndex:26}} title="Resize"/>}
                {isEd?(<textarea autoFocus value={t.text}
                  onChange={e=>setTexts(ts=>ts.map(x=>x.id===t.id?{...x,text:e.target.value}:x))}
                  onMouseDown={e=>e.stopPropagation()}
                  onKeyDown={e=>{e.stopPropagation();if(e.key==='Escape')setEditTid(null);if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();setEditTid(null);}}}
                  onBlur={()=>setTimeout(()=>{setEditTid(null);setTexts(ts=>ts.filter(x=>x.id!==t.id||x.text.trim()));},120)}
                  style={{background:'rgba(255,255,255,.06)',border:'2px solid var(--blue)',borderRadius:4,padding:'4px 8px',fontSize:t.fontSize||fontSize,color:t.color||color,outline:'none',fontFamily:"'DM Sans',sans-serif",minWidth:140,minHeight:(t.fontSize||fontSize)+8,resize:'both',lineHeight:1.3,caretColor:t.color||color,boxShadow:'0 2px 10px rgba(0,0,0,.2)'}}/>
                ):(<div style={{fontSize:t.fontSize||fontSize,color:t.color||color,fontFamily:"'DM Sans',sans-serif",opacity:t.opacity||1,lineHeight:1.3,whiteSpace:'pre-wrap',wordBreak:'break-word',userSelect:'none',padding:'4px 8px',textRendering:'optimizeLegibility',WebkitFontSmoothing:'antialiased'}}>
                  {t.text||<span style={{opacity:.4,fontStyle:'italic'}}>type…</span>}
                </div>)}
                {isAct&&!isEd&&<div style={{position:'absolute',bottom:-16,right:0,fontSize:8,color:'var(--text3)',background:'var(--bg4)',padding:'0 3px',borderRadius:2}}>{t.fontSize||fontSize}px</div>}
              </div>);
            })}

            {/* ★ POINTER SELECTION VISUALS */}
            {sel&&sel.phase==='drawing'&&<div style={{position:'absolute',left:sel.x,top:sel.y,width:sel.w,height:sel.h,border:'2px dashed var(--blue)',background:'rgba(79,142,247,.08)',pointerEvents:'none',zIndex:18}}/>}
            {sel&&(sel.phase==='ready'||sel.phase==='moving')&&(
              <div onMouseDown={e=>{if(sel.phase==='ready'){
                selDragRef.current={startX:getCanvasPos(e).x,startY:getCanvasPos(e).y,origOx:sel.ox,origOy:sel.oy};
                setSel(s=>({...s,phase:'moving'}));e.preventDefault();e.stopPropagation();
              }}}
                style={{position:'absolute',left:sel.ox,top:sel.oy,width:sel.w,height:sel.h,
                  border:'2px solid var(--blue)',background:'rgba(79,142,247,.06)',
                  cursor:'move',zIndex:18,boxShadow:'0 0 0 9999px rgba(0,0,0,.03)'}}>
                <div style={{position:'absolute',top:-24,left:0,display:'flex',gap:4}}>
                  <button onClick={e=>{e.stopPropagation();finishSel();}} style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:'var(--blue)',color:'#fff',border:'none',cursor:'pointer'}}>✓ Place</button>
                  <button onClick={e=>{e.stopPropagation();deleteSel();}} style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:'var(--red-dim)',color:'var(--red)',border:'1px solid rgba(247,111,111,.3)',cursor:'pointer'}}>🗑</button>
                  <button onClick={e=>{e.stopPropagation();cancelSel();}} style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:'var(--bg4)',color:'var(--text3)',border:'1px solid var(--border)',cursor:'pointer'}}>✕</button>
                </div>
              </div>
            )}
          </div>

          {selectedAll&&(<div style={{position:'absolute',inset:0,border:'3px dashed var(--blue)',borderRadius:4,pointerEvents:'none',zIndex:25}}><div style={{position:'absolute',top:12,left:'50%',transform:'translateX(-50%)',background:'var(--blue)',color:'#fff',padding:'5px 18px',borderRadius:8,fontSize:12,fontWeight:600,whiteSpace:'nowrap'}}>✓ All Selected — Backspace to clear</div></div>)}
        </div>
      </FloatingPanel>
    </div>
  );
}
