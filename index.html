/* ── CONFETTI ── */
function Confetti(){
  const [pieces]=useState(()=>{
    const cols=['#4f8ef7','#3ecf8e','#f7c35a','#a78bfa','#f76f6f'];
    return Array.from({length:45},(_,i)=>({id:i,left:Math.random()*100,color:cols[i%5],size:5+Math.random()*6,delay:Math.random()*.8,dur:1.4+Math.random()}));
  });
  return pieces.map(p=><div key={p.id} className="cp" style={{left:p.left+'%',width:p.size,height:p.size,background:p.color,animationDelay:p.delay+'s',animationDuration:p.dur+'s'}}/>);
}
function Toast({toasts}){return<div className="toasts">{toasts.map(t=><div key={t.id} className={`toast ${t.type||''}`}>{t.msg}</div>)}</div>;}

/* ── ALARM OVERLAY ── */
function AlarmOverlay({alarms,onDismiss}){
  if(!alarms.length)return null;
  return(
    <div className="alarm-overlay" onClick={()=>onDismiss()}>
      <div className="alarm-box" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:48,marginBottom:8}}>⏰</div>
        <h2>Timer Done!</h2>
        {alarms.map(a=><p key={a.id} style={{margin:'4px 0'}}>"{a.task}"</p>)}
        <button className="btn primary" style={{marginTop:8,padding:'8px 24px'}} onClick={onDismiss}>
          Dismiss
        </button>
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const saved=loadData();const def=defaultData();
  const [cols,setCols]=useState(saved?.cols||def.cols);
  const [cards,setCards]=useState(saved?.cards||def.cards);
  const [now,setNow]=useState(Date.now());
  const [spinning,setSpinning]=useState(false);

  // Persistent timers - stored in localStorage, survives card close
  const [timers,setTimers]=useState(()=>{
    const saved=loadTimers();
    // recalculate remaining for running timers
    const now=Date.now();
    const updated={};
    Object.entries(saved).forEach(([id,t])=>{
      if(t.running&&t.endAt){
        const remaining=Math.max(0,Math.round((t.endAt-now)/1000));
        updated[id]={...t,remaining,running:remaining>0};
      } else {
        updated[id]=t;
      }
    });
    return updated;
  });
  const [alarms,setAlarms]=useState([]);// [{id,task}]

  // Save timers whenever they change
  useEffect(()=>{saveTimers(timers);},[timers]);

  // Global timer tick - runs even when cards are closed!
  useEffect(()=>{
    const id=setInterval(()=>{
      setTimers(prev=>{
        const now=Date.now();
        let changed=false;
        const next={...prev};
        const newAlarms=[];
        Object.entries(next).forEach(([cardId,t])=>{
          if(t.running&&t.remaining>0){
            const rem=t.endAt?Math.max(0,Math.round((t.endAt-now)/1000)):t.remaining-1;
            if(rem!==t.remaining){
              changed=true;
              next[cardId]={...t,remaining:rem};
              if(rem<=0){
                next[cardId].running=false;
                // Find the task name
                let taskName='Task';
                Object.values(cards).forEach(arr=>{
                  const c=arr.find(x=>x.id===cardId);
                  if(c)taskName=c.task;
                });
                newAlarms.push({id:cardId,task:taskName});
              }
            }
          }
        });
        if(newAlarms.length>0){
          // trigger alarm
          playAlarmSound();
          setAlarms(a=>[...a,...newAlarms]);
          if(window.Notification&&Notification.permission==='granted'){
            newAlarms.forEach(na=>new Notification('⏱ Timer Done!',{body:na.task}));
          }
        }
        return changed?next:prev;
      });
    },1000);
    return()=>clearInterval(id);
  },[cards]);

  const [dragCardId,setDragCardId]=useState(null);
  const [dragCardFrom,setDragCardFrom]=useState(null);
  const [dragColId,setDragColId]=useState(null);
  const [colDropTarget,setColDropTarget]=useState(null);

  const [openCard,setOpenCard]=useState(null);
  const [openCardCol,setOpenCardCol]=useState(null);
  const [addCardCol,setAddCardCol]=useState(null);
  const [showAddCol,setShowAddCol]=useState(false);
  const [showShortcuts,setShowShortcuts]=useState(false);
  const [showEditor,setShowEditor]=useState(false);
  const [showDraw,setShowDraw]=useState(false);
  const [showAi,setShowAi]=useState(false);
  const [confetti,setConfetti]=useState(false);
  const confettiKey=useRef(0);
  const [toasts,setToasts]=useState([]);
  const [light,setLight]=useState(()=>{try{return localStorage.getItem('daily_theme')==='light';}catch{return false;}});
  const [search,setSearch]=useState('');
  const [searchOpen,setSearchOpen]=useState(false);
  const searchRef=useRef();
  const [pwaPrompt,setPwaPrompt]=useState(null);

  useEffect(()=>{window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();setPwaPrompt(e);});},[]);
  useEffect(()=>{saveData({cols,cards});},[cols,cards]);
  useEffect(()=>{document.body.classList.toggle('light',light);try{localStorage.setItem('daily_theme',light?'light':'dark');}catch{}},[light]);

  // auto-delete expired
  useEffect(()=>{
    setCards(c=>{
      const nc={...c};let ch=false;
      Object.keys(nc).forEach(k=>{
        const f=(nc[k]||[]).filter(card=>!card.expiryDays||!card.doneAt||daysDiff(card.doneAt)<card.expiryDays);
        if(f.length!==nc[k].length){nc[k]=f;ch=true;}
      });
      if(ch)addToast('Expired tasks removed','success');
      return ch?nc:c;
    });
  },[]);

  // keyboard shortcuts
  useEffect(()=>{
    function onKey(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(e.key==='n'||e.key==='N')setAddCardCol(cols[0]?.id);
      if(e.key==='e'||e.key==='E')setShowEditor(o=>!o);
      if(e.key==='d'||e.key==='D')setShowDraw(o=>!o);
      if(e.key==='?')setShowShortcuts(true);
      if(e.key==='Escape'){setOpenCard(null);setAddCardCol(null);setShowAddCol(false);setShowShortcuts(false);setSearch('');setSearchOpen(false);}
    }
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[cols]);

  function addToast(msg,type=''){
    const id=uid();setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);
  }
  function refreshAge(){setSpinning(true);setNow(Date.now());setTimeout(()=>setSpinning(false),650);addToast('Ages refreshed ✓','success');}

  function dismissAlarms(){
    stopAlarmSound();
    setAlarms([]);
  }

  // card drag
  function onCardDragStart(id,fromCol){setDragCardId(id);setDragCardFrom(fromCol);}
  function onCardDrop(toCol){
    if(!dragCardId)return;
    if(dragCardFrom===toCol){setDragCardId(null);setDragCardFrom(null);return;}
    setCards(c=>{
      const card=(c[dragCardFrom]||[]).find(x=>x.id===dragCardId);if(!card)return c;
      const updated={...card};
      const isDone=cols.find(cl=>cl.id===toCol)?.label?.toLowerCase()==='done'||toCol==='DONE';
      const wasDone=cols.find(cl=>cl.id===dragCardFrom)?.label?.toLowerCase()==='done'||dragCardFrom==='DONE';
      if(isDone&&!card.doneAt){updated.doneAt=new Date().toISOString();confettiKey.current++;setConfetti(true);setTimeout(()=>setConfetti(false),3200);addToast('🎉 Done!','success');}
      if(wasDone&&!isDone)updated.doneAt=undefined;
      return{...c,[dragCardFrom]:(c[dragCardFrom]||[]).filter(x=>x.id!==dragCardId),[toCol]:[...(c[toCol]||[]),updated]};
    });
    setDragCardId(null);setDragCardFrom(null);
  }
  onCardDrop._setDrag=onCardDragStart;

  function onCardReorder(colId,srcId,targetId,pos){
    if(!srcId||srcId===targetId)return;
    const srcCol=dragCardFrom||Object.keys(cards).find(k=>(cards[k]||[]).some(x=>x.id===srcId));
    if(!srcCol)return;
    setCards(c=>{
      let srcCard=(c[srcCol]||[]).find(x=>x.id===srcId);if(!srcCard)return c;
      const updated={...srcCard};
      const isDone=cols.find(cl=>cl.id===colId)?.label?.toLowerCase()==='done'||colId==='DONE';
      const wasDone=cols.find(cl=>cl.id===srcCol)?.label?.toLowerCase()==='done'||srcCol==='DONE';
      if(isDone&&!srcCard.doneAt){updated.doneAt=new Date().toISOString();confettiKey.current++;setConfetti(true);setTimeout(()=>setConfetti(false),3200);addToast('🎉 Done!','success');}
      if(wasDone&&!isDone)updated.doneAt=undefined;
      let newSrc=(c[srcCol]||[]).filter(x=>x.id!==srcId);
      let newDest=srcCol===colId?newSrc:[...(c[colId]||[])];
      if(srcCol===colId)newDest=newSrc;
      const ti=newDest.findIndex(x=>x.id===targetId);
      if(ti===-1)newDest=[...newDest,updated];
      else{newDest=[...newDest];newDest.splice(pos==='after'?ti+1:ti,0,updated);}
      if(srcCol===colId)return{...c,[colId]:newDest};
      return{...c,[srcCol]:newSrc,[colId]:newDest};
    });
    setDragCardId(null);setDragCardFrom(null);
  }

  // col drag
  function onColDragStart(id){if(dragCardId)return;setDragColId(id);}
  function onColDragOver(id){if(!dragColId||id===dragColId)return;setColDropTarget(id);}
  function onColDrop(toId){
    setColDropTarget(null);if(!dragColId||dragColId===toId)return;
    setCols(c=>{const fi=c.findIndex(x=>x.id===dragColId),ti=c.findIndex(x=>x.id===toId);if(fi<0||ti<0)return c;const n=[...c];const[m]=n.splice(fi,1);n.splice(ti,0,m);return n;});
    setDragColId(null);addToast('Column reordered');
  }

  function onToggleLock(id){const was=cols.find(x=>x.id===id)?.locked;setCols(c=>c.map(x=>x.id===id?{...x,locked:!x.locked}:x));addToast(was?'Unlocked 🔓':'Locked 🔒');}
  function onRenameCol(id,label){if(label.trim())setCols(c=>c.map(x=>x.id===id?{...x,label:label.trim()}:x));}
  function onDeleteCol(id){
    const name=cols.find(c=>c.id===id)?.label;
    if(!confirm(`Delete "${name}"? All cards will be lost.`))return;
    setCols(c=>c.filter(x=>x.id!==id));setCards(c=>{const n={...c};delete n[id];return n;});addToast('Column deleted');
  }
  function onAddCol(colDef){setCols(c=>[...c,colDef]);setCards(c=>({...c,[colDef.id]:[]}));addToast(`"${colDef.label}" created`,'success');}
  function onSaveCard(updated){
    setCards(c=>{
      const col=Object.keys(c).find(k=>(c[k]||[]).some(x=>x.id===updated.id));if(!col)return c;
      return{...c,[col]:(c[col]||[]).map(x=>x.id===updated.id?updated:x)};
    });
    setOpenCard(updated);addToast('Saved ✓','success');
  }
  function onDeleteCard(id){
    setCards(c=>{const col=Object.keys(c).find(k=>(c[k]||[]).some(x=>x.id===id));if(!col)return c;return{...c,[col]:(c[col]||[]).filter(x=>x.id!==id)};});
    setOpenCard(null);
    // clean up timer
    setTimers(t=>{const n={...t};delete n[id];return n;});
    addToast('Deleted');
  }
  function onMoveCard(id,fromCol,toCol){
    if(fromCol===toCol)return;
    setCards(c=>{
      const card=(c[fromCol]||[]).find(x=>x.id===id);if(!card)return c;
      const updated={...card};
      const isDone=cols.find(cl=>cl.id===toCol)?.label?.toLowerCase()==='done'||toCol==='DONE';
      const wasDone=cols.find(cl=>cl.id===fromCol)?.label?.toLowerCase()==='done'||fromCol==='DONE';
      if(isDone&&!card.doneAt)updated.doneAt=new Date().toISOString();
      if(wasDone&&!isDone)updated.doneAt=undefined;
      return{...c,[fromCol]:(c[fromCol]||[]).filter(x=>x.id!==id),[toCol]:[...(c[toCol]||[]),updated]};
    });
    setOpenCardCol(toCol);addToast('Moved to '+cols.find(x=>x.id===toCol)?.label,'success');
  }
  function onAddCard(col,card){setCards(c=>({...c,[col]:[...(c[col]||[]),card]}));addToast('Card added','success');}

  function exportJSON(){
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({cols,cards},null,2)],{type:'application/json'}));
    a.download='daily-export.json';a.click();addToast('Exported!','success');
  }
  function importJSON(){
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=ev=>{
        try{const d=JSON.parse(ev.target.result);if(d.cols&&d.cards){setCols(d.cols);setCards(d.cards);addToast('Board imported!','success');}else addToast('Invalid format','error');}
        catch{addToast('Failed to parse','error');}
      };r.readAsText(f);
    };inp.click();
  }
  async function installPwa(){
    if(pwaPrompt){
      try{
        pwaPrompt.prompt();
        const{outcome}=await pwaPrompt.userChoice;
        if(outcome==='accepted'){setPwaPrompt(null);addToast('App installed! 🎉','success');}
      }catch{addToast('Install failed — try browser menu','error');}
    }else{
      // Fallback instructions
      const ua=navigator.userAgent.toLowerCase();
      if(ua.includes('chrome'))addToast('Chrome: ⋮ Menu → Install App','success');
      else if(ua.includes('edge'))addToast('Edge: ⋯ Menu → Apps → Install','success');
      else if(ua.includes('firefox'))addToast('Firefox: Use Chrome/Edge for PWA install','');
      else addToast('Use browser menu → Add to Home Screen','success');
    }
  }

  const q=search.trim().toLowerCase();
  const filteredCards=useMemo(()=>{
    if(!q)return cards;
    const out={};
    Object.keys(cards).forEach(k=>{out[k]=(cards[k]||[]).filter(c=>c.task.toLowerCase().includes(q)||(c.content||'').toLowerCase().includes(q));});
    return out;
  },[cards,q]);

  const totalAll=useMemo(()=>cols.reduce((a,c)=>a+(cards[c.id]||[]).length,0),[cols,cards]);
  const totalBlockers=useMemo(()=>cols.reduce((a,c)=>a+(cards[c.id]||[]).filter(x=>parseBlocker(x.content)).length,0),[cols,cards]);
  const totalDone=useMemo(()=>cols.reduce((a,c)=>a+(cards[c.id]||[]).filter(x=>x.doneAt).length,0),[cols,cards]);
  // Count active timers
  const activeTimers=useMemo(()=>Object.values(timers).filter(t=>t.running&&t.remaining>0).length,[timers]);

  return(
    <div className="app">
      {/* HEADER */}
      <div className="header">
        <div className="logo">Daily<span>.</span></div>
        <div className="stats-desktop" style={{display:'flex',gap:5,flexShrink:0}}>
          <div className="stat-pill">{totalAll} tasks</div>
          {totalBlockers>0&&<div className="stat-pill red">🚫 {totalBlockers}</div>}
          {totalDone>0&&<div className="stat-pill green">✓ {totalDone}</div>}
          {activeTimers>0&&<div className="stat-pill" style={{color:'var(--blue)',borderColor:'var(--blue-dim)',background:'var(--blue-dim)'}}>⏱ {activeTimers}</div>}
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:3,alignItems:'center'}}>
          <div className="search-wrap">
            {searchOpen&&(
              <div style={{position:'relative',display:'flex',alignItems:'center'}}>
                <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none'}}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </span>
                <input ref={searchRef} className="search-inp"
                  value={search} onChange={e=>setSearch(e.target.value)}
                  placeholder="Search…"
                  onKeyDown={e=>{if(e.key==='Escape'){setSearch('');setSearchOpen(false);}}}/>
              </div>
            )}
            <button className={`ibtn${searchOpen?' active':''}`} data-tip="Search"
              onClick={()=>{setSearchOpen(o=>!o);if(!searchOpen)setTimeout(()=>searchRef.current?.focus(),80);}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
          </div>
          <button className={`ibtn${showEditor?' active':''}`} data-tip="Scratch Pad (E)" onClick={()=>setShowEditor(o=>!o)}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button className={`ibtn${showDraw?' active':''}`} data-tip="Drawing Board (D)" onClick={()=>setShowDraw(o=>!o)}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><circle cx="11" cy="11" r="2"/></svg>
          </button>
          <button className={`ibtn${showAi?' active':''}`} data-tip="AI Assistants" onClick={()=>setShowAi(o=>!o)}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          </button>
          <button className="ibtn" data-tip="Refresh ages" onClick={refreshAge}>
            <svg className={spinning?'spin':''} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
          <button className="ibtn" data-tip={light?'Dark mode':'Light mode'} onClick={()=>setLight(l=>!l)}>
            {light
              ?<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              :<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>}
          </button>
          <button className="ibtn" data-tip="Shortcuts" onClick={()=>setShowShortcuts(true)}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/></svg>
          </button>
          <button className="ibtn" data-tip="Import JSON" onClick={importJSON}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button className="ibtn" data-tip="Export JSON" onClick={exportJSON}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
                           <button className={`ibtn${pwaPrompt?' active':''}`} data-tip={pwaPrompt?"Install as App":"Add to Home Screen"} onClick={()=>{
            if(pwaPrompt)installPwa();
            else addToast('Use browser menu → "Add to Home Screen" or "Install App"','success');
          }} style={pwaPrompt?{color:'var(--blue)',borderColor:'var(--blue-dim)',background:'var(--blue-dim)'}:{}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 2v12M7 9l5 5 5-5"/><path d="M20 17v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
          </button>
        </div>
      </div>

      {/* BOARD */}
      <div className="board-wrap">
        <div className="board" onDragEnd={()=>{setDragCardId(null);setDragCardFrom(null);setDragColId(null);setColDropTarget(null);}}>
          {cols.map(col=>(
            <Column key={col.id} colData={col}
              cards={filteredCards[col.id]||[]}
              allCols={cols} now={now} timers={timers}
              dragCardId={dragCardId}
              isColDragging={dragColId===col.id}
              isColDropTarget={colDropTarget===col.id}
              onCardDrop={onCardDrop}
              onCardReorder={onCardReorder}
              onColDragStart={onColDragStart}
              onColDragOver={onColDragOver}
              onColDrop={onColDrop}
              onOpen={card=>{setOpenCard(card);setOpenCardCol(col.id);}}
              onAddCard={setAddCardCol}
              onDeleteCol={onDeleteCol}
              onToggleLock={onToggleLock}
              onRenameCol={onRenameCol}/>
          ))}
          <button className="add-col-btn" title="Add column" onClick={()=>setShowAddCol(true)}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>

      {/* FAB */}
      <button className="fab" onClick={()=>setAddCardCol(cols[0]?.id)} title="New card (N)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

      {/* MODALS */}
      {openCard&&openCardCol&&(
        <CardModal card={openCard} col={openCardCol} cols={cols} now={now}
          timers={timers} setTimers={setTimers} addToast={addToast}
          onClose={()=>setOpenCard(null)} onSave={onSaveCard} onDelete={onDeleteCard} onMove={onMoveCard}/>
      )}
      {addCardCol&&<AddCardModal defaultCol={addCardCol} cols={cols} onClose={()=>setAddCardCol(null)} onAdd={onAddCard}/>}
      {showAddCol&&<AddColModal onClose={()=>setShowAddCol(false)} onAdd={onAddCol}/>}
      {showShortcuts&&<ShortcutsPanel onClose={()=>setShowShortcuts(false)}/>}
      {showEditor&&<ScratchPad onClose={()=>setShowEditor(false)}/>}
      {showDraw&&<DrawCanvas onClose={()=>setShowDraw(false)}/>}
      {showAi&&<AiPanel onClose={()=>setShowAi(false)}/>}
      {confetti&&<Confetti key={confettiKey.current}/>}
      <Toast toasts={toasts}/>
      <AlarmOverlay alarms={alarms} onDismiss={dismissAlarms}/>
       {/* PWA Install Banner */}
      {pwaPrompt&&(
        <div className="pwa-banner">
          <div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>📱 Install Daily.</div>
            <div style={{fontSize:11,color:'var(--text3)'}}>Use as a standalone app</div>
          </div>
          <button className="pwa-install" onClick={installPwa}>Install</button>
          <button className="pwa-dismiss" onClick={()=>setPwaPrompt(null)}>✕</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
