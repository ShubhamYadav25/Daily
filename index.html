<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Daily.</title>
<meta name="description" content="Daily. — Your personal kanban board"/>
<meta name="theme-color" content="#0e0f11"/>
<link rel="manifest" href="#" id="manifest-link"/>
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23000000"/><path d="M22 14H34C46 14 54 22 54 32C54 42 46 50 34 50H22V14Z" fill="%23ffffff"/></svg>'/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0f11;--bg2:#141518;--bg3:#1c1e22;--bg4:#242629;
  --border:#2a2c31;--border2:#363940;
  --text:#e8e9eb;--text2:#9a9da6;--text3:#5a5d66;
  --blue:#4f8ef7;--blue-dim:#1a2d52;
  --green:#3ecf8e;--green-dim:#0d3326;
  --amber:#f7c35a;--amber-dim:#3d2e0a;
  --red:#f76f6f;--red-dim:#3d1010;
  --purple:#a78bfa;--purple-dim:#251d45;
  --radius:10px;--radius-lg:14px;
  --shadow:0 2px 14px rgba(0,0,0,.45);
  --hdr:50px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
html{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;overscroll-behavior:contain}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;line-height:1}
input,textarea,select{font-family:inherit;color:inherit;background:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── HEADER ── */
.header{display:flex;align-items:center;gap:5px;padding:0 10px;height:var(--hdr);border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;z-index:20;position:relative;padding-top:var(--safe-top)}
.logo{font-size:18px;font-weight:600;letter-spacing:-.5px;color:var(--text);flex-shrink:0;margin-right:4px;cursor:default}
.logo span{color:var(--blue)}
.stat-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);white-space:nowrap;flex-shrink:0}
.stat-pill.red{color:var(--red);border-color:var(--red-dim);background:var(--red-dim)}
.stat-pill.green{color:var(--green);border-color:var(--green-dim);background:var(--green-dim)}
.ibtn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);color:var(--text2);transition:background .12s,color .12s,border-color .12s;flex-shrink:0;position:relative;padding:0}
.ibtn:hover{background:var(--bg3);color:var(--text)}
.ibtn.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.ibtn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.ibtn.primary:hover{opacity:.88}
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;top:calc(100% + 7px);bottom:auto;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--border2);color:var(--text);font-size:11px;font-weight:500;padding:4px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.4)}
[data-tip]:hover::before{content:'';position:absolute;top:calc(100% + 2px);bottom:auto;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:var(--border2);border-top-color:transparent;pointer-events:none;z-index:9999}
.search-wrap{position:relative;display:flex;align-items:center}
.search-inp{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px 5px 32px;font-size:13px;color:var(--text);outline:none;width:150px;transition:border-color .15s}
.search-inp:focus{border-color:var(--blue)}

/* Header actions area */
.header-actions{display:flex;gap:3px;align-items:center;flex-shrink:0}

/* Overflow menu */
.overflow-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:500;min-width:180px;padding:4px;animation:fadein .12s ease}
.overflow-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:7px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:.1s;white-space:nowrap;border:none;background:none;width:100%;text-align:left}
.overflow-item:hover{background:var(--bg3);color:var(--text)}
.overflow-sep{height:1px;background:var(--border);margin:3px 0}

/* ── BOARD ── */
.board-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.board{display:flex;gap:10px;padding:12px;flex:1;overflow-x:auto;overflow-y:hidden;min-height:0;align-items:stretch}
.board::-webkit-scrollbar{height:6px}
.col{display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);min-width:230px;max-width:290px;flex:1;overflow:hidden;min-height:0;transition:opacity .15s,transform .15s,border-color .15s;border-top:3px solid var(--border)}
.col.col-dragging{opacity:.4;transform:scale(.97)}
.col.col-drop-target{border-color:var(--blue);background:rgba(79,142,247,.04)}
.col-hdr{padding:9px 10px 7px;display:flex;align-items:center;gap:5px;flex-shrink:0;border-bottom:1px solid var(--border)}
.col-grip{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;cursor:grab;color:var(--text3);transition:.12s;flex-shrink:0;user-select:none}
.col-grip:hover{color:var(--text2);background:var(--bg4)}
.col-grip.locked{cursor:default;color:var(--amber)}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.col-title-wrap{flex:1;min-width:0;overflow:hidden}
.col-title{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-title-inp{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text);background:var(--bg3);border:1px solid var(--blue);border-radius:5px;padding:1px 6px;outline:none;width:100%}
.col-count{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--bg4);flex-shrink:0}
.col-blocker-badge{display:flex;align-items:center;gap:2px;font-size:10px;color:var(--red);flex-shrink:0}
.col-hdr-actions{display:flex;gap:1px;opacity:0;transition:.12s;flex-shrink:0}
.col-hdr:hover .col-hdr-actions{opacity:1}
.chbtn{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);transition:.1s;border:none;background:none;cursor:pointer}
.chbtn:hover{background:var(--bg4);color:var(--text2)}
.chbtn.lock-on{color:var(--amber)}
.chbtn.del-col:hover{color:var(--red);background:var(--red-dim)}
.col-body{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px}
.col-add-btn{width:32px;height:28px;border-radius:7px;color:var(--text3);border:1px dashed var(--border);background:transparent;transition:.15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;cursor:pointer;align-self:center}
.col-add-btn:hover{border-color:var(--text2);color:var(--text2);background:var(--bg3)}
.col-empty{text-align:center;padding:24px 12px;color:var(--text3);font-size:12px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:.7}
.add-col-btn{min-width:50px;width:50px;border:1.5px dashed var(--border2);border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--text3);font-size:18px;cursor:pointer;transition:.18s;background:transparent;flex-shrink:0;padding:16px 8px}
.add-col-btn:hover{border-color:var(--text2);color:var(--text2);background:var(--bg2)}

/* ── CARDS ── */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:9px 10px 8px;cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;user-select:none}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.card:active{transform:scale(.98)}
.card.dragging{opacity:.35;cursor:grabbing;transform:scale(.97)}
.card.drag-over-top{border-top:2px solid var(--blue) !important}
.card.drag-over-bottom{border-bottom:2px solid var(--blue) !important}
.card.aged-stale{border-left:2px solid var(--amber)}
.card.aged-old{border-left:2px solid var(--red)}
.card-title{font-size:13px;font-weight:500;line-height:1.4;word-break:break-word;margin-bottom:6px}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.priority{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.3px}
.p0{background:var(--red-dim);color:var(--red)}
.p1{background:var(--amber-dim);color:var(--amber)}
.p2{background:var(--blue-dim);color:var(--blue)}
.card-age{font-size:10px;color:var(--text3);margin-left:auto;display:flex;align-items:center;gap:3px;flex-shrink:0}
.card-age.age-fresh{color:var(--green)}
.card-age.age-recent{color:var(--text3)}
.card-age.age-stale{color:var(--amber)}
.card-age.age-old{color:var(--red)}
.expiry-badge{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:2px}
.expiry-badge.warn{color:var(--amber)}
.card-blocker{margin-top:7px;padding:6px 8px;background:var(--red-dim);border:1px solid rgba(247,111,111,.2);border-radius:6px;font-size:11px;color:var(--red);line-height:1.4}
.blocker-lbl{font-weight:700;font-size:10px;letter-spacing:.5px;margin-bottom:2px;display:flex;align-items:center;gap:3px}
.timer-badge{font-size:10px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px;font-family:'DM Mono',monospace;font-weight:600}
.timer-badge.running{background:var(--blue-dim);color:var(--blue)}
.timer-badge.paused{background:var(--amber-dim);color:var(--amber)}
.timer-badge.expired{background:var(--red-dim);color:var(--red);animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.color-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s;flex-shrink:0}
.color-dot:hover,.color-dot.sel{border-color:var(--text);transform:scale(1.2)}
.color-dot.none-dot{background:var(--bg4);border:1px dashed var(--border2)}

/* ── MODAL — CENTERED ON ALL SCREENS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;animation:fadein .14s ease;overflow-y:auto}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:740px;max-height:90vh;display:flex;flex-direction:column;animation:slidein .17s ease;margin:auto}
@keyframes slidein{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.modal-title{font-size:15px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.modal-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.flabel{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px;display:block}
.finput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--blue)}
.fselect{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);outline:none;cursor:pointer;appearance:none}
.fselect:focus{border-color:var(--blue)}
.frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.fgroup{margin-bottom:14px}
.btn{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--bg3);color:var(--text2);transition:.14s;cursor:pointer}
.btn:hover{background:var(--bg4);color:var(--text)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── MARKDOWN ── */
.md-render{font-size:13px;line-height:1.7;color:var(--text)}
.md-render h1{font-size:17px;font-weight:600;margin:4px 0 10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.md-render h2{font-size:15px;font-weight:600;margin:14px 0 6px}
.md-render h3{font-size:13px;font-weight:600;margin:10px 0 4px;color:var(--text2)}
.md-render p{margin:4px 0 8px;color:var(--text2)}
.md-render ul,.md-render ol{margin:4px 0 8px 18px;color:var(--text2)}
.md-render li{margin:3px 0;line-height:1.6}
.md-render strong{color:var(--text);font-weight:600}
.md-render em{font-style:italic}
.md-render del{color:var(--text3);text-decoration:line-through}
.md-render code{background:var(--bg4);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:'DM Mono',monospace;font-size:11px;color:var(--blue)}
.md-render pre{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0}
.md-render pre code{background:none;border:none;padding:0;font-size:12px;color:var(--text2);display:block;line-height:1.6}
.md-render blockquote{border-left:3px solid var(--purple);padding:5px 5px 5px 12px;margin:8px 0;color:var(--text3);font-style:italic;background:var(--purple-dim);border-radius:0 6px 6px 0}
.md-render hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.md-render .md-spacer{height:4px}
.md-render .blocker-block{background:var(--red-dim);border:1px solid rgba(247,111,111,.25);border-radius:8px;padding:10px 14px;margin:10px 0}
.md-render .blocker-label{font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--red);display:block;margin-bottom:4px}
.md-render .blocker-detail{color:var(--red);font-size:13px;line-height:1.5;opacity:.85}
.md-render ul.task-list{list-style:none;margin-left:4px}
.md-render .task-item{display:flex;align-items:flex-start;gap:6px;padding:2px 0;cursor:pointer}
.md-render .task-item.done .task-text{color:var(--text3);text-decoration:line-through}
.md-render .cb{font-size:14px;flex-shrink:0;user-select:none}
.md-render a{color:var(--blue)}

/* ── FLOATING PANEL ── */
.sc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:400}
.sc-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:320px;max-height:80vh;overflow-y:auto}
.sc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.sc-row:last-child{border-bottom:none}
.kbd{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:1px 7px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text)}

/* ── TOASTS ── */
.toasts{position:fixed;bottom:80px;right:14px;z-index:600;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;animation:toastin .2s ease;background:var(--bg3);border:1px solid var(--border2);color:var(--text);pointer-events:auto}
.toast.success{background:var(--green-dim);border-color:rgba(62,207,142,.3);color:var(--green)}
.toast.error{background:var(--red-dim);border-color:rgba(247,111,111,.3);color:var(--red)}
@keyframes toastin{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── CONFETTI ── */
.cp{position:fixed;top:-10px;pointer-events:none;z-index:700;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── SWATCHES ── */
.swatch{width:20px;height:20px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.12s;flex-shrink:0}
.swatch:hover,.swatch.sel{border-color:var(--text);transform:scale(1.15)}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(18px + var(--safe-bottom));right:18px;width:48px;height:48px;border-radius:50%;background:var(--blue);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(79,142,247,.45);border:none;cursor:pointer;z-index:50;transition:transform .15s,box-shadow .15s}
.fab:hover{transform:scale(1.08)}
.fab:active{transform:scale(.95)}

/* ── FLOATING PANEL ── */
.fp{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:300;display:flex;flex-direction:column;min-width:320px;min-height:200px}
.fp-hdr{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;cursor:move;user-select:none}
.fp-title{font-size:12px;font-weight:600;flex:1;color:var(--text2)}
.fp-resize{position:absolute;z-index:10}
.fp-resize.n{top:-4px;left:12px;right:12px;height:8px;cursor:n-resize}
.fp-resize.s{bottom:-4px;left:12px;right:12px;height:8px;cursor:s-resize}
.fp-resize.e{right:-4px;top:12px;bottom:12px;width:8px;cursor:e-resize}
.fp-resize.w{left:-4px;top:12px;bottom:12px;width:8px;cursor:w-resize}
.fp-resize.nw{top:-4px;left:-4px;width:14px;height:14px;cursor:nw-resize}
.fp-resize.ne{top:-4px;right:-4px;width:14px;height:14px;cursor:ne-resize}
.fp-resize.sw{bottom:-4px;left:-4px;width:14px;height:14px;cursor:sw-resize}
.fp-resize.se{bottom:-4px;right:-4px;width:14px;height:14px;cursor:se-resize;background:var(--border2);border-radius:0 0 var(--radius-lg) 0;opacity:.6}

/* ── AI PANEL ── */
.ai-panel{position:fixed;top:var(--hdr);right:0;width:320px;max-width:100vw;bottom:0;background:var(--bg2);border-left:1px solid var(--border2);z-index:150;display:flex;flex-direction:column;animation:slideL .18s ease}
@keyframes slideL{from{transform:translateX(100%)}to{transform:translateX(0)}}
.ai-panel-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.ai-service-btn{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:.14s;text-decoration:none}
.ai-service-btn:hover{border-color:var(--blue);transform:translateY(-1px)}
.ai-service-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spin{animation:spin .6s linear}

/* ── LIGHT MODE ── */
body.light{--bg:#f3f3f5;--bg2:#fff;--bg3:#ededf0;--bg4:#e4e4e9;--border:#dcdce2;--border2:#c8c8d0;--text:#18181f;--text2:#555566;--text3:#9898aa;--blue-dim:#e5eeff;--green-dim:#e5f8f1;--amber-dim:#fef8e6;--red-dim:#feeaea;--purple-dim:#f1efff}

/* ── RESIZABLE IMAGE ── */
.resizable-img-container{display:inline-block;position:relative;margin:6px 0}
.resizable-img-container img{display:block;border-radius:6px;object-fit:contain}
.resizable-img-container .resize-handle{position:absolute;bottom:-5px;right:-5px;width:14px;height:14px;background:var(--blue);border:2px solid var(--bg2);border-radius:3px;cursor:se-resize;z-index:10;opacity:0;transition:opacity .15s}
.resizable-img-container:hover .resize-handle{opacity:1}

const AlarmCtx={ctx:null,playing:false};
function playAlarmSound(){
  try{
    if(AlarmCtx.playing)return;AlarmCtx.playing=true;
    const ctx=new(window.AudioContext||window.webkitAudioContext)();AlarmCtx.ctx=ctx;
    const notes=[523.25,659.25,783.99,1046.50,783.99,659.25,523.25];
    let t=ctx.currentTime;
    notes.forEach((freq,i)=>{
      for(let r=0;r<3;r++){
        const osc=ctx.createOscillator(),gain=ctx.createGain();
        osc.type=i%2===0?'sine':'triangle';osc.frequency.value=freq;
        gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(0.15,t+0.03);gain.gain.linearRampToValueAtTime(0,t+0.18);
        osc.connect(gain);gain.connect(ctx.destination);osc.start(t);osc.stop(t+0.2);t+=0.2;
      }t+=0.1;
    });
    setTimeout(()=>{AlarmCtx.playing=false;try{ctx.close();}catch{}},5000);
  }catch{AlarmCtx.playing=false;}
}

function fmtAge(iso,now){

  const m=Math.floor(ms/6e4),h=Math.floor(ms/36e5),d=Math.floor(ms/864e5),w=Math.floor(d/7),mo=Math.floor(d/30);

/* ── IMAGE COMPRESS ── */
async function compressImage(src){
  return new Promise(res=>{
    const img=new Image();const isFile=src instanceof File;
    const url=isFile?URL.createObjectURL(src):src;
    img.onload=()=>{
      const MAX=1200,scale=Math.min(1,MAX/Math.max(img.width,img.height));
      const w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let out=c.toDataURL('image/webp',0.82);
      if(out.length<50||out.startsWith('data:image/png'))out=c.toDataURL('image/jpeg',0.82);
      if(isFile)URL.revokeObjectURL(url);res(out);
    };img.src=url;
  });
}

/* ── MARKDOWN ── */
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function inlineRender(s){
  return escH(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMd(text,onToggle,imageSizes){
  if(!text)return'';
  const lines=text.split('\n');const out=[];let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(line.startsWith('```')){const cl=[];i++;while(i<lines.length&&!lines[i].startsWith('```')){cl.push(escH(lines[i]));i++;}out.push(`<pre><code>${cl.join('\n')}</code></pre>`);i++;continue;}
    const hm=line.match(/^(#{1,3})\s+(.+)$/);
    if(hm){
      if(hm[2].trim().toUpperCase()==='BLOCKER'){out.push(`<div class="blocker-block"><span class="blocker-label">🚫 BLOCKER</span>`);i++;const det=[];while(i<lines.length&&lines[i].trim()&&!lines[i].startsWith('#')){det.push(inlineRender(lines[i]));i++;}if(det.length)out.push(`<div class="blocker-detail">${det.join('<br/>')}</div>`);out.push('</div>');continue;}
      out.push(`<h${hm[1].length}>${inlineRender(hm[2])}</h${hm[1].length}>`);i++;continue;
    }
    if(/^(---|\*\*\*|___)$/.test(line.trim())){out.push('<hr/>');i++;continue;}
    if(line.startsWith('> ')){const bq=[line.slice(2)];while(i+1<lines.length&&lines[i+1].startsWith('> ')){i++;bq.push(lines[i].slice(2));}out.push(`<blockquote>${bq.map(inlineRender).join('<br/>')}</blockquote>`);i++;continue;}
    const imgM=line.match(/^!\[([^\]]*)\]\(([^)]+)\)(?:\{(\d+)x(\d+)\})?$/);
    if(imgM){const imgId='img_'+i;const sz=imageSizes&&imageSizes[imgId];const w=sz?sz.w:(imgM[3]?parseInt(imgM[3]):null);out.push(`<div class="resizable-img-container" data-img-id="${imgId}" data-li="${i}" style="${w?'width:'+w+'px;':'max-width:100%;'}"><img src="${escH(imgM[2])}" style="width:100%;height:auto;border-radius:6px;display:block"/><div class="resize-handle" data-img-id="${imgId}"></div></div>`);i++;continue;}
    if(/^\[[ x]\]\s/.test(line)){const items=[];while(i<lines.length&&/^\[[ x]\]\s/.test(lines[i])){const done=lines[i][1]==='x';const li=i;items.push(`<li class="task-item${done?' done':''}" data-toggle-line="${li}"><span class="cb">${done?'☑':'☐'}</span><span class="task-text">${inlineRender(lines[i].replace(/^\[[ x]\]\s/,''))}</span></li>`);i++;}out.push(`<ul class="task-list">${items.join('')}</ul>`);continue;}
    if(/^[-*+]\s/.test(line)){const items=[];while(i<lines.length&&/^[-*+]\s/.test(lines[i])){items.push(`<li>${inlineRender(lines[i].replace(/^[-*+]\s/,''))}</li>`);i++;}out.push(`<ul>${items.join('')}</ul>`);continue;}
    if(/^\d+\.\s/.test(line)){const items=[];while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(`<li>${inlineRender(lines[i].replace(/^\d+\.\s/,''))}</li>`);i++;}out.push(`<ol>${items.join('')}</ol>`);continue;}
    if(!line.trim()){out.push('<div class="md-spacer"></div>');i++;continue;}
    const para=[line];while(i+1<lines.length&&lines[i+1].trim()&&!/^(#{1,3}\s|[-*+]\s|\d+\.\s|> |\[[ x]\]|```|---|___|\*\*\*|!\[)/.test(lines[i+1])){i++;para.push(lines[i]);}
    out.push(`<p>${para.map(inlineRender).join('<br/>')}</p>`);i++;
  }
  return out.join('');
}

/* ── 8-DIRECTION RESIZE HOOK ── */
function useResize(initW,initH,initX,initY){
  const [sz,setSz]=useState({w:initW,h:initH,x:initX,y:initY});
  const drag=useRef(null);
  function startResize(dir,e){
    e.preventDefault();e.stopPropagation();
    drag.current={dir,startX:e.clientX,startY:e.clientY,...sz};
    function onMove(ev){
      if(!drag.current)return;
      const{dir:d,startX,startY,w,h,x,y}=drag.current;
      const dx=ev.clientX-startX,dy=ev.clientY-startY;
      let nw=w,nh=h,nx=x,ny=y;
      if(d.includes('e'))nw=Math.max(300,w+dx);if(d.includes('s'))nh=Math.max(180,h+dy);
      if(d.includes('w')){nw=Math.max(300,w-dx);nx=x+dx;}if(d.includes('n')){nh=Math.max(180,h-dy);ny=y+dy;}
      setSz({w:nw,h:nh,x:nx,y:ny});
    }
    function onUp(){drag.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  }
  return{sz,setSz,startResize};
}

/* ── MD EDITOR ── */
function MdEditor({value,onChange}){
  const ta=useRef();
  const [mode,setMode]=useState('write');
  const [edH,setEdH]=useState(isMobile()?160:220);
  const resizing=useRef(false);const resizeStart=useRef(null);

  function applyFmt(type){
    const el=ta.current;if(!el)return;
    const s=el.selectionStart,e=el.selectionEnd;
    const sel=value.slice(s,e),pre=value.slice(0,s),post=value.slice(e);
    let nv,ns,ne;
    const lineStart=value.lastIndexOf('\n',s-1)+1;
    switch(type){
      case 'bold':nv=pre+'**'+sel+'**'+post;ns=s+2;ne=e+2;break;
      case 'italic':nv=pre+'*'+sel+'*'+post;ns=s+1;ne=e+1;break;
      case 'strike':nv=pre+'~~'+sel+'~~'+post;ns=s+2;ne=e+2;break;
      case 'code':nv=pre+'`'+sel+'`'+post;ns=s+1;ne=e+1;break;
      case 'codeblock':{const c='```\n'+(sel||'code')+'\n```';nv=pre+c+post;ns=s+4;ne=s+4+(sel||'code').length;break;}
      case 'h1':nv=value.slice(0,lineStart)+'# '+value.slice(lineStart);ns=s+2;ne=e+2;break;
      case 'h2':nv=value.slice(0,lineStart)+'## '+value.slice(lineStart);ns=s+3;ne=e+3;break;
      case 'h3':nv=value.slice(0,lineStart)+'### '+value.slice(lineStart);ns=s+4;ne=e+4;break;
      case 'quote':nv=value.slice(0,lineStart)+'> '+value.slice(lineStart);ns=s+2;ne=e+2;break;
      case 'ul':nv=value.slice(0,lineStart)+'- '+value.slice(lineStart);ns=s+2;ne=e+2;break;
      case 'ol':nv=value.slice(0,lineStart)+'1. '+value.slice(lineStart);ns=s+3;ne=e+3;break;
      case 'check':nv=value.slice(0,lineStart)+'[ ] '+value.slice(lineStart);ns=s+4;ne=e+4;break;
      case 'hr':nv=pre+'\n---\n'+post;ns=ne=s+5;break;
      case 'link':{const p=sel||'link text';nv=pre+'['+p+'](url)'+post;ns=s+1;ne=s+1+p.length;break;}
      case 'blocker':{const b='## BLOCKER\n'+(sel||'Describe blocker')+'\n';nv=pre+b+post;ns=s+11;ne=s+11+(sel||'Describe blocker').length;break;}
      case 'json':{const res=formatJSON(el);if(!res)return alert('No valid JSON found');if(res.full)onChange('```json\n'+res.result+'\n```');else onChange(value.slice(0,res.start)+res.result+value.slice(res.end));return;}
      case 'image':{const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=async ev=>{const f=ev.target.files[0];if(!f)return;const data=await compressImage(f);const tag=`\n![image](${data})\n`;onChange(value.slice(0,s)+tag+value.slice(e));};inp.click();return;}
      default:return;
    }
    onChange(nv);setTimeout(()=>{if(el){el.selectionStart=ns;el.selectionEnd=ne;el.focus();}},0);
  }

  function onKD(e){
    const el=e.target;const s=el.selectionStart;
    if(e.key==='Tab'){e.preventDefault();const nv=value.slice(0,s)+'  '+value.slice(el.selectionEnd);onChange(nv);setTimeout(()=>{el.selectionStart=el.selectionEnd=s+2;},0);return;}
    if(e.key==='Enter'){
      const lineStart=value.lastIndexOf('\n',s-1)+1;const line=value.slice(lineStart,s);
      const um=line.match(/^([-*+])\s(.+)/),om=line.match(/^(\d+)\.\s(.+)/),cm=line.match(/^\[[ x]\]\s(.+)/);
      if(um){e.preventDefault();const ins='\n'+um[1]+' ';onChange(value.slice(0,s)+ins+value.slice(s));setTimeout(()=>{el.selectionStart=el.selectionEnd=s+ins.length;},0);}
      else if(om){e.preventDefault();const ins='\n'+(parseInt(om[1])+1)+'. ';onChange(value.slice(0,s)+ins+value.slice(s));setTimeout(()=>{el.selectionStart=el.selectionEnd=s+ins.length;},0);}

    }
  }

/* ── INTERACTIVE MD VIEW ── */
function MdView({value,onChange,imageSizes,onImageResize}){
  const ref=useRef();
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    function onClick(e){const ti=e.target.closest('[data-toggle-line]');if(ti){const li=parseInt(ti.dataset.toggleLine);const lines=value.split('\n');if(li>=lines.length)return;const ln=lines[li];if(/^\[ \]\s/.test(ln))lines[li]=ln.replace('[ ]','[x]');else if(/^\[x\]\s/.test(ln))lines[li]=ln.replace('[x]','[ ]');onChange(lines.join('\n'));}}
    el.addEventListener('click',onClick);return()=>el.removeEventListener('click',onClick);
  },[value,onChange]);
  useEffect(()=>{
    const el=ref.current;if(!el)return;let resizing=null;
    function onDown(e){const handle=e.target.closest('.resize-handle');if(!handle)return;e.preventDefault();e.stopPropagation();const imgId=handle.dataset.imgId;const container=handle.closest('.resizable-img-container');if(!container)return;const startX=e.clientX;const startW=container.offsetWidth;resizing={imgId,startX,startW,container};function onMove(ev){if(!resizing)return;const dx=ev.clientX-resizing.startX;const newW=Math.max(50,resizing.startW+dx);resizing.container.style.width=newW+'px';}function onUp(){if(resizing){const finalW=resizing.container.offsetWidth;onImageResize(resizing.imgId,finalW);}resizing=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);}window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);}
    el.addEventListener('mousedown',onDown);return()=>el.removeEventListener('mousedown',onDown);
  },[onImageResize]);
  if(!value)return<div style={{textAlign:'center',padding:'32px 0',color:'var(--text3)',fontSize:13}}><div style={{fontSize:28,marginBottom:8}}>📝</div><div>No notes yet</div></div>;
  return<div ref={ref} className="md-render" dangerouslySetInnerHTML={{__html:renderMd(value,true,imageSizes)}}/>;
}

/* ── CARD COMPONENT ── */
function Card({card,onOpen,onDragStart,onDragOver,onDropOnCard,now,timer}){
  const [dragSide,setDragSide]=useState(null);
  const blocker=parseBlocker(card.content);
  const days=Math.floor(((now||Date.now())-new Date(card.createdAt).getTime())/864e5);
  const ac=ageClass(card.createdAt,now);const ageText=fmtAge(card.createdAt,now);
  const ageCardClass=days>6?'aged-old':days>2?'aged-stale':'';
  const timerExpired=timer&&timer.remaining<=0;const timerRunning=timer&&timer.running&&timer.remaining>0;const timerPaused=timer&&!timer.running&&timer.remaining>0;
  return(
    <div className={`card ${ageCardClass}${dragSide==='top'?' drag-over-top':dragSide==='bottom'?' drag-over-bottom':''}`}
      draggable onDragStart={e=>{e.dataTransfer.effectAllowed='move';onDragStart(card.id);}}
      onDragOver={e=>{e.preventDefault();e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();const side=e.clientY<r.top+r.height/2?'top':'bottom';setDragSide(side);onDragOver(card.id,side==='top'?'before':'after');}}
      onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget))setDragSide(null);}}
      onDrop={e=>{e.preventDefault();e.stopPropagation();const s=dragSide;setDragSide(null);onDropOnCard(card.id,s==='top'?'before':'after');}}
      onDragEnd={()=>setDragSide(null)} onClick={()=>onOpen(card)}

function FloatingPanel({title,icon,onClose,children,initW=560,initH=420,initX=null,initY=null,storageKey,extraHeaderContent}){
  const mobile=isMobile();
  const defX=initX!==null?initX:Math.max(20,window.innerWidth-initW-20);
  const defY=initY!==null?initY:Math.max(60,window.innerHeight-initH-80);
  const {sz,setSz,startResize}=useResize(initW,initH,defX,defY);
  const drag=useRef(null);const ref=useRef();

  useEffect(()=>{if(!storageKey)return;try{const saved=JSON.parse(localStorage.getItem(storageKey+'_pos')||'null');if(saved)setSz(saved);}catch{}},[]);
  useEffect(()=>{if(!storageKey)return;try{localStorage.setItem(storageKey+'_pos',JSON.stringify(sz));}catch{}},[sz]);

  function onHdrMouseDown(e){
    if(e.button!==0)return;if(e.target.closest('button')||e.target.closest('input'))return;
    const el=ref.current;if(!el)return;const r=el.getBoundingClientRect();
    drag.current={ox:e.clientX-r.left,oy:e.clientY-r.top};
    const onMove=ev=>{if(!drag.current)return;setSz(s=>({...s,x:ev.clientX-drag.current.ox,y:ev.clientY-drag.current.oy}));};
    const onUp=()=>{drag.current=null;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);e.preventDefault();
  }

  if(mobile)return(
    <div ref={ref} className="fp">
      <div className="fp-hdr">
        <span style={{fontSize:14}}>{icon}</span><span className="fp-title">{title}</span>
        {extraHeaderContent}

      </div>
      <div style={{flex:1,overflow:'auto',minHeight:0,display:'flex',flexDirection:'column'}}>{children}</div>
    </div>
  );

  return(
    <div ref={ref} className="fp" style={{left:sz.x,top:sz.y,width:sz.w,height:sz.h,position:'fixed'}}>
      {['n','s','e','w','nw','ne','sw','se'].map(d=>(<div key={d} className={`fp-resize ${d}`} onMouseDown={e=>startResize(d,e)}/>))}
      <div className="fp-hdr" onMouseDown={onHdrMouseDown}>
        <span style={{fontSize:14}}>{icon}</span><span className="fp-title">{title}</span>
        {extraHeaderContent}
        <button onClick={onClose} style={{fontSize:14,color:'var(--text3)',background:'none',border:'none',cursor:'pointer',padding:'2px 6px',marginLeft:extraHeaderContent?0:'auto'}}>✕</button>
      </div>
      <div style={{flex:1,overflow:'auto',minHeight:0,display:'flex',flexDirection:'column'}}>{children}</div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const saved=loadData();const def=defaultData();
  const [cols,setCols]=useState(saved?.cols||def.cols);
  const [cards,setCards]=useState(saved?.cards||def.cards);
  const [now,setNow]=useState(Date.now());
  const [spinning,setSpinning]=useState(false);
  const [windowW,setWindowW]=useState(window.innerWidth);

  useEffect(()=>{
    function onResize(){setWindowW(window.innerWidth);}
    window.addEventListener('resize',onResize);
    return()=>window.removeEventListener('resize',onResize);
  },[]);

  const mobile=windowW<=640;
  const tablet=windowW>640&&windowW<=900;

  const [timers,setTimers]=useState(()=>{
    const saved=loadTimers();const now=Date.now();const updated={};
    Object.entries(saved).forEach(([id,t])=>{
      if(t.running&&t.endAt){const remaining=Math.max(0,Math.round((t.endAt-now)/1000));updated[id]={...t,remaining,running:remaining>0};}
      else{updated[id]=t;}
    });
    return updated;
  });
  const [alarms,setAlarms]=useState([]);
  useEffect(()=>{saveTimers(timers);},[timers]);

  useEffect(()=>{
    const id=setInterval(()=>{
      setTimers(prev=>{
        const now=Date.now();let changed=false;const next={...prev};const newAlarms=[];
        Object.entries(next).forEach(([cardId,t])=>{
          if(t.running&&t.remaining>0){
            const rem=t.endAt?Math.max(0,Math.round((t.endAt-now)/1000)):t.remaining-1;
            if(rem!==t.remaining){changed=true;next[cardId]={...t,remaining:rem};if(rem<=0){next[cardId].running=false;let taskName='Task';Object.values(cards).forEach(arr=>{const c=arr.find(x=>x.id===cardId);if(c)taskName=c.task;});newAlarms.push({id:cardId,task:taskName});}}
          }
        });
        if(newAlarms.length>0){playAlarmSound();setAlarms(a=>[...a,...newAlarms]);if(window.Notification&&Notification.permission==='granted'){newAlarms.forEach(na=>new Notification('⏱ Timer Done!',{body:na.task}));}}
        return changed?next:prev;
      });
    },1000);
    return()=>clearInterval(id);
  },[cards]);

  const [dragCardId,setDragCardId]=useState(null);const [dragCardFrom,setDragCardFrom]=useState(null);
  const [dragColId,setDragColId]=useState(null);const [colDropTarget,setColDropTarget]=useState(null);
  const [openCard,setOpenCard]=useState(null);const [openCardCol,setOpenCardCol]=useState(null);
  const [addCardCol,setAddCardCol]=useState(null);const [showAddCol,setShowAddCol]=useState(false);
  const [showShortcuts,setShowShortcuts]=useState(false);const [showEditor,setShowEditor]=useState(false);
  const [showDraw,setShowDraw]=useState(false);const [showAi,setShowAi]=useState(false);
  const [showOverflow,setShowOverflow]=useState(false);
  const [confetti,setConfetti]=useState(false);const confettiKey=useRef(0);
  const [toasts,setToasts]=useState([]);
  const [light,setLight]=useState(()=>{try{return localStorage.getItem('daily_theme')==='light';}catch{return false;}});
  const [search,setSearch]=useState('');const [searchOpen,setSearchOpen]=useState(false);
  const searchRef=useRef();const [pwaPrompt,setPwaPrompt]=useState(null);

  useEffect(()=>{window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();setPwaPrompt(e);});},[]);
  useEffect(()=>{saveData({cols,cards});},[cols,cards]);
  useEffect(()=>{document.body.classList.toggle('light',light);try{localStorage.setItem('daily_theme',light?'light':'dark');}catch{}},[light]);

  useEffect(()=>{
    setCards(c=>{
      const nc={...c};let ch=false;
      Object.keys(nc).forEach(k=>{const f=(nc[k]||[]).filter(card=>!card.expiryDays||!card.doneAt||daysDiff(card.doneAt)<card.expiryDays);if(f.length!==nc[k].length){nc[k]=f;ch=true;}});
      if(ch)addToast('Expired tasks removed','success');return ch?nc:c;
    });
  },[]);

  useEffect(()=>{
    function onKey(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
      if(e.key==='n'||e.key==='N')setAddCardCol(cols[0]?.id);
      if(e.key==='e'||e.key==='E')setShowEditor(o=>!o);
      if(e.key==='d'||e.key==='D')setShowDraw(o=>!o);
      if(e.key==='?')setShowShortcuts(true);
      if(e.key==='Escape'){setOpenCard(null);setAddCardCol(null);setShowAddCol(false);setShowShortcuts(false);setSearch('');setSearchOpen(false);setShowOverflow(false);}
    }
    window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey);
  },[cols,showDraw]);

  function addToast(msg,type=''){const id=uid();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2800);}
  function refreshAge(){setSpinning(true);setNow(Date.now());setTimeout(()=>setSpinning(false),650);addToast('Ages refreshed ✓','success');}
  function dismissAlarms(){stopAlarmSound();setAlarms([]);}

  function onCardDragStart(id,fromCol){setDragCardId(id);setDragCardFrom(fromCol);}
  function onCardDrop(toCol){
    if(!dragCardId)return;if(dragCardFrom===toCol){setDragCardId(null);setDragCardFrom(null);return;}
    setCards(c=>{
      const card=(c[dragCardFrom]||[]).find(x=>x.id===dragCardId);if(!card)return c;
      const updated={...card};
      const isDone=cols.find(cl=>cl.id===toCol)?.label?.toLowerCase()==='done'||toCol==='DONE';
      const wasDone=cols.find(cl=>cl.id===dragCardFrom)?.label?.toLowerCase()==='done'||dragCardFrom==='DONE';
      if(isDone&&!card.doneAt){updated.doneAt=new Date().toISOString();confettiKey.current++;setConfetti(true);setTimeout(()=>setConfetti(false),3200);addToast('🎉 Done!','success');}
      if(wasDone&&!isDone)updated.doneAt=undefined;
      return{...c,[dragCardFrom]:(c[dragCardFrom]||[]).filter(x=>x.id!==dragCardId),[toCol]:[...(c[toCol]||[]),updated]};
    });
    setDragCardId(null);setDragCardFrom(null);
  }
  onCardDrop._setDrag=onCardDragStart;

  function onCardReorder(colId,srcId,targetId,pos){
    if(!srcId||srcId===targetId)return;
    const srcCol=dragCardFrom||Object.keys(cards).find(k=>(cards[k]||[]).some(x=>x.id===srcId));
    if(!srcCol)return;
    setCards(c=>{
      let srcCard=(c[srcCol]||[]).find(x=>x.id===srcId);if(!srcCard)return c;
      const updated={...srcCard};
      const isDone=cols.find(cl=>cl.id===colId)?.label?.toLowerCase()==='done'||colId==='DONE';
      const wasDone=cols.find(cl=>cl.id===srcCol)?.label?.toLowerCase()==='done'||srcCol==='DONE';
      if(isDone&&!srcCard.doneAt){updated.doneAt=new Date().toISOString();confettiKey.current++;setConfetti(true);setTimeout(()=>setConfetti(false),3200);addToast('🎉 Done!','success');}
      if(wasDone&&!isDone)updated.doneAt=undefined;
      let newSrc=(c[srcCol]||[]).filter(x=>x.id!==srcId);
      let newDest=srcCol===colId?newSrc:[...(c[colId]||[])];
      if(srcCol===colId)newDest=newSrc;
      const ti=newDest.findIndex(x=>x.id===targetId);
      if(ti===-1)newDest=[...newDest,updated];else{newDest=[...newDest];newDest.splice(pos==='after'?ti+1:ti,0,updated);}
      if(srcCol===colId)return{...c,[colId]:newDest};return{...c,[srcCol]:newSrc,[colId]:newDest};
    });
    setDragCardId(null);setDragCardFrom(null);
  }

  function onColDragStart(id){if(dragCardId)return;setDragColId(id);}
  function onColDragOver(id){if(!dragColId||id===dragColId)return;setColDropTarget(id);}
  function onColDrop(toId){setColDropTarget(null);if(!dragColId||dragColId===toId)return;setCols(c=>{const fi=c.findIndex(x=>x.id===dragColId),ti=c.findIndex(x=>x.id===toId);if(fi<0||ti<0)return c;const n=[...c];const[m]=n.splice(fi,1);n.splice(ti,0,m);return n;});setDragColId(null);addToast('Column reordered');}
  function onToggleLock(id){const was=cols.find(x=>x.id===id)?.locked;setCols(c=>c.map(x=>x.id===id?{...x,locked:!x.locked}:x));addToast(was?'Unlocked 🔓':'Locked 🔒');}
  function onRenameCol(id,label){if(label.trim())setCols(c=>c.map(x=>x.id===id?{...x,label:label.trim()}:x));}
  function onDeleteCol(id){const name=cols.find(c=>c.id===id)?.label;if(!confirm(`Delete "${name}"? All cards will be lost.`))return;setCols(c=>c.filter(x=>x.id!==id));setCards(c=>{const n={...c};delete n[id];return n;});addToast('Column deleted');}
  function onAddCol(colDef){setCols(c=>[...c,colDef]);setCards(c=>({...c,[colDef.id]:[]}));addToast(`"${colDef.label}" created`,'success');}
  function onSaveCard(updated){setCards(c=>{const col=Object.keys(c).find(k=>(c[k]||[]).some(x=>x.id===updated.id));if(!col)return c;return{...c,[col]:(c[col]||[]).map(x=>x.id===updated.id?updated:x)};});setOpenCard(updated);addToast('Saved ✓','success');}
  function onDeleteCard(id){setCards(c=>{const col=Object.keys(c).find(k=>(c[k]||[]).some(x=>x.id===id));if(!col)return c;return{...c,[col]:(c[col]||[]).filter(x=>x.id!==id)};});setOpenCard(null);setTimers(t=>{const n={...t};delete n[id];return n;});addToast('Deleted');}
  function onMoveCard(id,fromCol,toCol){if(fromCol===toCol)return;setCards(c=>{const card=(c[fromCol]||[]).find(x=>x.id===id);if(!card)return c;const updated={...card};const isDone=cols.find(cl=>cl.id===toCol)?.label?.toLowerCase()==='done'||toCol==='DONE';const wasDone=cols.find(cl=>cl.id===fromCol)?.label?.toLowerCase()==='done'||fromCol==='DONE';if(isDone&&!card.doneAt)updated.doneAt=new Date().toISOString();if(wasDone&&!isDone)updated.doneAt=undefined;return{...c,[fromCol]:(c[fromCol]||[]).filter(x=>x.id!==id),[toCol]:[...(c[toCol]||[]),updated]};});setOpenCardCol(toCol);addToast('Moved to '+cols.find(x=>x.id===toCol)?.label,'success');}
  function onAddCard(col,card){setCards(c=>({...c,[col]:[...(c[col]||[]),card]}));addToast('Card added','success');}
  function exportJSON(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({cols,cards},null,2)],{type:'application/json'}));a.download='daily-export.json';a.click();addToast('Exported!','success');}
  function importJSON(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.cols&&d.cards){setCols(d.cols);setCards(d.cards);addToast('Board imported!','success');}else addToast('Invalid format','error');}catch{addToast('Failed to parse','error');}};r.readAsText(f);};inp.click();}
  async function installPwa(){if(pwaPrompt){try{pwaPrompt.prompt();const{outcome}=await pwaPrompt.userChoice;if(outcome==='accepted'){setPwaPrompt(null);addToast('App installed! 🎉','success');}}catch{addToast('Install failed — try browser menu','error');}}else{const ua=navigator.userAgent.toLowerCase();if(ua.includes('chrome'))addToast('Chrome: ⋮ Menu → Install App','success');else if(ua.includes('edge'))addToast('Edge: ⋯ Menu → Apps → Install','success');else if(ua.includes('firefox'))addToast('Firefox: Use Chrome/Edge for PWA install','');else addToast('Use browser menu → Add to Home Screen','success');}}

  const q=search.trim().toLowerCase();
  const filteredCards=useMemo(()=>{if(!q)return cards;const out={};Object.keys(cards).forEach(k=>{out[k]=(cards[k]||[]).filter(c=>c.task.toLowerCase().includes(q)||(c.content||'').toLowerCase().includes(q));});return out;},[cards,q]);
  const totalAll=useMemo(()=>cols.reduce((a,c)=>a+(cards[c.id]||[]).length,0),[cols,cards]);
  const totalBlockers=useMemo(()=>cols.reduce((a,c)=>a+(cards[c.id]||[]).filter(x=>parseBlocker(x.content)).length,0),[cols,cards]);
  const totalDone=useMemo(()=>cols.reduce((a,c)=>a+(cards[c.id]||[]).filter(x=>x.doneAt).length,0),[cols,cards]);
  const activeTimers=useMemo(()=>Object.values(timers).filter(t=>t.running&&t.remaining>0).length,[timers]);

  // Overflow menu items for mobile/tablet
  const overflowItems = [
    {icon:'🔍',label:'Search',action:()=>{setSearchOpen(o=>!o);if(!searchOpen)setTimeout(()=>searchRef.current?.focus(),80);}},
    {icon:'📝',label:'Scratch Pad',action:()=>setShowEditor(o=>!o)},
    {icon:'✏️',label:'Drawing Board',action:()=>setShowDraw(true)},
    {icon:'🤖',label:'AI Assistants',action:()=>setShowAi(o=>!o)},
    null,
    {icon:'🔄',label:'Refresh Ages',action:()=>refreshAge()},
    {icon:light?'🌙':'☀️',label:light?'Dark Mode':'Light Mode',action:()=>setLight(l=>!l)},
    {icon:'⌨️',label:'Shortcuts',action:()=>setShowShortcuts(true)},
    null,
    {icon:'⬇️',label:'Import JSON',action:()=>importJSON()},
    {icon:'⬆️',label:'Export JSON',action:()=>exportJSON()},
    ...(pwaPrompt?[null,{icon:'📱',label:'Install App',action:()=>installPwa(),badge:{text:'Install',bg:'var(--blue-dim)',color:'var(--blue)'}}]:[]),
  ];

  if(showDraw){
    return(
      <>
        <DrawPanel onClose={()=>setShowDraw(false)} light={light}/>
        <Toast toasts={toasts}/>
        <AlarmOverlay alarms={alarms} onDismiss={dismissAlarms}/>
      </>
    );
  }

  // Determine which header buttons to show directly vs in overflow
  // Desktop (>900): show all buttons
  // Tablet (641-900): show key buttons + overflow for rest
  // Mobile (≤640): logo + search + new + overflow

  const renderDesktopHeader=()=>(
    <>
      <div className="stats-desktop" style={{display:'flex',gap:5,flexShrink:0}}>
        <div className="stat-pill">{totalAll} tasks</div>
        {totalBlockers>0&&<div className="stat-pill red">🚫 {totalBlockers}</div>}
        {totalDone>0&&<div className="stat-pill green">✓ {totalDone}</div>}
        {activeTimers>0&&<div className="stat-pill" style={{color:'var(--blue)',borderColor:'var(--blue-dim)',background:'var(--blue-dim)'}}>⏱ {activeTimers}</div>}
      </div>
      <div style={{marginLeft:'auto',display:'flex',gap:3,alignItems:'center'}}>
        <div className="search-wrap">
          {searchOpen&&(
            <div style={{position:'relative',display:'flex',alignItems:'center'}}>
              <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none'}}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
              <input ref={searchRef} className="search-inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" onKeyDown={e=>{if(e.key==='Escape'){setSearch('');setSearchOpen(false);}}}/>
            </div>
          )}
          <button className={`ibtn${searchOpen?' active':''}`} data-tip="Search" onClick={()=>{setSearchOpen(o=>!o);if(!searchOpen)setTimeout(()=>searchRef.current?.focus(),80);}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
        <button className={`ibtn${showEditor?' active':''}`} data-tip="Scratch Pad (E)" onClick={()=>setShowEditor(o=>!o)}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button className="ibtn" data-tip="Drawing Board (D)" onClick={()=>setShowDraw(true)} style={{color:'var(--blue)',borderColor:'var(--blue-dim)',background:'var(--blue-dim)'}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><circle cx="11" cy="11" r="2"/></svg>
        </button>
        <button className={`ibtn${showAi?' active':''}`} data-tip="AI Assistants" onClick={()=>setShowAi(o=>!o)}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        </button>
        <button className="ibtn" data-tip="Refresh ages" onClick={refreshAge}>
          <svg className={spinning?'spin':''} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <button className="ibtn" data-tip={light?'Dark mode':'Light mode'} onClick={()=>setLight(l=>!l)}>
          {light?<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>}
        </button>
        <button className="ibtn" data-tip="Shortcuts" onClick={()=>setShowShortcuts(true)}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/></svg>
        </button>
        <button className="ibtn" data-tip="Import JSON" onClick={importJSON}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button className="ibtn" data-tip="Export JSON" onClick={exportJSON}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button className={`ibtn${pwaPrompt?' active':''}`} data-tip={pwaPrompt?"Install as App":"Add to Home Screen"} onClick={installPwa} style={pwaPrompt?{color:'var(--blue)',borderColor:'var(--blue-dim)',background:'var(--blue-dim)'}:{}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 2v12M7 9l5 5 5-5"/><path d="M20 17v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
        </button>
      </div>
    </>
  );

  const renderMobileTabletHeader=()=>(
    <>
      {/* Stats as small pills */}
      <div style={{display:'flex',gap:4,flexShrink:0,overflow:'hidden'}}>
        <div className="stat-pill" style={{fontSize:10,padding:'2px 6px'}}>{totalAll}</div>
        {totalBlockers>0&&<div className="stat-pill red" style={{fontSize:10,padding:'2px 6px'}}>🚫{totalBlockers}</div>}
        {activeTimers>0&&<div className="stat-pill" style={{fontSize:10,padding:'2px 6px',color:'var(--blue)',borderColor:'var(--blue-dim)',background:'var(--blue-dim)'}}>⏱{activeTimers}</div>}
      </div>
      <div style={{marginLeft:'auto',display:'flex',gap:3,alignItems:'center'}}>
        {/* Search (always visible) */}
        {searchOpen&&(
          <div style={{position:'relative',display:'flex',alignItems:'center'}}>
            <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none'}}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input ref={searchRef} className="search-inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" onKeyDown={e=>{if(e.key==='Escape'){setSearch('');setSearchOpen(false);}}} style={{paddingLeft:28}}/>
          </div>
        )}
        <button className={`ibtn${searchOpen?' active':''}`} onClick={()=>{setSearchOpen(o=>!o);if(!searchOpen)setTimeout(()=>searchRef.current?.focus(),80);}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        {/* Overflow menu button */}
        <div style={{position:'relative'}}>
          <button className={`ibtn${showOverflow?' active':''}`} onClick={()=>setShowOverflow(o=>!o)} style={{position:'relative'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>
            {pwaPrompt&&<span style={{position:'absolute',top:3,right:3,width:6,height:6,borderRadius:'50%',background:'var(--blue)',border:'1.5px solid var(--bg2)'}}/>}
          </button>
          {showOverflow&&<OverflowMenu items={overflowItems} onClose={()=>setShowOverflow(false)}/>}
        </div>
      </div>
    </>
  );

  return(
    <div className="app">
      {/* HEADER */}
      <div className="header">
        <div className="logo">Daily<span>.</span></div>
        {(mobile||tablet)?renderMobileTabletHeader():renderDesktopHeader()}
      </div>

      {/* BOARD */}
      <div className="board-wrap">
        <div className="board" onDragEnd={()=>{setDragCardId(null);setDragCardFrom(null);setDragColId(null);setColDropTarget(null);}}>
          {cols.map(col=>(
            <Column key={col.id} colData={col} cards={filteredCards[col.id]||[]} allCols={cols} now={now} timers={timers}
              dragCardId={dragCardId} isColDragging={dragColId===col.id} isColDropTarget={colDropTarget===col.id}
              onCardDrop={onCardDrop} onCardReorder={onCardReorder}
              onColDragStart={onColDragStart} onColDragOver={onColDragOver} onColDrop={onColDrop}
              onOpen={card=>{setOpenCard(card);setOpenCardCol(col.id);}}
              onAddCard={setAddCardCol} onDeleteCol={onDeleteCol} onToggleLock={onToggleLock} onRenameCol={onRenameCol}/>
          ))}
          <button className="add-col-btn" title="Add column" onClick={()=>setShowAddCol(true)}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>

      {/* FAB */}
      <button className="fab" onClick={()=>setAddCardCol(cols[0]?.id)} title="New card (N)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

      {/* MODALS */}
      {openCard&&openCardCol&&(<CardModal card={openCard} col={openCardCol} cols={cols} now={now} timers={timers} setTimers={setTimers} addToast={addToast} onClose={()=>setOpenCard(null)} onSave={onSaveCard} onDelete={onDeleteCard} onMove={onMoveCard}/>)}
      {addCardCol&&<AddCardModal defaultCol={addCardCol} cols={cols} onClose={()=>setAddCardCol(null)} onAdd={onAddCard}/>}
      {showAddCol&&<AddColModal onClose={()=>setShowAddCol(false)} onAdd={onAddCol}/>}
      {showShortcuts&&<ShortcutsPanel onClose={()=>setShowShortcuts(false)}/>}
      {showEditor&&<ScratchPad onClose={()=>setShowEditor(false)}/>}
      {showAi&&<AiPanel onClose={()=>setShowAi(false)}/>}
      {confetti&&<Confetti key={confettiKey.current}/>}
      <Toast toasts={toasts}/>
      {/* ALARM: z-index 9999, always on top */}
      <AlarmOverlay alarms={alarms} onDismiss={dismissAlarms}/>
      {pwaPrompt&&!mobile&&(
        <div className="pwa-banner">
          <div><div style={{fontSize:13,fontWeight:600,marginBottom:2}}>📱 Install Daily.</div><div style={{fontSize:11,color:'var(--text3)'}}>Use as a standalone app</div></div>
          <button className="pwa-install" onClick={installPwa}>Install</button>
          <button className="pwa-dismiss" onClick={()=>setPwaPrompt(null)}>✕</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
